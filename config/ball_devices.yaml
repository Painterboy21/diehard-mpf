#config_version=6

# ------------------------------------------------------------
# BALL DEVICES
# ------------------------------------------------------------
# Defines every physical ball device in the machine:
#
#   - trough
#   - plunger lane
#   - vault kicker
#   - right kicker
#   - upper ramp device
#   - right VUK
#   - tower VUK
#   - captive ball / airplane device
#
# Normal gameplay:
#   - Fire button launches the plunger.
#   - Action button also launches the plunger.
#
# Wizard mode:
#   - wizard_mode_auto_plunge launches automatically.
# ------------------------------------------------------------

ball_devices:

  # ------------------------------------------------------------
  # TROUGH
  # ------------------------------------------------------------
  trough:
    label: Trough
    ball_switches: s_trough1, s_trough2, s_trough3, s_trough4, s_trough5, s_trough6, s_trough_jam
    eject_coil: c_trough_eject
    tags: trough, home, drain
    jam_switch: s_trough_jam
    eject_coil_jam_pulse: 15ms
    eject_targets: bd_plunger
    ball_search_order: 0

  # ------------------------------------------------------------
  # PLUNGER LANE
  # ------------------------------------------------------------
  bd_plunger:
    label: Plunger Lane
    ball_switches: s_plunger_lane
    eject_coil: c_plunger
    eject_targets: playfield
    eject_timeouts: 1s
    player_controlled_eject_event: launch_plunger
    eject_events:
      - wizard_mode_auto_plunge
    auto_fire_on_unexpected_ball: true
    ball_search_order: 0

  # ------------------------------------------------------------
  # VAULT KICKER
  # ------------------------------------------------------------
  kickervault1_eject:
    label: Vault Kicker
    ball_switches: s_kickervault1
    eject_coil: c_kickervault1_eject
    ball_search_order: 20

  # ------------------------------------------------------------
  # RIGHT KICKER
  # ------------------------------------------------------------
  rightkicker:
    label: Right Kicker
    ball_switches: s_rightkicker
    eject_coil: c_rightkicker_eject
    eject_timeouts: 1s
    ball_search_order: 30

  # ------------------------------------------------------------
  # UPPER RAMP DEVICE
  # ------------------------------------------------------------
  UrampUp001:
    label: Upper Ramp VUK
    ball_switches: s_UrampUp001
    eject_coil: c_UrampUp001_eject
    eject_timeouts: 1s
    ball_search_order: 40

  # ------------------------------------------------------------
  # RIGHT VUK
  # ------------------------------------------------------------
  rightvuk:
    label: Right VUK
    ball_switches: s_rightvuk
    eject_coil: c_rightvuk_eject
    eject_timeouts: 1s
    ball_search_order: 50

  # ------------------------------------------------------------
  # TOWER VUK
  # ------------------------------------------------------------
  tower_vuk:
    label: Tower VUK / Nakatomi Lock
    entrance_switch: s_towervuk
    ball_capacity: 3
    mechanical_eject: true
    auto_fire_on_unexpected_ball: false
    eject_targets: playfield
    eject_timeouts: 250ms
    eject_all_events:
      - multiball_nakatomi_started
      - service_test_tower_vuk
    ball_search_order: 60

  # ------------------------------------------------------------
  # AIRPLANE / CAPTIVE BALL
  # ------------------------------------------------------------
  airplane:
    label: Airplane Captive Ball
    ball_switches: s_captiveball
    eject_coil: c_captivetarget
    eject_timeouts: 1s
    ball_search_order: 70

# ------------------------------------------------------------
# PLUNGER BUTTON EVENTS
# ------------------------------------------------------------
# Both cabinet buttons launch the ball from the plunger lane.
# ------------------------------------------------------------
event_player:
  s_fire_active:
    - launch_plunger

  s_actionbtn_active:
    - launch_plunger