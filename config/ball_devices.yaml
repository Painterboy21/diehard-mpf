#config_version=6

# ------------------------------------------------------------
# BALL DEVICES
# ------------------------------------------------------------
# Defines every physical ball device in the machine:
#
#   - trough
#   - plunger lane
#   - vault kicker
#   - right kicker
#   - upper ramp device
#   - right VUK
#   - tower VUK
#   - captive ball / airplane device
#
# Ball search order has been added so MPF can try to free
# a stuck ball safely if the playfield goes quiet.
# ------------------------------------------------------------

ball_devices:

  # ------------------------------------------------------------
  # TROUGH
  # ------------------------------------------------------------
  # Main ball trough with jam switch and eject to plunger lane.
  # Tags include trough, home, and drain.
  # Kept late/low priority for ball search because we do not
  # want the trough doing anything unless MPF really needs it.
  # ------------------------------------------------------------
  trough:
    label: Trough
    ball_switches: s_trough1, s_trough2, s_trough3, s_trough4, s_trough5, s_trough6, s_trough_jam
    eject_coil: c_trough_eject
    tags: trough, home, drain
    jam_switch: s_trough_jam
    eject_coil_jam_pulse: 15ms
    eject_targets: bd_plunger
    ball_search_order: 0

  # ------------------------------------------------------------
  # PLUNGER LANE
  # ------------------------------------------------------------
  # Holds the ball in the plunger lane.
  # Player controlled eject uses the fire/action button switch.
  # ------------------------------------------------------------
  bd_plunger:
    label: Plunger Lane
    ball_switches: s_plunger_lane
    eject_coil: c_plunger
    player_controlled_eject_event: s_fire_active
    ball_search_order: 10

  # ------------------------------------------------------------
  # VAULT KICKER
  # ------------------------------------------------------------
  # Used by vault, mystery, and ambush style ball holds/releases.
  # Added to ball search because this is a likely stuck-ball spot.
  # ------------------------------------------------------------
  kickervault1_eject:
    label: Vault Kicker
    ball_switches: s_kickervault1
    eject_coil: c_kickervault1_eject
    ball_search_order: 20

  # ------------------------------------------------------------
  # RIGHT KICKER
  # ------------------------------------------------------------
  # Standard right kicker device.
  # ------------------------------------------------------------
  rightkicker:
    label: Right Kicker
    ball_switches: s_rightkicker
    eject_coil: c_rightkicker_eject
    eject_timeouts: 1s
    ball_search_order: 30

  # ------------------------------------------------------------
  # UPPER RAMP DEVICE
  # ------------------------------------------------------------
  # Upper ramp ball device.
  # ------------------------------------------------------------
  UrampUp001:
    label: Upper Ramp VUK
    ball_switches: s_UrampUp001
    eject_coil: c_UrampUp001_eject
    eject_timeouts: 1s
    ball_search_order: 40

  # ------------------------------------------------------------
  # RIGHT VUK
  # ------------------------------------------------------------
  # Right VUK device.
  # Also used elsewhere for right VUK collections.
  # ------------------------------------------------------------
  rightvuk:
    label: Right VUK
    ball_switches: s_rightvuk
    eject_coil: c_rightvuk_eject
    eject_timeouts: 1s
    ball_search_order: 50

  # ------------------------------------------------------------
  # TOWER VUK
  # ------------------------------------------------------------
  # Nakatomi tower VUK.
  # Mechanical eject device with 3-ball capacity.
  # Ejects all balls when Nakatomi multiball starts.
  # Added to ball search because Nakatomi is the one that just
  # showed a stuck playfield-ball warning.
  # ------------------------------------------------------------
  tower_vuk:
    label: Tower VUK / Nakatomi Lock
    entrance_switch: s_towervuk
    ball_capacity: 3
    mechanical_eject: true
    auto_fire_on_unexpected_ball: false
    eject_targets: playfield
    eject_timeouts: 250ms
    eject_all_events: multiball_nakatomi_started
    ball_search_order: 60

  # ------------------------------------------------------------
  # AIRPLANE / CAPTIVE BALL
  # ------------------------------------------------------------
  # Captive ball / airplane device.
  # Kept later in ball search because it is stronger/mechanical.
  # ------------------------------------------------------------
  airplane:
    label: Airplane Captive Ball
    ball_switches: s_captiveball
    eject_coil: c_captivetarget
    eject_timeouts: 1s
    ball_search_order: 70