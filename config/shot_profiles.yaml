#config_version=6

shot_profiles:
  default:
    states: 
     - name: on
       show: flash
       loops: -1
       speed: 1
       sync_ms: 0
     - name: off
       show: off
       loops: -1
       speed: 1
       sync_ms: 0
  flash_color:
    states: 
     - name: off
       show: off
       loops: -1
       speed: 1
       sync_ms: 0
     - name: on
       show: flash_color
       loops: -1
       speed: 1
       sync_ms: 0
  profile_holly:
    states: 
     - name: off
       show: off
       loops: -1
       speed: 1
       sync_ms: 0
     - name: on
       show: led_color
       loops: -1
       speed: 1
       sync_ms: 0
  profile_mystery:
    states: 
     - name: off
       show: off
       loops: -1
       speed: 1
       sync_ms: 0
     - name: on
       show: flash_color
       loops: -1
       speed: 3
       sync_ms: 0
  profile_mystery_ho:
    states: 
     - name: off
       show: off
       loops: -1
       speed: 1
       sync_ms: 0
     - name: on
       show: led_color
       loops: 0
       speed: 1
       sync_ms: 0
  profile_bullets:
    advance_on_hit: false
    states: 
     - name: on
       show: led_color
       loops: -1
       speed: 1
       sync_ms: 0
       show_tokens: 
         color: ffffff
     - name: locked_out
       show: led_color
       loops: -1
       speed: 1
       sync_ms: 0
       show_tokens: 
         color: ff0000
     - name: flash
       show: flash_color
       loops: -1
       speed: 4
       sync_ms: 0
       show_tokens: 
         color: ffffff
     - name: complete
       show: led_color
       loops: -1
       speed: 1
       sync_ms: 0
       show_tokens: 
         color: ffff00
  shoot_again:
    states:
     - name: flashing
       show: flash_color_with_fade
       loops: -1
       speed: 2
       sync_ms: 0
       show_tokens: 
         lights: BALL_SAVE
         fade: 500
     - name: hurry
       show: flash_color
       loops: -1
       speed: 7
       sync_ms: 0
       show_tokens: 
         lights: BALL_SAVE
  qualify_ambush:
    states: 
     - name: unlit
       show: off
       loops: -1
       speed: 1
       sync_ms: 0
     - name: on
       show: flicker_color_on
       loops: -1
       speed: 4
       sync_ms: 0
       show_tokens: 
         color: F5D327
  ambush:
    advance_on_hit: false
    states: 
     - name: unlit
       show: off
       loops: -1
       speed: 1
       sync_ms: 0
     - name: on
       show: flash_color
       loops: -1
       speed: 4
       sync_ms: 0
       show_tokens: 
         color: 214dff
  profile_nakatomi_lock:
    advance_on_hit: True
    states: 
     - name: flashing
       show: flash_color
       loops: -1
       speed: 4
       sync_ms: 0
       show_tokens: 
         color: 00ff00
     - name: on
       show: led_color
       loops: -1
       speed: 1
       sync_ms: 0
       show_tokens: 
         color: 00ff00
  profile_off_then_flash:
    advance_on_hit: True
    states: 
     - name: off
       show: off
       loops: -1
       speed: 1
       sync_ms: 0
     - name: on
       show: flash_color
       loops: -1
       speed: 3
       sync_ms: 0
  profile_nakatomi:
    advance_on_hit: True
    states: 
     - name: on
       show: flash_color
       loops: -1
       speed: 3
       sync_ms: 0
       show_tokens: 
         color: ffffff
     - name: off
       show: off
       loops: -1
       speed: 1
       sync_ms: 0
  profile_central_park_lock:
    advance_on_hit: True
    states: 
     - name: off
       show: off
       loops: -1
       speed: 1
       sync_ms: 0
     - name: on
       show: flash_color_on
       loops: -1
       speed: 2
       sync_ms: 0
       show_tokens: 
        color: 00ff00
  profile_cp_single_bullet_advance:
   states: 
     - name: off
       show: off
       loops: -1
       speed: 1
       sync_ms: 0
     - name: on
       show: flash_color
       loops: -1
       speed: 3
       sync_ms: 0
       show_tokens: 
         color: 00ff00
     - name: off
       show: off
       loops: -1
       speed: 1
       sync_ms: 0
  profile_cp_jackpot:
    states:
     - name: off
       show: off
       loops: -1
       speed: 1
       sync_ms: 0
     - name: on
       show: flash_color_on
       loops: -1
       speed: 3
       sync_ms: 0
       show_tokens: 
         color: ffffff
     - name: off
       show: off
       loops: -1
       speed: 1
       sync_ms: 0
  profile_cp_bullets_advance:
    states: 
     - name: on
       show: flash_color
       loops: -1
       speed: 3
       sync_ms: 0
       show_tokens: 
         color: 00ff00
     - name: off
       show: off
       loops: -1
       speed: 1
       sync_ms: 0