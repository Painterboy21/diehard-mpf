#config_version=6

# ------------------------------------------------------------
# MAIN CONFIG
# ------------------------------------------------------------
# What this config does:
#   - Sets up FAST Neuron hardware.
#   - Loads all main device config files.
#   - Defines extra ball group rules.
#   - Defines flippers, drop targets, autofires, magnets, servos.
#   - Loads all active game modes.
# ------------------------------------------------------------
hardware:
  platform: fast

# ------------------------------------------------------------
# FAST CONFIG
# ------------------------------------------------------------
fast:
  net:
    controller: neuron
    io_loop:
      j:
        model: FP-I/O-0024
        order: 1
      d:
        model: FP-I/O-3208
        order: 2
      e:
        model: FP-I/O-1616
        order: 3
      f:
        model: FP-I/O-1616
        order: 4
  exp:
    port: auto
    boards:
      neuron:
        model: FP-EXP-2000
      playfield:
        model: FP-EXP-0071
      shakerboard:
        model: FP-EXP-1313
      cab:
        model: FP-EXP-0081
  aud:
    port: auto
    debug: false
    main_amp_enabled: true
    sub_amp_enabled: true
    headphones_amp_enabled: true
    main_steps: 20
    sub_steps: 20
    headphones_steps: 20
    default_main_volume: 30
    default_sub_volume: 60
    default_headphones_volume: 10
    persist_volume_settings: true
    max_hw_volume_main: 63
    max_hw_volume_sub: 63
    max_hw_volume_headphones: 63
    main_levels_list: None
    sub_levels_list: None
    headphones_levels_list: None
    link_sub_to_main: true
    link_headphones_to_main: false
    headphones_level: headphones
    mute_speakers_with_headphones: true

# ------------------------------------------------------------
# VIRTUAL PLATFORM START ACTIVE SWITCHES
# ------------------------------------------------------------
virtual_platform_start_active_switches:
  - s_trough1
  - s_trough2
  - s_trough3
  - s_trough4
  - s_trough5
  - s_trough6

# ------------------------------------------------------------
# CONFIG FILES
# ------------------------------------------------------------
config:
  - ball_devices.yaml
  - coils.yaml
  - lights.yaml
  - shot_profiles.yaml
  - switches.yaml
  - player_vars.yaml
  #- shaker.yaml

# ------------------------------------------------------------
# EXTRA BALL GROUPS
# ------------------------------------------------------------
extra_ball_groups:
  diehard_extra_balls:
    enabled: true
    max_per_game: 2
    max_lit: 1
    light_events:
      - light_extra_ball
    award_lit_events:
      - collect_lit_extra_ball

# ------------------------------------------------------------
# FLIPPERS
# ------------------------------------------------------------
flippers:
  left_flipper:
    main_coil: c_left_flipper_main
    hold_coil: c_left_flipper_hold
    eos_switch: s_left_flipper_eos
    use_eos: true
    repulse_on_eos_open: false
    activation_switch: s_left_flipper
    enable_events: ball_started, enableAutofire, flipper_on
    disable_events: ball_will_end, service_mode_entered, disableAutofire, flipper_off
  right_flipper:
    main_coil: c_right_flipper_main
    hold_coil: c_right_flipper_hold
    eos_switch: s_right_flipper_eos
    use_eos: true
    repulse_on_eos_open: false
    activation_switch: s_right_flipper
    enable_events: ball_started, enableAutofire, flipper_on
    disable_events: ball_will_end, service_mode_entered, disableAutofire, flipper_off
  left_top_flipper:
    main_coil: c_left_top_flipper_main
    hold_coil: c_left_top_flipper_hold
    eos_switch: s_top_flipper_eos
    use_eos: true
    repulse_on_eos_open: false
    activation_switch: s_left_flipper
    enable_events: ball_started, enableAutofire, flipper_on
    disable_events: ball_will_end, service_mode_entered, disableAutofire, flipper_off

# ------------------------------------------------------------
# DROP TARGETS
# ------------------------------------------------------------
drop_targets:
  bank1:
    switch: s_drop_target_1
    reset_coil: c_reset_drop_targets
  bank2:
    switch: s_drop_target_2
    reset_coil: c_reset_drop_targets
  bank3:
    switch: s_drop_target_3
    reset_coil: c_reset_drop_targets
  bank5:
    switch: s_push_drop_target_5
    reset_coil: c_reset_drop_target_vault
    knockdown_coil: c_push_drop_target_vault
    knockdown_events: mystery_close_vault
    reset_events: ball_starting, machine_reset_phase_3, mystery_open_vault

# ------------------------------------------------------------
# DROP TARGET BANKS
# ------------------------------------------------------------
drop_target_banks:
  bank:
    drop_targets:
      - bank1
      - bank2
      - bank3
    reset_coils: c_reset_drop_targets
    reset_events:
      - reset_drop_targets_after_delay

# ------------------------------------------------------------
# AUTOFIRE COILS
# ------------------------------------------------------------
autofire_coils:
  left_sling:
    coil: c_left_sling
    switch: s_left_sling
  right_sling:
    coil: c_right_sling
    switch: s_right_sling
  airplane:
    coil: c_captivetarget
    switch: s_captiveball
  popbumper_left:
    coil: c_popbumper_left
    switch: s_popbumper_left
  popbumper_right:
    coil: c_popbumper_right
    switch: s_popbumper_right

# ------------------------------------------------------------
# MAGNETS
# ------------------------------------------------------------
magnets:
  trmagrl:
    magnet_coil: c_trmagl
    grab_ball_events:
      - s_trmagl_active{machine.magnets_enabled}
      - central_park_start_multiball_hit
    enable_events:
      - ball_started
    release_ball_events:
      - trmagl_fling_release
      - start_central_park_multiball
  trmagr:
    magnet_coil: c_trmagr
    grab_ball_events:
      - s_trmagr_active{machine.magnets_enabled}
      - central_park_start_multiball_hit
    enable_events:
      - ball_started
    release_ball_events:
      - trmagr_fling_release
      - start_central_park_multiball

# ------------------------------------------------------------
# EVENT PLAYER
# ------------------------------------------------------------
event_player:
  s_trmagl_active{machine.magnets_enabled}:
    - trmagl_fling_release|350ms
  s_trmagr_active{machine.magnets_enabled}:
    - trmagr_fling_release|350ms
  drop_target_bank_bank_down:
    - reset_drop_targets_after_delay|1s

# ------------------------------------------------------------
# MACHINE VARS
# ------------------------------------------------------------
machine_vars:
  var_which_attract:
    value_type: int
    initial_value: 0
    persist: false
  magnets_enabled:
    value_type: int
    initial_value: 0
    persist: false

# ------------------------------------------------------------
# MODES
# ------------------------------------------------------------
modes:
  - attract
  - qualify_airplane
  - airplane_multiball
  - qualify_ambush
  - ambush
  - base
  - basement
  - bullets
  - high_scores
  - holly
  - score
  - mystery
  - skillshot
  - eob_bonus
  - service
  - super_jets
  - super_spinners
  - qualify_nakatomi
  - nakatomi_multiball
  - qualify_central_park
  - central_park_multiball
  - villain_select
  - col_difficulty_select
  - hans_difficulty_select
  - karl_difficulty_select
  - katya_difficulty_select
  - simon_difficulty_select
  - col_stuart_diehard
  - col_stuart_dieharder
  - hans_diehard
  - hans_dieharder
  - katya_diehard
  - katya_dieharder
  - karl_diehard
  - karl_dieharder
  - simon_diehard
  - bonus_x
  - playfield_x
  - iscored_sync
  - extra_ball

# ------------------------------------------------------------
# MACHINE / GAME
# ------------------------------------------------------------
machine:
  balls_installed: 6

game:
  balls_per_game: 3
  max_players: 4

# ------------------------------------------------------------
# PLAYFIELDS
# ------------------------------------------------------------
playfields:
  playfield:
    default_source_device: bd_plunger
    tags: default

# ------------------------------------------------------------
# VARIABLE PLAYER
# ------------------------------------------------------------
variable_player:
  increase_main_volume:
    fast_audio_main_volume:
      action: add_machine
      int: 1
  decrease_main_volume:
    fast_audio_main_volume:
      action: add_machine
      int: -1
  increase_sub_volume:
    fast_audio_sub_volume:
      action: add_machine
      int: 30
  decrease_sub_volume:
    fast_audio_sub_volume:
      action: add_machine
      int: -10
  increase_headphones_volume:
    fast_audio_headphones_volume:
      action: add_machine
      int: 1
  decrease_headphones_volume:
    fast_audio_headphones_volume:
      action: add_machine
      int: -1

# ------------------------------------------------------------
# SERVOS
# ------------------------------------------------------------
servos:
  servo1:
    number: playfield-1
    platform_settings:
      min_us: 0.2
      max_us: 0.2
      home_us: 0.2
      max_runtime: 2s
    reset_position: 0.2
    reset_events: game_started, ball_ended
    positions:
      0.2: wire_ramp_exit_closed
      0.90: wire_ramp_exit_open
  servo2:
    number: playfield-2
    platform_settings:
      min_us: 400
      max_us: 2500
      home_us: 400
      max_runtime: 5s
    reset_position: 0
    reset_events: game_started
    positions:
      0: nakatomi_entrance_lock_close
      0.90: nakatomi_entrance_lock_open
  servo3:
    number: playfield-3
    platform_settings:
      min_us: 1350
      max_us: 2500
      home_us: 1350
      max_runtime: 65525ms
    reset_position: 0.9
    reset_events: reset_complete, game_started, game_ended
    positions:
      0: nakatomi_lock_open
      0.9: nakatomi_lock_close
  servo4:
    number: playfield-4
    platform_settings:
      min_us: 650
      max_us: 2500
      home_us: 600
      max_runtime: 3s
    reset_position: 0.1
    reset_events: game_started, ball_ended
    positions:
      0.1: mystery_close_vault
      0.90: mystery_open_vault

# ------------------------------------------------------------
# COIL PLAYER
# ------------------------------------------------------------
coil_player:
  reset_complete:
    c_cab_coin_return_left_right:
      action: enable
      hold_power: 1
    c_cab_start_button:
      action: enable
      hold_power: 0.4