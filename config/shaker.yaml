#config_version=6

shakers:
  main_shaker:
    number: shakerboard-1
    debug: false
    default_power: 0.25

    control_events:
      service_test_shaker_light:
        power: 0.15
        duration: 150ms

      service_test_shaker_medium:
        power: 0.25
        duration: 200ms

      service_test_shaker_strong:
        power: 0.35
        duration: 250ms