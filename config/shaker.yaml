#config_version=6
# ------------------------------------------------------------
# SHAKER MOTOR
# Stern-style: light on normal play, strong on locks, starts,
# jackpots, super jackpots, wins and fails.
# ------------------------------------------------------------

shakers:
  main_shaker:
    number: shakerboard-1
    debug: true
    default_power: 0.5

    control_events:

      # ------------------------------------------------------------
      # SERVICE MODE TESTS
      # ------------------------------------------------------------
      service_test_shaker_light:
        power: 0.25
        duration: 250ms

      service_test_shaker_medium:
        power: 0.45
        duration: 400ms

      service_test_shaker_strong:
        power: 0.65
        duration: 600ms

      # ------------------------------------------------------------
      # GENERAL PLAYFIELD - light texture only
      # ------------------------------------------------------------
      skillshot_hit:
        power: 0.35
        duration: 350ms

      skillshot_hit_fast:
