#show_version=6

- time: 0
  lights:
    GI: 000000%100
    NONRGB: 000000%100
    INSERT: 000000%100
  slides:
    eob_bonus:
      action: play
      expire: 0s

- time: 1s
  shows:
    ball_drain:
      key: key_eob_bonus_ball_drain
      loops: 0

- time: 5s
  widgets:
    widget_eob_bullets:
      action: play
      expire: 6s
  sounds:
    gunfire_fx:
      key: snd_gunfire_eob_bullets
      action: play

- time: 5.04s
  shows:
    flicker_color:
      key: key_eob_bonus_bullet_flash
      loops: 0
      speed: 2
      show_tokens:
        lights: BONUS_BULLET
        color: ff0000

