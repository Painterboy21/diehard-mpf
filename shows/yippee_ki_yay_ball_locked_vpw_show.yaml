# ------------------------------------------------------------
# YIPPEE KI YAY - BALL LOCKED VPW-STYLE SHOW
# ------------------------------------------------------------
# Special FAST normal-bulb spot boards:
#   - l132 = left-ramp spot board
#   - l136 = front spot board/device
#   - l138 = rear/pop bumper spot board
#   - Use ffffff for ON and 000000 for OFF.
#   - Do not use internal/comment-only VPW lamp names l130/l133/l135/l137.
#   - Avoids l80/l81/l82/l83.
# ------------------------------------------------------------
