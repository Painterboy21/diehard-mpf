#config_version=6

# ------------------------------------------------------------
# EXTRA BALL
# ------------------------------------------------------------
# Starts each ball, lights/collects Extra Ball, handles Shoot Again,
# and fixes the right VUK clash with villain select.
#
# If Extra Ball and Villain Start are both ready:
#   Extra Ball collects first, then villain select starts after 2.5s.
# ------------------------------------------------------------
mode:
  start_events:
    - ball_started
  stop_events:
    - ball_ended
  priority: 155

# ------------------------------------------------------------
# EXTRA BALL DEVICE
# ------------------------------------------------------------
extra_balls:
  diehard_extra_ball:
    group: diehard_extra_balls
    enabled: true
    award_events:
      - collect_lit_extra_ball
    max_per_game: 2

# ------------------------------------------------------------
# BALL HOLD
# Holds/releases the right VUK during Extra Ball collection.
# This no longer waits for slide_extra_ball_removed.
# ------------------------------------------------------------
ball_holds:
  extra_ball_collect_hold:
    enable_events:
      - extra_ball_lit
    disable_events:
      - extra_ball_then_start_villain_delay
      - extra_ball_collected
      - extra_ball_used
      - ball_ended
    hold_devices: rightvuk
    balls_to_hold: 1
    release_all_events:
      - extra_ball_then_start_villain_delay
      - extra_ball_collected
      - tilt
      - ball_ended

# ------------------------------------------------------------
# EVENT PLAYER
# Handles Extra Ball lighting, collection, delayed villain start,
# villain completion counting, multiball counting, and Shoot Again.
# ------------------------------------------------------------
event_player:
  light_extra_ball_from_mystery{current_player.diehard_extra_balls_awarded < 2 and current_player.extra_balls_lit == 0 and current_player.extra_ball_owed == 0}:
    - light_extra_ball
    - extra_ball_lit
  light_extra_ball_from_modes{current_player.diehard_extra_balls_awarded < 2 and current_player.extra_balls_lit == 0 and current_player.extra_ball_owed == 0}:
    - light_extra_ball
    - extra_ball_lit
  light_extra_ball_from_multiballs{current_player.diehard_extra_balls_awarded < 2 and current_player.extra_balls_lit == 0 and current_player.extra_ball_owed == 0}:
    - light_extra_ball
    - extra_ball_lit

  extra_ball_lit:
    - extra_ball_flash_on|50ms
  mode_extra_ball_started{current_player.extra_balls_lit == 1 and current_player.extra_ball_owed == 0}:
    - extra_ball_flash_on|50ms
  extra_ball_flash_on{current_player.extra_balls_lit == 1 and current_player.extra_ball_owed == 0}:
    - extra_ball_flash_off|350ms
  extra_ball_flash_off{current_player.extra_balls_lit == 1 and current_player.extra_ball_owed == 0}:
    - extra_ball_flash_on|350ms

  # ------------------------------------------------------------
  # RIGHT VUK EXTRA BALL COLLECTION
  # If villain start is ready from bullets, collect Extra Ball first,
  # then start villain select after the award slide has had time to show.
  # ------------------------------------------------------------
  s_rightvuk_active{current_player.extra_balls_lit == 1 and current_player.bullet_hits >= 15}:
    - set_start_villain_after_extra_ball
    - collect_lit_extra_ball
    - extra_ball_collected
    - extra_ball_then_start_villain_delay|2500ms

  s_rightvuk_active{current_player.extra_balls_lit == 1 and current_player.bullet_hits < 15}:
    - collect_lit_extra_ball
    - extra_ball_collected

  # ------------------------------------------------------------
  # DELAYED VILLAIN START AFTER EXTRA BALL
  # This replaces slide_extra_ball_removed for this flow.
  # ------------------------------------------------------------
  extra_ball_then_start_villain_delay{current_player.start_villain_after_extra_ball == 1}:
    - start_villain_select
    - reset_bullet_total|100ms
    - reset_bullets|100ms
    - clear_start_villain_after_extra_ball|150ms

  mode_extra_ball_started{current_player.extra_ball_owed == 1}:
    - show_shoot_again_slide
    - extra_ball_used|2s

  # ------------------------------------------------------------
  # VILLAIN EXTRA BALL CHECKS
  # Each completed villain counts once toward lighting Extra Ball.
  # ------------------------------------------------------------
  count_hans_for_extra_ball:
    - check_villain_extra_ball|100ms
  count_karl_for_extra_ball:
    - check_villain_extra_ball|100ms
  count_katya_for_extra_ball:
    - check_villain_extra_ball|100ms
  count_simon_for_extra_ball:
    - check_villain_extra_ball|100ms
  count_stuart_for_extra_ball:
    - check_villain_extra_ball|100ms

  check_villain_extra_ball{current_player.villain_extra_ball_count >= 2 and current_player.extra_ball_mode_awarded == 0 and current_player.diehard_extra_balls_awarded < 2 and current_player.extra_balls_lit == 0 and current_player.extra_ball_owed == 0}:
    - light_extra_ball_from_modes
    - mark_mode_extra_ball_awarded

  # ------------------------------------------------------------
  # MULTIBALL EXTRA BALL CHECKS
  # ------------------------------------------------------------
  count_nakatomi_for_extra_ball:
    - check_multiball_extra_ball|100ms
  count_airplane_for_extra_ball:
    - check_multiball_extra_ball|100ms
  count_park_for_extra_ball:
    - check_multiball_extra_ball|100ms

  check_multiball_extra_ball{current_player.multiball_extra_ball_count >= 2 and current_player.diehard_extra_balls_awarded < 2 and current_player.extra_balls_lit == 0 and current_player.extra_ball_owed == 0}:
    - light_extra_ball_from_multiballs
    - mark_mball_extra_ball_awarded

# ------------------------------------------------------------
# VARIABLE PLAYER
# Stores Extra Ball state, awarded counts, villain/multiball count
# flags, and the pending villain-after-extra-ball flag.
# ------------------------------------------------------------
variable_player:
  mode_extra_ball_started{current_player.extra_balls_lit == None}:
    extra_balls_lit:
      action: set
      int: 0
  mode_extra_ball_started{current_player.extra_ball_owed == None}:
    extra_ball_owed:
      action: set
      int: 0
  mode_extra_ball_started{current_player.diehard_extra_balls_awarded == None}:
    diehard_extra_balls_awarded:
      action: set
      int: 0
  mode_extra_ball_started{current_player.extra_ball_mode_awarded == None}:
    extra_ball_mode_awarded:
      action: set
      int: 0
  mode_extra_ball_started{current_player.extra_ball_mball_awarded == None}:
    extra_ball_mball_awarded:
      action: set
      int: 0
  mode_extra_ball_started{current_player.start_villain_after_extra_ball == None}:
    start_villain_after_extra_ball:
      action: set
      int: 0

  extra_ball_lit:
    extra_balls_lit:
      action: set
      int: 1

  extra_ball_collected:
    extra_balls_lit:
      action: set
      int: 0
    extra_ball_owed:
      action: set
      int: 1
    diehard_extra_balls_awarded:
      action: add
      int: 1

  extra_ball_used:
    extra_ball_owed:
      action: set
      int: 0

  set_start_villain_after_extra_ball:
    start_villain_after_extra_ball:
      action: set
      int: 1

  clear_start_villain_after_extra_ball:
    start_villain_after_extra_ball:
      action: set
      int: 0

  mode_extra_ball_started{current_player.villain_extra_ball_count == None}:
    villain_extra_ball_count:
      action: set
      int: 0
  mode_extra_ball_started{current_player.hans_eb_counted == None}:
    hans_eb_counted:
      action: set
      int: 0
  mode_extra_ball_started{current_player.karl_eb_counted == None}:
    karl_eb_counted:
      action: set
      int: 0
  mode_extra_ball_started{current_player.katya_eb_counted == None}:
    katya_eb_counted:
      action: set
      int: 0
  mode_extra_ball_started{current_player.simon_eb_counted == None}:
    simon_eb_counted:
      action: set
      int: 0
  mode_extra_ball_started{current_player.stuart_eb_counted == None}:
    stuart_eb_counted:
      action: set
      int: 0

  count_hans_for_extra_ball{current_player.hans_eb_counted == 0}:
    hans_eb_counted:
      action: set
      int: 1
    villain_extra_ball_count:
      action: add
      int: 1
  count_karl_for_extra_ball{current_player.karl_eb_counted == 0}:
    karl_eb_counted:
      action: set
      int: 1
    villain_extra_ball_count:
      action: add
      int: 1
  count_katya_for_extra_ball{current_player.katya_eb_counted == 0}:
    katya_eb_counted:
      action: set
      int: 1
    villain_extra_ball_count:
      action: add
      int: 1
  count_simon_for_extra_ball{current_player.simon_eb_counted == 0}:
    simon_eb_counted:
      action: set
      int: 1
    villain_extra_ball_count:
      action: add
      int: 1
  count_stuart_for_extra_ball{current_player.stuart_eb_counted == 0}:
    stuart_eb_counted:
      action: set
      int: 1
    villain_extra_ball_count:
      action: add
      int: 1

  mode_extra_ball_started{current_player.multiball_extra_ball_count == None}:
    multiball_extra_ball_count:
      action: set
      int: 0
  mode_extra_ball_started{current_player.nakatomi_eb_counted == None}:
    nakatomi_eb_counted:
      action: set
      int: 0
  mode_extra_ball_started{current_player.airplane_eb_counted == None}:
    airplane_eb_counted:
      action: set
      int: 0
  mode_extra_ball_started{current_player.park_eb_counted == None}:
    park_eb_counted:
      action: set
      int: 0

  count_nakatomi_for_extra_ball{current_player.nakatomi_eb_counted == 0}:
    nakatomi_eb_counted:
      action: set
      int: 1
    multiball_extra_ball_count:
      action: add
      int: 1
  count_airplane_for_extra_ball{current_player.airplane_eb_counted == 0}:
    airplane_eb_counted:
      action: set
      int: 1
    multiball_extra_ball_count:
      action: add
      int: 1
  count_park_for_extra_ball{current_player.park_eb_counted == 0}:
    park_eb_counted:
      action: set
      int: 1
    multiball_extra_ball_count:
      action: add
      int: 1

  mark_mode_extra_ball_awarded:
    extra_ball_mode_awarded:
      action: set
      int: 1
  mark_mball_extra_ball_awarded:
    extra_ball_mball_awarded:
      action: set
      int: 1

# ------------------------------------------------------------
# LIGHT PLAYER
# l63 flashes red while Extra Ball is lit.
# l63 stays solid red while Extra Ball is owed.
# l63 turns off after Shoot Again is used.
# ------------------------------------------------------------
light_player:
  extra_ball_flash_on{current_player.extra_balls_lit == 1 and current_player.extra_ball_owed == 0}:
    l63:
      color: red
      priority: 9999
  extra_ball_flash_off{current_player.extra_balls_lit == 1 and current_player.extra_ball_owed == 0}:
    l63:
      color: off
      priority: 9999
  extra_ball_collected:
    l63:
      color: red
      priority: 9999
  show_shoot_again_slide:
    l63:
      color: red
      priority: 9999
  extra_ball_used:
    l63:
      color: off
      priority: 9999
  ball_ended{current_player.extra_ball_owed == 0 and current_player.extra_balls_lit == 0}:
    l63:
      color: off
      priority: 9999

# ------------------------------------------------------------
# SLIDE PLAYER
# Shows Extra Ball Lit, Extra Ball Collected, and Shoot Again.
# ------------------------------------------------------------
slide_player:
  extra_ball_lit:
    extra_ball_lit:
      action: play
      priority: 900
      expire: 4s

  extra_ball_collected:
    extra_ball:
      action: play
      priority: 950
      expire: 4s

  show_shoot_again_slide:
    shoot_again:
      action: play
      priority: 9999
      expire: 4s