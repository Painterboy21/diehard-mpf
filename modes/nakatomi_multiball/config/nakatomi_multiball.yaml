#config_version=6

mode:
  start_events:
    - start_nakatomi_multiball
  stop_events:
    - ball_ended
    - multiball_nakatomi_ended
  priority: 120

# ------------------------------------------------------------
# LIGHT PLAYER
# Sets Nakatomi Multiball lighting.
# ------------------------------------------------------------
light_player:
  mode_nakatomi_multiball_started:
    GI:
      color: ffb700
    SPOTS:
      color: 505050
    SPOTS_BUMPER:
      color: 969650

# ------------------------------------------------------------
# BALL HOLDS
# Holds balls in the tower VUK for the Super Jackpot.
# Original style restored.
# ------------------------------------------------------------
ball_holds:
  nakatomi_super_hold:
    enable_events:
      - nakatomi_enable_super_jackpot
    hold_devices:
      - tower_vuk
    balls_to_hold: 2
    release_all_events:
      - tilt
      - nakatomi_disable_super_jackpot

# ------------------------------------------------------------
# EVENT PLAYER
# Handles jackpot scoring, Super Jackpot enable/disable,
# lock opening/closing, and Extra Ball bridge count.
# ------------------------------------------------------------
event_player:
  nakatomi_jackpots_on_hit.1:
    - jackpot_2mil
    - nakatomi_jackpot_collected

  nakatomi_jackpots_off_complete:
    - nakatomi_enable_super_jackpot
    - nakatomi_lock_open
    - nakatomi_entrance_lock_open

  ball_hold_nakatomi_super_hold_held_ball:
    - jackpot_20mil
    - nakatomi_super_jackpot_collected
    - nakatomi_entrance_lock_close

  nakatomi_super_jackpot_collected:
    - stop_nakatomi_super_jackpot_show|4s

  slide_nakatomi_super_jackpot_removed{device.ball_holds.nakatomi_super_hold.balls_held==2}:
    - nakatomi_disable_super_jackpot
    - nakatomi_lock_close

  multiball_nakatomi_ended.1:
    - nakatomi_lock_close
    - nakatomi_entrance_lock_close
    - count_nakatomi_for_extra_ball

# ------------------------------------------------------------
# MULTIBALLS
# Starts the 3-ball Nakatomi Multiball.
# Uses the tower VUK as the lock device.
# ------------------------------------------------------------
multiballs:
  nakatomi:
    start_events:
      - mode_nakatomi_multiball_started
    ball_count: 3
    ball_count_type: total
    shoot_again: 20000
    hurry_up_time: 3000
    grace_period: 2000
    ball_locks:
      - tower_vuk
    add_a_ball_events:
      - add_a_ball_in_multiball
    add_a_ball_shoot_again: 10s

# ------------------------------------------------------------
# SHOT GROUPS
# Tracks all Nakatomi Jackpot shots.
# Completing all jackpot shots enables Super Jackpot.
# ------------------------------------------------------------
shot_groups:
  nakatomi_jackpots:
    shots:
      - bullet_left_orbit_nakatomi
      - bullet_upper_pf_nakatomi
      - bullet_right_orbit_nakatomi
      - bullet_mid_orbit_nakatomi
      - bullet_air_duct_nakatomi
    restart_events:
      - nakatomi_disable_super_jackpot

# ------------------------------------------------------------
# SHOTS
# Nakatomi Jackpot and Super Jackpot shots.
# Air duct is your real-machine right ramp shot.
# ------------------------------------------------------------
shots:
  bullet_left_orbit_nakatomi:
    profile: profile_nakatomi
    start_enabled: true
    show_tokens:
      lights: l20
    hit_events:
      - left_orbit_hit

  bullet_upper_pf_nakatomi:
    switch: s_upper_pf_entrance
    profile: profile_nakatomi
    start_enabled: true
    show_tokens:
      lights: l21

  bullet_right_orbit_nakatomi:
    profile: profile_nakatomi
    start_enabled: true
    show_tokens:
      lights: l22
    hit_events:
      - right_orbit_hit

  bullet_mid_orbit_nakatomi:
    switch: s_mid_orbit
    profile: profile_nakatomi
    start_enabled: true
    show_tokens:
      lights: l23

  bullet_air_duct_nakatomi:
    switch: s_air_duct
    profile: profile_nakatomi
    start_enabled: true
    show_tokens:
      lights: l24

  nakatomi_super_jackpot:
    profile: profile_off_then_flash
    show_tokens:
      lights: l7
      color: ff0000
    control_events:
      - events: nakatomi_enable_super_jackpot
        state: 1
      - events: nakatomi_disable_super_jackpot
        state: 0

# ------------------------------------------------------------
# SLIDE PLAYER
# Plays the jackpot and Super Jackpot slides.
# ------------------------------------------------------------
slide_player:
  nakatomi_jackpot_collected:
    jackpot:
      action: play
      expire: 0s

  nakatomi_super_jackpot_collected:
    nakatomi_super_jackpot:
      action: play
      expire: 0s

# ------------------------------------------------------------
# WIDGET PLAYER
# Shows/removes Super Jackpot lit and collected widgets.
# ------------------------------------------------------------
widget_player:
  nakatomi_enable_super_jackpot:
    nakatomi_super_jackpot_lit:
      action: play

  nakatomi_disable_super_jackpot:
    nakatomi_super_jackpot_lit:
      action: remove

  nakatomi_super_jackpot_collected:
    nakatomi_super_jackpot_widget:
      action: play
      expire: 0s

# ------------------------------------------------------------
# SHOW PLAYER
# Plays jackpot shot shows and the Super Jackpot show.
# Super Jackpot show loops for 4 seconds, then stops.
# ------------------------------------------------------------
show_player:
  nakatomi_super_jackpot_collected:
    nakatomi_super_jackpot:
      key: nakatomi_super_jackpot_collected
      loops: -1
      speed: 2

  stop_nakatomi_super_jackpot_show:
    nakatomi_super_jackpot:
      key: nakatomi_super_jackpot_collected
      action: stop

  bullet_left_orbit_nakatomi_on_hit:
    nakatomi_jackpot_left_orbit:
      key: bullet_left_orbit_nakatomi_hit
      loops: 0
      speed: 2

  bullet_upper_pf_nakatomi_on_hit:
    nakatomi_jackpot_park:
      key: bullet_upper_pf_nakatomi_on_hit
      loops: 0
      speed: 2

  bullet_air_duct_nakatomi_on_hit:
    nakatomi_jackpot_vent:
      key: bullet_air_duct_nakatomi_on_hit
      loops: 0
      speed: 2

  bullet_mid_orbit_nakatomi_on_hit:
    nakatomi_jackpot_mid_orbit:
      key: bullet_mid_orbit_nakatomi_on_hit
      loops: 0
      speed: 2

  bullet_right_orbit_nakatomi_on_hit:
    nakatomi_jackpot_right_orbit:
      key: bullet_right_orbit_nakatomi_on_hit
      loops: 0
      speed: 2

# ------------------------------------------------------------
# COIL PLAYER
# Original style restored:
# pulses the tower VUK eject coil when Super Jackpot hold fires.
# ------------------------------------------------------------
coil_player:
  ball_hold_nakatomi_super_hold_held_ball:
    c_towervuk_eject:
      action: pulse

# ------------------------------------------------------------
# VARIABLE PLAYER
# Sets Nakatomi played state, resets Super Jackpot lock count,
# awards EOB multiball bonus, and scores jackpots.
# ------------------------------------------------------------
variable_player:
  mode_nakatomi_multiball_started:
    played_nakatomi_multiball:
      action: set
      int: 1
    nakatomi_multiball_supers_locked:
      action: set
      int: 0
    eob_bonus_multiball:
      action: add
      int: 300000

  nakatomi_super_jackpot_collected:
    nakatomi_multiball_supers_locked:
      action: add
      int: 1

  nakatomi_disable_super_jackpot:
    nakatomi_multiball_supers_locked:
      action: set
      int: 0

  jackpot_2mil:
    score:
      action: add
      int: "2000000 * current_player.playfield_multiplier"
    last_jackpot_value:
      action: set
      int: "2000000 * current_player.playfield_multiplier"

  jackpot_20mil:
    score:
      action: add
      int: "20000000 * current_player.playfield_multiplier"
    last_jackpot_value:
      action: set
      int: "20000000 * current_player.playfield_multiplier"
    nakatomi_super_jackpot_collected:
      action: set
      int: 1

# ------------------------------------------------------------
# SOUND PLAYER
# Starts/stops Nakatomi Multiball music.
# File:
# sounds/src/Johns Escape-You Want Money.mp3
# ------------------------------------------------------------
sound_player:
  mode_nakatomi_multiball_started:
    Johns Escape-You Want Money:
      key: main_music
      action: play
      loops: -1
      volume: 0.8

  mode_nakatomi_multiball_stopping:
    Johns Escape-You Want Money:
      key: main_music
      action: stop