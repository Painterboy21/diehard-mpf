#config_version=6
# ------------------------------------------------------------
# WIZARD CHECK
# ------------------------------------------------------------
# What this mode does:
#   - Runs during each ball.
#   - Checks whether all five main villains have been completed.
#   - Uses named villain complete variables instead of modes_complete.
#   - Posts yippee_ki_yay_wizard_ready once all five are complete.
#   - Flashes l8 red for Yippee Ki Yay qualified.
#   - Flashes l10 yellow to show the VUK / Start Villain shot.
#   - Starts wizard_intro while the ball is held in the right VUK.
#   - Uses slide_wizard_intro_removed to post wizard_intro_finished.
#   - Then starts Yippee Ki Yay Wizard and releases the VUK.
#   - Wizard takes priority over normal villain select.
#   - TEMP TEST: fakes all five villains complete shortly after mode start.
# ------------------------------------------------------------
mode:
  start_events:
    - ball_started
  stop_events:
    - ball_ending
  priority: 165
# ------------------------------------------------------------
# EVENT PLAYER
# ------------------------------------------------------------
# Checks wizard qualification on mode start and after any villain
# completion event.
# Starts wizard_intro from the same VUK hold used by villain select.
# The real wizard mode starts only after wizard_intro_finished.
# slide_wizard_intro_removed is used because GMC already posts it
# when the intro video/slide has finished and removed.
# TEMP TEST: mode start fakes all five villains complete for real-table testing.
# Keep test_fake_all_villains_complete|2s until the wizard flow is finished.
# ------------------------------------------------------------
event_player:
  mode_wizard_check_started:
    - test_fake_all_villains_complete|2s
    - check_yippee_ki_yay_wizard_ready|3s
  hans_diehard_won_complete:
    - check_yippee_ki_yay_wizard_ready|500ms
  hans_dieharder_won_complete:
    - check_yippee_ki_yay_wizard_ready|500ms
  katya_completed:
    - check_yippee_ki_yay_wizard_ready|500ms
  katya_dieharder_completed:
    - check_yippee_ki_yay_wizard_ready|500ms
  karl_diehard_completed:
    - check_yippee_ki_yay_wizard_ready|500ms
  karl_dieharder_completed:
    - check_yippee_ki_yay_wizard_ready|500ms
  simon_completed:
    - check_yippee_ki_yay_wizard_ready|500ms
  simon_dieharder_completed:
    - check_yippee_ki_yay_wizard_ready|500ms
  col_stuart_diehard_completed:
    - check_yippee_ki_yay_wizard_ready|500ms
  col_stuart_dieharder_completed:
    - check_yippee_ki_yay_wizard_ready|500ms
  test_fake_all_villains_complete:
    - check_yippee_ki_yay_wizard_ready|500ms
  check_yippee_ki_yay_wizard_ready{current_player.hans_complete == 1 and current_player.katya_complete == 1 and current_player.karl_complete == 1 and current_player.simon_complete == 1 and current_player.col_stuart_complete == 1 and current_player.yippee_ki_yay_wizard_ready != 1}:
    - yippee_ki_yay_wizard_ready
  ball_hold_villain_hold_full{current_player.yippee_ki_yay_wizard_ready == 1 and current_player.yippee_ki_yay_wizard_started != 1 and current_player.wizard_intro_running != 1}:
    - wizard_intro_started
  slide_wizard_intro_removed{current_player.wizard_intro_running == 1 and current_player.yippee_ki_yay_wizard_started != 1}:
    - wizard_intro_finished
  wizard_intro_finished{current_player.yippee_ki_yay_wizard_ready == 1 and current_player.yippee_ki_yay_wizard_started != 1}:
    - start_yippee_ki_yay_wizard
    - release_villain_select_vuk|250ms
# ------------------------------------------------------------
# VARIABLE PLAYER
# ------------------------------------------------------------
# Stores wizard ready state once all five villains are complete.
# Stores wizard intro state so the intro cannot double-start.
# Stores wizard started state so the VUK hold cannot double-start it.
# TEMP TEST: test_fake_all_villains_complete sets all five villain complete vars.
# ------------------------------------------------------------
variable_player:
  mode_wizard_check_started{current_player.yippee_ki_yay_wizard_ready == None}:
    yippee_ki_yay_wizard_ready:
      action: set
      int: 0
  mode_wizard_check_started{current_player.yippee_ki_yay_wizard_started == None}:
    yippee_ki_yay_wizard_started:
      action: set
      int: 0
  mode_wizard_check_started{current_player.wizard_intro_running == None}:
    wizard_intro_running:
      action: set
      int: 0
  test_fake_all_villains_complete:
    hans_complete:
      action: set
      int: 1
    katya_complete:
      action: set
      int: 1
    karl_complete:
      action: set
      int: 1
    simon_complete:
      action: set
      int: 1
    col_stuart_complete:
      action: set
      int: 1
    yippee_ki_yay_wizard_ready:
      action: set
      int: 0
    wizard_mode_ready:
      action: set
      int: 0
    yippee_ki_yay_wizard_started:
      action: set
      int: 0
    wizard_intro_running:
      action: set
      int: 0
  test_clear_wizard_fake:
    hans_complete:
      action: set
      int: 0
    katya_complete:
      action: set
      int: 0
    karl_complete:
      action: set
      int: 0
    simon_complete:
      action: set
      int: 0
    col_stuart_complete:
      action: set
      int: 0
    yippee_ki_yay_wizard_ready:
      action: set
      int: 0
    wizard_mode_ready:
      action: set
      int: 0
    yippee_ki_yay_wizard_started:
      action: set
      int: 0
    wizard_intro_running:
      action: set
      int: 0
    villain_start_ready:
      action: set
      int: 0
  yippee_ki_yay_wizard_ready:
    yippee_ki_yay_wizard_ready:
      action: set
      int: 1
    wizard_mode_ready:
      action: set
      int: 1
  wizard_intro_started:
    wizard_intro_running:
      action: set
      int: 1
  wizard_intro_finished:
    wizard_intro_running:
      action: set
      int: 0
  start_yippee_ki_yay_wizard:
    yippee_ki_yay_wizard_started:
      action: set
      int: 1
    villain_start_ready:
      action: set
      int: 0
# ------------------------------------------------------------
# SLIDE PLAYER
# ------------------------------------------------------------
# Plays wizard_intro while the ball is held in the right VUK.
# When GMC removes the slide, slide_wizard_intro_removed posts
# wizard_intro_finished through the event_player above.
# ------------------------------------------------------------
slide_player:
  wizard_intro_started:
    wizard_intro:
      action: play
      expire: 0s
  wizard_intro_finished:
    wizard_intro:
      action: remove
# ------------------------------------------------------------
# SHOW PLAYER
# ------------------------------------------------------------
# Wizard ready flashes the centre Yippee Ki Yay insert red.
# The VUK / Start Villain insert flashes yellow to show where to shoot.
# Wizard intro start stops both qualify flashes.
# Temporary clear event also stops both qualify flashes.
# ------------------------------------------------------------
show_player:
  yippee_ki_yay_wizard_ready:
    wizard_check_yippee_ready_red_flash:
      key: wizard_check_yippee_ready_red_flash
      priority: 2000
      loops: -1
    wizard_check_vuk_ready_yellow_flash:
      key: wizard_check_vuk_ready_yellow_flash
      priority: 2000
      loops: -1
  wizard_intro_started:
    wizard_check_yippee_ready_red_flash:
      action: stop
    wizard_check_vuk_ready_yellow_flash:
      action: stop
  start_yippee_ki_yay_wizard:
    wizard_check_yippee_ready_red_flash:
      action: stop
    wizard_check_vuk_ready_yellow_flash:
      action: stop
  test_clear_wizard_fake:
    wizard_check_yippee_ready_red_flash:
      action: stop
    wizard_check_vuk_ready_yellow_flash:
      action: stop
# ------------------------------------------------------------
# LIGHT PLAYER
# ------------------------------------------------------------
# Turns off both wizard qualify lights when the intro starts,
# when wizard starts, or when the fake test is cleared.
# ------------------------------------------------------------
light_player:
  wizard_intro_started:
    l8:
      color: off
      priority: 5000
    l10:
      color: off
      priority: 5000
  start_yippee_ki_yay_wizard:
    l8:
      color: off
      priority: 5000
    l10:
      color: off
      priority: 5000
  test_clear_wizard_fake:
    l8:
      color: off
      priority: 5000
    l10:
      color: off
      priority: 5000
# ------------------------------------------------------------
# SHOWS
# ------------------------------------------------------------
# Local wizard-check flashes so l8 and l10 can use different colours.
# l8  = Yippee Ki Yay insert, red flash.
# l10 = VUK / Start Villain insert, yellow flash.
# ------------------------------------------------------------
shows:
  wizard_check_yippee_ready_red_flash:
    - time: 0
      lights:
        l8: ff0000
    - time: 250ms
      lights:
        l8: off
    - time: 500ms
  wizard_check_vuk_ready_yellow_flash:
    - time: 0
      lights:
        l10: ffff00
    - time: 250ms
      lights:
        l10: off
    - time: 500ms