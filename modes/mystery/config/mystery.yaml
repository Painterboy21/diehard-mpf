      action: play
      expire: 3s

  mystery_award_ball_save:
    mystery_award_ball_save:
      action: play
      expire: 3s

  mystery_award_bonus_x:
    mystery_award_bonus_x:
      action: play
      expire: 3s

  mystery_award_hold_bonus_x:
    mystery_award_hold_bonus_x:
      action: play
