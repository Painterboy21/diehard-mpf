#config_version=6

# ------------------------------------------------------------
# MYSTERY / VAULT
# ------------------------------------------------------------
# What this mode does:
#   - Starts with every ball and manages the real-machine Mystery/Vault.
#   - Vault opens from H/O targets using HO, then HOHO, then HOHOHO.
#   - H and O can be hit in any order.
#   - Holds the ball in the vault, scrolls Mystery, chooses an award, then releases.
#   - First Mystery during multiball gives Add-A-Ball.
#   - First Mystery during a villain mode gives Add More Time.
#   - Mystery uses playfield_x_max for Playfield X cap.
#   - Award display clears after every award so the current mode returns.
# ------------------------------------------------------------
mode:
  start_events: ball_started
  stop_events: ball_ended
  priority: 115

ball_holds:
  mystery_hold:
    enable_events: mystery_open_vault
    disable_events: mystery_awarded
    hold_devices: kickervault1_eject
    balls_to_hold: 1
    release_all_events:
      - tilt
      - mystery_awarded

shots:
  vault_h:
    switch: s_holly_h
    profile: profile_mystery_ho
    start_enabled: true
  vault_o:
    switch: s_holly_o
    profile: profile_mystery_ho
    start_enabled: true
  vault_mystery:
    profile: profile_mystery
    show_tokens:
      lights: l60
      color: 00ff00
    control_events:
      - events: mystery_close_vault
        state: 0
      - events: mystery_open_vault
        state: 1

