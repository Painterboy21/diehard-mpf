#config_version=6

mode:
  start_events: ball_started
  stop_events: ball_ended
  priority: 115


ball_holds:
  mystery_hold:
    enable_events: mystery_open_vault
    disable_events: mystery_awarded
    hold_devices: kickervault1_eject
    balls_to_hold: 1
    release_all_events:
      - tilt
      - mystery_awarded


shots:
  vault_h:
    switch: s_holly_h
    profile: profile_mystery_ho
    start_enabled: true
    show_tokens:
      lights: l30
      color: 00ff00

  vault_o:
    switch: s_holly_o
    profile: profile_mystery_ho
    start_enabled: true
    show_tokens:
      lights: l31
      color: 00ff00

  vault_mystery:
    profile: profile_mystery
    show_tokens:
      lights: l60
      color: 00ff00
    control_events:
      - events: mystery_close_vault
        state: 0
      - events: mystery_open_vault
        state: 1


event_player:
  mode_mystery_started:
    - mystery_close_vault
    - mystery_reset_ho_counts
    - mystery_clear_pending_ambush
    - hide_bonus_x_held_widget
    - mystery_villain_inactive

  mode_mystery_started{current_player.mystery_ho_level == 0}:
    - mystery_init_ho_level

  mode_mystery_started{current_player.super_spinners == None}:
    - mystery_init_super_spinners


  # ------------------------------------------------------------
  # H/O VAULT QUALIFY
  # 1st = HO
  # 2nd = HOHO
  # 3rd = HOHOHO
  # then back to HO
  # ------------------------------------------------------------

  s_holly_h_active{current_player.mystery_vault_open == 0}:
    - mystery_ho_progress
    - mystery_check_ho|2ms

  s_holly_o_active{current_player.mystery_vault_open == 0}:
    - mystery_ho_progress
    - mystery_check_ho|2ms


  mystery_check_ho{current_player.mystery_vault_open == 0 and current_player.mystery_ho_level <= 1 and current_player.mystery_h_hits >= 1 and current_player.mystery_o_hits >= 1}:
    - mystery_open_vault

  mystery_check_ho{current_player.mystery_vault_open == 0 and current_player.mystery_ho_level == 2 and current_player.mystery_h_hits >= 2 and current_player.mystery_o_hits >= 2}:
    - mystery_open_vault

  mystery_check_ho{current_player.mystery_vault_open == 0 and current_player.mystery_ho_level >= 3 and current_player.mystery_h_hits >= 3 and current_player.mystery_o_hits >= 3}:
    - mystery_open_vault


  # ------------------------------------------------------------
  # VAULT HOLD / MYSTERY SCROLL
  # ------------------------------------------------------------

  ball_hold_mystery_hold_full:
    - mystery_close_vault
    - mystery_scroll_start

  timer_mystery_scroll_complete:
    - mystery_pick_award


  # ------------------------------------------------------------
  # AWARD PICKING
  # ------------------------------------------------------------

  mystery_pick_award{current_player.mystery_multiball_active == 1}:
    - mystery_award_add_a_ball

  mystery_pick_award{current_player.mystery_multiball_active == 0}:
    - mystery_pick_normal_award


  # ------------------------------------------------------------
  # MULTIBALL TRACKING
  # ------------------------------------------------------------

  multiball_nakatomi_started:
    - mystery_multiball_active

  multiball_airplane_started:
    - mystery_multiball_active

  multiball_central_park_started:
    - mystery_multiball_active

  multiball_nakatomi_ended:
    - mystery_multiball_inactive

  multiball_airplane_ended:
    - mystery_multiball_inactive

  multiball_central_park_ended:
    - mystery_multiball_inactive


  # ------------------------------------------------------------
  # VILLAIN TRACKING
  # Stops Mystery Ambush being picked during villain modes.
  # ------------------------------------------------------------

  villain_mode_started:
    - mystery_villain_active

  villain_mode_ended:
    - mystery_villain_inactive

  ball_ended:
    - hide_bonus_x_held_widget
    - mystery_villain_inactive
    - mystery_clear_pending_ambush


  # ------------------------------------------------------------
  # MYSTERY AWARDS
  # ------------------------------------------------------------

  mystery_award_add_a_ball:
    - add_a_ball_in_multiball
    - mystery_awarded

  mystery_award_points:
    - mystery_awarded

  mystery_award_tower_lock:
    - qualify_nakatomi_on_complete
    - mystery_awarded

  mystery_award_airplane_lock:
    - lock_lit
    - airplane_disable_lock_counter
    - mystery_awarded


  # ------------------------------------------------------------
  # ADVANCE PARK
  # Chooses a random unlit Central Park lane.
  # Central Park qualify owns the shot/lamp state.
  # ------------------------------------------------------------

  mystery_award_park_lock:
    - mystery_choose_park_lane

  mystery_choose_park_lane{current_player.shot_central_park_lock_left == 1 and current_player.shot_central_park_lock_middle == 1 and current_player.shot_central_park_lock_right == 1}:
    - mystery_award_points

  mystery_choose_park_lane{current_player.shot_central_park_lock_left == 0 or current_player.shot_central_park_lock_middle == 0 or current_player.shot_central_park_lock_right == 0}:
    - mystery_choose_park_lane_random


  mystery_try_cp_left_lane{current_player.shot_central_park_lock_left == 0}:
    - mystery_award_cp_left_lane

  mystery_try_cp_left_lane{current_player.shot_central_park_lock_left == 1}:
    - mystery_choose_park_lane|1ms


  mystery_try_cp_middle_lane{current_player.shot_central_park_lock_middle == 0}:
    - mystery_award_cp_middle_lane

  mystery_try_cp_middle_lane{current_player.shot_central_park_lock_middle == 1}:
    - mystery_choose_park_lane|1ms


  mystery_try_cp_right_lane{current_player.shot_central_park_lock_right == 0}:
    - mystery_award_cp_right_lane

  mystery_try_cp_right_lane{current_player.shot_central_park_lock_right == 1}:
    - mystery_choose_park_lane|1ms


  mystery_award_cp_left_lane:
    - mystery_awarded|100ms

  mystery_award_cp_middle_lane:
    - mystery_awarded|100ms

  mystery_award_cp_right_lane:
    - mystery_awarded|100ms


  # ------------------------------------------------------------
  # BULLETS / VILLAIN AWARD
  # If bullets are full, reroll instead.
  # ------------------------------------------------------------

  mystery_award_villain{current_player.bullet_hits < 15}:
    - villain_start_lit
    - mystery_awarded

  mystery_award_villain{current_player.bullet_hits >= 15}:
    - mystery_pick_normal_award


  # ------------------------------------------------------------
  # BALL SAVE
  # Uses your existing ball_save_three event.
  # ------------------------------------------------------------

  mystery_award_ball_save:
    - ball_save_three
    - mystery_awarded


  # ------------------------------------------------------------
  # BONUS X
  # Adds Bonus X and flashes the Ball X / Bonus X lights.
  # ------------------------------------------------------------

  mystery_award_bonus_x:
    - mystery_bonus_x_flash
    - mystery_awarded


  # ------------------------------------------------------------
  # HOLD BONUS X
  # Uses Godot events for your held widget.
  # ------------------------------------------------------------

  mystery_award_hold_bonus_x:
    - show_bonus_x_held_widget
    - hide_bonus_x_held_widget|4s
    - mystery_awarded


  # ------------------------------------------------------------
  # SUPER SPINNERS
  # Timed power-up mode handles timer/scoring.
  # ------------------------------------------------------------

  mystery_award_super_spinners:
    - super_spinners_start
    - mystery_awarded


  # ------------------------------------------------------------
  # SUPER JETS
  # ------------------------------------------------------------

  mystery_award_super_jets:
    - mystery_awarded


  # ------------------------------------------------------------
  # PLAYFIELD X
  # Uses your real playfield_x flow.
  # Do not add playfield_multiplier directly here.
  # ------------------------------------------------------------

  mystery_award_playfield_x:
    - increase_playfield_x
    - playfield_x_collected|10ms
    - playfield_x_started|20ms
    - mystery_awarded


  # ------------------------------------------------------------
  # LIGHT EXTRA BALL
  # Uses new extra_ball mode.
  # Do not add extra_balls_lit directly here.
  # ------------------------------------------------------------

  mystery_award_extra_ball_lit:
    - light_extra_ball_from_mystery
    - mystery_awarded


  # ------------------------------------------------------------
  # AMBUSH FROM MYSTERY
  #
  # Do NOT start Ambush while Mystery slide is active.
  # Set pending flag, wait for slide_mystery_removed,
  # then start Ambush cleanly.
  # ------------------------------------------------------------

  mystery_award_ambush:
    - mystery_set_pending_ambush
    - mystery_awarded

  slide_mystery_removed{current_player.mystery_pending_ambush == 1}:
    - mystery_start_ambush_from_vault

  mystery_start_ambush_from_vault:
    - mystery_clear_pending_ambush
    - start_ambush


  # ------------------------------------------------------------
  # CLEANUP AFTER AWARD
  # ------------------------------------------------------------

  mystery_awarded:
    - mystery_close_vault
    - mystery_advance_ho_level
    - mystery_reset_ho_counts


random_event_player:
  mystery_pick_normal_award:
    events:
      mystery_award_extra_ball_lit: 1
    scope: player
    force_all: false

  mystery_choose_park_lane_random:
    events:
      mystery_try_cp_left_lane: 1
      mystery_try_cp_middle_lane: 1
      mystery_try_cp_right_lane: 1
    scope: player
    force_all: false


timers:
  mystery_scroll:
    start_value: 0
    end_value: 7
    direction: up
    tick_interval: 500ms
    start_running: false
    restart_on_complete: false
    control_events:
      - event: mystery_scroll_start
        action: restart


show_player:
  mystery_open_vault:
    flicker_color:
      key: key_mystery_open_vault
      speed: 4
      show_tokens:
        lights: l84
        color: FFFFFF

  mystery_close_vault:
    flicker_color:
      action: stop
      key: key_mystery_open_vault

  mystery_awarded:
    flicker_color:
      key: key_mystery_awarded
      loops: 2
      speed: 4
      show_tokens:
        lights: f147
        color: 00ff00

  mystery_bonus_x_flash:
    flash_color:
      key: mystery_bonus_x_lights_flash
      speed: 10
      loops: 8
      priority: 900
      show_tokens:
        lights: l1,l2,l3
        color: yellow


slide_player:
  ball_hold_mystery_hold_full:
    mystery:
      action: play
      expire: 7s


widget_player:
  mystery_ho_progress:
    mystery_qualify:
      action: play
      expire: 3s


variable_player:
  mode_mystery_started:
    mystery_multiball_active:
      action: set
      int: 0
    mystery_villain_active:
      action: set
      int: 0
    mystery_pending_ambush:
      action: set
      int: 0
    mystery_vault_open:
      action: set
      int: 0

  mystery_init_ho_level:
    mystery_ho_level:
      action: set
      int: 1

  mystery_init_super_spinners:
    super_spinners:
      action: set
      int: 0


  # ------------------------------------------------------------
  # VAULT OPEN / RESET
  # ------------------------------------------------------------

  mystery_open_vault:
    mystery_vault_open:
      action: set
      int: 1

  mystery_reset_ho_counts:
    mystery_h_hits:
      action: set
      int: 0
    mystery_o_hits:
      action: set
      int: 0
    mystery_vault_open:
      action: set
      int: 0


  # ------------------------------------------------------------
  # H COUNTING
  # ------------------------------------------------------------

  s_holly_h_active{current_player.mystery_vault_open == 0 and current_player.mystery_ho_level <= 1 and current_player.mystery_h_hits < 1}:
    mystery_h_hits:
      action: add
      int: 1

  s_holly_h_active{current_player.mystery_vault_open == 0 and current_player.mystery_ho_level == 2 and current_player.mystery_h_hits < 2}:
    mystery_h_hits:
      action: add
      int: 1

  s_holly_h_active{current_player.mystery_vault_open == 0 and current_player.mystery_ho_level >= 3 and current_player.mystery_h_hits < 3}:
    mystery_h_hits:
      action: add
      int: 1


  # ------------------------------------------------------------
  # O COUNTING
  # ------------------------------------------------------------

  s_holly_o_active{current_player.mystery_vault_open == 0 and current_player.mystery_ho_level <= 1 and current_player.mystery_o_hits < 1}:
    mystery_o_hits:
      action: add
      int: 1

  s_holly_o_active{current_player.mystery_vault_open == 0 and current_player.mystery_ho_level == 2 and current_player.mystery_o_hits < 2}:
    mystery_o_hits:
      action: add
      int: 1

  s_holly_o_active{current_player.mystery_vault_open == 0 and current_player.mystery_ho_level >= 3 and current_player.mystery_o_hits < 3}:
    mystery_o_hits:
      action: add
      int: 1


  # ------------------------------------------------------------
  # HO LEVEL ADVANCE
  # ------------------------------------------------------------

  mystery_advance_ho_level:
    mystery_ho_level:
      action: set
      int: "(current_player.mystery_ho_level % 3) + 1"


  # ------------------------------------------------------------
  # MULTIBALL / VILLAIN STATE
  # ------------------------------------------------------------

  mystery_multiball_active:
    mystery_multiball_active:
      action: set
      int: 1

  mystery_multiball_inactive:
    mystery_multiball_active:
      action: set
      int: 0

  mystery_villain_active:
    mystery_villain_active:
      action: set
      int: 1

  mystery_villain_inactive:
    mystery_villain_active:
      action: set
      int: 0


  # ------------------------------------------------------------
  # PENDING AMBUSH FROM MYSTERY
  # ------------------------------------------------------------

  mystery_set_pending_ambush:
    mystery_pending_ambush:
      action: set
      int: 1

  mystery_clear_pending_ambush:
    mystery_pending_ambush:
      action: set
      int: 0

  ball_ended:
    mystery_pending_ambush:
      action: set
      int: 0


  # ------------------------------------------------------------
  # AWARD VALUES / DISPLAY INDEX
  # ------------------------------------------------------------

  mystery_award_points:
    score: 2500000
    mystery_awarded_index:
      action: set
      int: 0

  mystery_award_tower_lock:
    tower_lock_lit:
      action: set
      int: 1
    mystery_awarded_index:
      action: set
      int: 1

  mystery_award_airplane_lock:
    airplane_lock_lit:
      action: set
      int: 1
    airplane_captive_hits:
      action: set
      int: 0
    mystery_awarded_index:
      action: set
      int: 2


  # ------------------------------------------------------------
  # PARK DISPLAY INDEX ONLY
  # qualify_central_park handles actual shot/light state.
  # ------------------------------------------------------------

  mystery_award_cp_left_lane:
    park_locks:
      action: add
      int: 1
    mystery_awarded_index:
      action: set
      int: 3

  mystery_award_cp_middle_lane:
    park_locks:
      action: add
      int: 1
    mystery_awarded_index:
      action: set
      int: 3

  mystery_award_cp_right_lane:
    park_locks:
      action: add
      int: 1
    mystery_awarded_index:
      action: set
      int: 3


  # ------------------------------------------------------------
  # BULLETS / VILLAIN
  # ------------------------------------------------------------

  mystery_award_villain{current_player.bullet_hits < 15}:
    bullet_hits:
      action: set
      int: 15
    bullet_combo_hits:
      action: set
      int: 0
    mystery_awarded_index:
      action: set
      int: 4


  # ------------------------------------------------------------
  # BALL SAVE
  # ------------------------------------------------------------

  mystery_award_ball_save:
    mystery_ball_save_awarded:
      action: set
      int: 1
    mystery_awarded_index:
      action: set
      int: 5


  # ------------------------------------------------------------
  # BONUS X
  # ------------------------------------------------------------

  mystery_award_bonus_x:
    bonus_multiplier:
      action: add
      int: 1
    mystery_awarded_index:
      action: set
      int: 6


  # ------------------------------------------------------------
  # HOLD BONUS X
  # ------------------------------------------------------------

  mystery_award_hold_bonus_x:
    bonus_x_held:
      action: set
      int: 1
    mystery_awarded_index:
      action: set
      int: 7


  # ------------------------------------------------------------
  # SUPER JETS
  # ------------------------------------------------------------

  mystery_award_super_jets:
    super_jets:
      action: set
      int: 1
    mystery_awarded_index:
      action: set
      int: 8


  # ------------------------------------------------------------
  # SUPER SPINNERS
  # ------------------------------------------------------------

  mystery_award_super_spinners:
    super_spinners:
      action: set
      int: 1
    mystery_awarded_index:
      action: set
      int: 9


  # ------------------------------------------------------------
  # PLAYFIELD X / AMBUSH / EXTRA BALL
  # ------------------------------------------------------------

  mystery_award_playfield_x:
    mystery_awarded_index:
      action: set
      int: 10

  mystery_award_ambush:
    ambush:
      action: add
      int: 1
    mystery_awarded_index:
      action: set
      int: 11

  mystery_award_extra_ball_lit:
    extra_ball_mball_awarded:
      action: set
      int: 1
    mystery_awarded_index:
      action: set
      int: 12

  mystery_award_add_a_ball:
    mystery_awarded_index:
      action: set
      int: 13