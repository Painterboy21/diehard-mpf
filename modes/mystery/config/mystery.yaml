timers:
  mystery_scroll:
    start_value: 0
    end_value: 7
    direction: up
    tick_interval: 500ms
    start_running: false
    restart_on_complete: false
    control_events:
      - event: mystery_scroll_start
        action: restart

show_player:
  mystery_open_vault:
    flicker_color:
      key: key_mystery_open_vault
      speed: 4
      show_tokens:
        lights: l84
        color: FFFFFF
  mystery_close_vault:
    flicker_color:
      action: stop
      key: key_mystery_open_vault
  ball_hold_mystery_hold_full:
    mystery_vault_start_show:
      key: key_mystery_vault_start
      loops: 1
      speed: 1
      priority: 1700
    mystery_vault_running_show:
      key: key_mystery_vault_running
      loops: 0
      speed: 1
      priority: 1180
  mystery_awarded:
    mystery_vault_start_show:
      action: stop
      key: key_mystery_vault_start
    mystery_vault_running_show:
      action: stop
      key: key_mystery_vault_running
    mystery_vault_award_show:
      key: key_mystery_vault_award
      loops: 1
      speed: 1
      priority: 1700
  slide_mystery_removed:
    mystery_vault_start_show:
      action: stop
      key: key_mystery_vault_start
    mystery_vault_running_show:
      action: stop
      key: key_mystery_vault_running
    mystery_vault_release_show:
      key: key_mystery_vault_release
      loops: 1
      speed: 1
      priority: 1700
  mystery_bonus_x_flash:
    flash_color:
      key: mystery_bonus_x_lights_flash
      speed: 10
      loops: 8
      priority: 1000
      show_tokens:
        lights: l1,l2,l3
        color: yellow

sound_player:
  mystery_scroll_start:
    dh_mysterscroll1:
      action: play
      loops: -1
      volume: 1.0
  timer_mystery_scroll_complete:
    dh_mysterscroll1:
      action: stop
  mystery_awarded:
    dh_mysterscroll1:
      action: stop
  ball_ended:
    dh_mysterscroll1:
      action: stop

# ------------------------------------------------------------
# SLIDE PLAYER
# ------------------------------------------------------------
# Plays the Mystery slide while the vault scrolls.
# The slide stays up while the award displays, then removes
# when mystery_clear_award_display fires.
# ------------------------------------------------------------
slide_player:
  ball_hold_mystery_hold_full:
    mystery:
      action: play
      priority: 9999
      expire: 0s
  mystery_clear_award_display:
    mystery:
