  mystery_ho_qualified_step:
    mystery_hits_count:
      action: add
      int: 1

  mystery_reset_ho:
    mystery_hits_count:
      action: set
      int: 0

  mystery_multiball_active:
    mystery_multiball_active:
      action: set
      int: 1

  mystery_multiball_inactive:
    mystery_multiball_active:
      action: set
      int: 0

  mystery_award_points:
    score: 2500000
    mystery_awarded_index:
      action: set
      int: 11

  mystery_award_tower_lock:
