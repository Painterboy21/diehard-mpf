#config_version=6

mode:
  start_events: ball_started{current_player.central_park_played==0},multiball_nakatomi_ended,multiball_airplane_ended,mode_ambush_stopped,hans_diehard_ended
  stop_events: ball_ended,multiball_central_park_started,multiball_nakatomi_started,multiball_airplane_started,start_hans_diehard
  priority: 200


light_player:
  central_park_start_multiball_hit:
    GI: 
      color: ffb700
    SPOTS:
      color: 505050
    SPOTS_BUMPER:
      color: 969650

shot_groups: 
  qualify_central_park:
    shots: central_park_lock_left,central_park_lock_middle,central_park_lock_right
    restart_events: trigger_central_park_ball_locked
    disable_events: multiball_central_park_started
    
shots: 
  central_park_lock_left:
    switch: s_TrPF1
    profile: profile_central_park_lock
    show_tokens: 
      lights: l76
  central_park_lock_middle:
    switch: s_TrPF2
    profile: profile_central_park_lock
    show_tokens: 
      lights: l77
  central_park_lock_right:
    switch: s_TrPF3
    profile: profile_central_park_lock
    show_tokens: 
      lights: l78

  central_park_start_multiball:
    profile: cp_start_multiball_profile
    switch: s_upper_pf_entrance
    start_enabled: false
    enable_events: counter_central_park_multiball_counter_hit{hits==3}
    disable_events: shot_central_park_start_multiball_hit
    show_tokens: 
      lights: CP_LOCK
      color: 00ff00

counters:
  central_park_multiball_counter:
    count_events: qualify_central_park_on_complete
    count_complete_value: 3
    persist_state: true
    enable_events: mode_qualify_central_park_started
    disable_events: multiball_central_park_started, ball_ended
    events_when_complete: trigger_central_park_ball_locked
   
show_player: 
  qualify_central_park_on_complete: 
    park_mb_ball_locked: 
      key: key_central_park_ball_locked
      loops: 0
      events_when_completed: trigger_central_park_ball_locked
  central_park_start_multiball_hit:
    park_mb_start:
      key: key_central_park_multiball_start
      loops: 0
      priority: 999


slide_player: 
  counter_central_park_multiball_counter_hit{hits==1}:
    centralparkball_1_locked:
      action: play
      expire: 0s 
  counter_central_park_multiball_counter_hit{hits==2}:
    centralparkball_2_locked:
      action: play
      expire: 0s
  counter_central_park_multiball_counter_hit{hits==3}:
    centralparkball_3_locked:
      action: play
      expire: 0s
  central_park_start_multiball_hit:
    centralpark_mb:
      action: play
      expire: 0s

variable_player:
  trigger_central_park_ball_locked:
    score:
      action: add
      int: 250000  

event_player:
  slide_centralpark_mb_removed:
   - start_central_park_multiball
