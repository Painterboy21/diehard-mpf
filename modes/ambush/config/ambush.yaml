#config_version=6
# ------------------------------------------------------------
# AMBUSH
# ------------------------------------------------------------
# What this mode does:
#   - Starts from start_ambush when no villain/select mode is running.
#   - Opens the wire ramp and lights Ambush shots.
#   - Timer starts at 15 seconds.
#   - White shots extend time and increase the Ambush value.
#   - Right ramp / air duct collects the Ambush value.
#   - Value decays after the grace timer starts decay.
#   - Ambush stops safely if villain select, difficulty select,
#     villain mode, or ball end starts.
# ------------------------------------------------------------
mode:
  start_events:
    - start_ambush{current_player.villain_mode_running!=1 and current_player.villain_select_running!=1 and current_player.villain_difficulty_select_running!=1}
  stop_events:
    - ambush_finished
    - ambush_failed
    - ball_ended
    - start_villain_select
    - start_karl_difficulty_select
    - start_hans_difficulty_select
    - start_katya_difficulty_select
    - start_simon_difficulty_select
    - start_col_difficulty_select
    - villain_mode_started
  priority: 160
# ------------------------------------------------------------
# WIDGET PLAYER
# ------------------------------------------------------------
# Shows the Ambush value widget while Ambush is active.
# Removes it when Ambush ends or another major mode/select starts.
# ------------------------------------------------------------
widget_player:
  ambush_start_timers:
    ambush_value_widget:
      action: play
      priority: 500
  ambush_collected:
    ambush_value_widget:
      action: remove
  ambush_failed:
    ambush_value_widget:
      action: remove
  ball_ended:
    ambush_value_widget:
      action: remove
  start_villain_select:
    ambush_value_widget:
      action: remove
  start_karl_difficulty_select:
    ambush_value_widget:
      action: remove
  start_hans_difficulty_select:
    ambush_value_widget:
      action: remove
  start_katya_difficulty_select:
    ambush_value_widget:
      action: remove
  start_simon_difficulty_select:
    ambush_value_widget:
      action: remove
  start_col_difficulty_select:
    ambush_value_widget:
      action: remove
  villain_mode_started:
    ambush_value_widget:
      action: remove
# ------------------------------------------------------------
# SLIDE PLAYER
# ------------------------------------------------------------
# Plays the Ambush collected slide when Ambush is collected.
# ------------------------------------------------------------
slide_player:
  ambush_collected:
    ambush_collected_slide:
      priority: 9999
      expire: 2s
# ------------------------------------------------------------
# EVENT PLAYER
# ------------------------------------------------------------
# Starts Ambush, runs timer ticks, extends/collects value,
# handles finish delay, and stops Ambush when other modes start.
# ------------------------------------------------------------
event_player:
  mode_ambush_started:
    - stop_base_music
    - nakatomi_entrance_lock_close
    - wire_ramp_exit_open
    - ambush_enable_shots
    - ambush_reset_values
    - ambush_start_timers
  timer_ambush_display_timer_tick:
    - ambush_display_tick
  timer_ambush_decay_timer_tick:
    - ambush_tick
  timer_ambush_grace_complete:
    - ambush_enable_decay
  timer_ambush_display_timer_complete:
    - ambush_failed
  ambush_left_loop_hit:
    - ambush_extend
  ambush_left_ramp_wire_hit:
    - ambush_extend
  ambush_right_loop_hit:
    - ambush_extend
  ambush_upper_loop_hit:
    - ambush_extend
  ambush_captive_hit:
    - ambush_extend
  ambush_right_ramp_collect_hit:
    - ambush_collected
  ambush_collected:
    - wire_ramp_exit_closed
    - ambush_finish_delay_start
  timer_ambush_finish_delay_complete:
    - ambush_finished
  ambush_failed:
    - wire_ramp_exit_closed
  ball_ended:
    - wire_ramp_exit_closed
  start_villain_select:
    - ambush_failed
  start_karl_difficulty_select:
    - ambush_failed
  start_hans_difficulty_select:
    - ambush_failed
  start_katya_difficulty_select:
    - ambush_failed
  start_simon_difficulty_select:
    - ambush_failed
  start_col_difficulty_select:
    - ambush_failed
  villain_mode_started:
    - ambush_failed
# ------------------------------------------------------------
# VARIABLE PLAYER
# ------------------------------------------------------------
# Stores Ambush running state, level, value, timer display,
# decay state, scoring, and cleanup values.
# ------------------------------------------------------------
variable_player:
  mode_ambush_started:
    ambush_running:
      action: set
      int: 1
  mode_ambush_started{current_player.ambush_level <= 0}:
    ambush_level:
      action: set
      int: 1
  ambush_reset_values{current_player.ambush_level == 1}:
    ambush_value:
      action: set
      int: 1000000
    ambush_time:
      action: set
      int: 15
    ambush_decay_active:
      action: set
      int: 0
    ambush_ignore_first_display_tick:
      action: set
      int: 1
  ambush_reset_values{current_player.ambush_level == 2}:
    ambush_value:
      action: set
      int: 2000000
    ambush_time:
      action: set
      int: 15
    ambush_decay_active:
      action: set
      int: 0
    ambush_ignore_first_display_tick:
      action: set
      int: 1
  ambush_reset_values{current_player.ambush_level == 3}:
    ambush_value:
      action: set
      int: 3000000
    ambush_time:
      action: set
      int: 15
    ambush_decay_active:
      action: set
      int: 0
    ambush_ignore_first_display_tick:
      action: set
      int: 1
  ambush_reset_values{current_player.ambush_level >= 4}:
    ambush_level:
      action: set
      int: 4
    ambush_value:
      action: set
      int: 4000000
    ambush_time:
      action: set
      int: 15
    ambush_decay_active:
      action: set
      int: 0
    ambush_ignore_first_display_tick:
      action: set
      int: 1
  ambush_display_tick{current_player.ambush_ignore_first_display_tick == 1}:
    ambush_ignore_first_display_tick:
      action: set
      int: 0
  ambush_display_tick{current_player.ambush_ignore_first_display_tick == 0 and current_player.ambush_time > 0}:
    ambush_time:
      action: add
      int: -1
  ambush_enable_decay:
    ambush_decay_active:
      action: set
      int: 1
  ambush_extend{current_player.ambush_level == 1}:
    ambush_value:
      action: add
      int: 500000
    ambush_time:
      action: add
      int: 6
  ambush_extend{current_player.ambush_level == 2}:
    ambush_value:
      action: add
      int: 1000000
    ambush_time:
      action: add
      int: 6
  ambush_extend{current_player.ambush_level == 3}:
    ambush_value:
      action: add
      int: 1500000
    ambush_time:
      action: add
      int: 6
  ambush_extend{current_player.ambush_level >= 4}:
    ambush_value:
      action: add
      int: 2000000
    ambush_time:
      action: add
      int: 6
  ambush_tick{current_player.ambush_decay_active == 1 and current_player.ambush_level == 1 and current_player.ambush_value > 200000}:
    ambush_value:
      action: add
      int: -20000
  ambush_tick{current_player.ambush_decay_active == 1 and current_player.ambush_level == 2 and current_player.ambush_value > 400000}:
    ambush_value:
      action: add
      int: -40000
  ambush_tick{current_player.ambush_decay_active == 1 and current_player.ambush_level == 3 and current_player.ambush_value > 600000}:
    ambush_value:
      action: add
      int: -60000
  ambush_tick{current_player.ambush_decay_active == 1 and current_player.ambush_level >= 4 and current_player.ambush_value > 800000}:
    ambush_value:
      action: add
      int: -80000
  ambush_collected:
    score:
      action: add
      int: "current_player.ambush_value * current_player.playfield_multiplier"
  eob_bonus_ambush:
    action: add
    int: "200000 * current_player.ambush_level"
  ambush_finished:
    ambush_running:
      action: set
      int: 0
    ambush_value:
      action: set
      int: 0
    ambush_time:
      action: set
      int: 0
    ambush_level:
      action: set
      int: 0
  ambush_failed:
    ambush_running:
      action: set
      int: 0
    ambush_value:
      action: set
      int: 0
    ambush_time:
      action: set
      int: 0
    ambush_level:
      action: set
      int: 0
  ball_ended:
    ambush_running:
      action: set
      int: 0
    ambush_value:
      action: set
      int: 0
    ambush_time:
      action: set
      int: 0
# ------------------------------------------------------------
# TIMERS
# ------------------------------------------------------------
# Display timer runs the visible Ambush countdown.
# Decay timer lowers the value after grace.
# Grace timer delays the value decay.
# Finish delay gives the collected slide time before the mode stops.
# ------------------------------------------------------------
timers:
  ambush_display_timer:
    start_value: 15
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: ambush_start_timers
        action: restart
      - event: ambush_extend
        action: add
        value: 6
      - event: ambush_collected
        action: stop
      - event: ambush_failed
        action: stop
      - event: start_villain_select
        action: stop
      - event: start_karl_difficulty_select
        action: stop
      - event: start_hans_difficulty_select
        action: stop
      - event: start_katya_difficulty_select
        action: stop
      - event: start_simon_difficulty_select
        action: stop
      - event: start_col_difficulty_select
        action: stop
      - event: villain_mode_started
        action: stop
  ambush_decay_timer:
    start_value: 0
    end_value: 9999
    direction: up
    tick_interval: 250ms
    start_running: false
    control_events:
      - event: ambush_start_timers
        action: restart
      - event: ambush_collected
        action: stop
      - event: ambush_failed
        action: stop
      - event: start_villain_select
        action: stop
      - event: start_karl_difficulty_select
        action: stop
      - event: start_hans_difficulty_select
        action: stop
      - event: start_katya_difficulty_select
        action: stop
      - event: start_simon_difficulty_select
        action: stop
      - event: start_col_difficulty_select
        action: stop
      - event: villain_mode_started
        action: stop
  ambush_grace:
    start_value: 3
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: ambush_start_timers
        action: restart
      - event: ambush_collected
        action: stop
      - event: ambush_failed
        action: stop
      - event: start_villain_select
        action: stop
      - event: start_karl_difficulty_select
        action: stop
      - event: start_hans_difficulty_select
        action: stop
      - event: start_katya_difficulty_select
        action: stop
      - event: start_simon_difficulty_select
        action: stop
      - event: start_col_difficulty_select
        action: stop
      - event: villain_mode_started
        action: stop
  ambush_finish_delay:
    start_value: 2
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: ambush_finish_delay_start
        action: restart
      - event: ambush_failed
        action: stop
      - event: start_villain_select
        action: stop
      - event: start_karl_difficulty_select
        action: stop
      - event: start_hans_difficulty_select
        action: stop
      - event: start_katya_difficulty_select
        action: stop
      - event: start_simon_difficulty_select
        action: stop
      - event: start_col_difficulty_select
        action: stop
      - event: villain_mode_started
        action: stop
# ------------------------------------------------------------
# SHOTS
# ------------------------------------------------------------
# White Ambush shots extend time/value.
# Right ramp / air duct collects the current Ambush value.
# All shots disable on collect, fail, ball end, or villain/select start.
# ------------------------------------------------------------
shots:
  ambush_left_loop:
    hit_events: left_orbit_hit
    enable_events:
      - ambush_enable_shots
    disable_events:
      - ambush_left_loop_hit
      - ambush_collected
      - ambush_failed
      - ball_ended
      - start_villain_select
      - start_karl_difficulty_select
      - start_hans_difficulty_select
      - start_katya_difficulty_select
      - start_simon_difficulty_select
      - start_col_difficulty_select
      - villain_mode_started
  ambush_right_loop:
    hit_events: right_orbit_hit
    enable_events:
      - ambush_enable_shots
    disable_events:
      - ambush_right_loop_hit
      - ambush_collected
      - ambush_failed
      - ball_ended
      - start_villain_select
      - start_karl_difficulty_select
      - start_hans_difficulty_select
      - start_katya_difficulty_select
      - start_simon_difficulty_select
      - start_col_difficulty_select
      - villain_mode_started
  ambush_left_ramp_wire:
    switch: s_swleftinlane
    enable_events:
      - ambush_enable_shots
    disable_events:
      - ambush_left_ramp_wire_hit
      - ambush_collected
      - ambush_failed
      - ball_ended
      - start_villain_select
      - start_karl_difficulty_select
      - start_hans_difficulty_select
      - start_katya_difficulty_select
      - start_simon_difficulty_select
      - start_col_difficulty_select
      - villain_mode_started
  ambush_upper_loop:
    switch: s_mid_orbit
    enable_events:
      - ambush_enable_shots
    disable_events:
      - ambush_upper_loop_hit
      - ambush_collected
      - ambush_failed
      - ball_ended
      - start_villain_select
      - start_karl_difficulty_select
      - start_hans_difficulty_select
      - start_katya_difficulty_select
      - start_simon_difficulty_select
      - start_col_difficulty_select
      - villain_mode_started
  ambush_captive:
    switch: s_captiveball
    enable_events:
      - ambush_enable_shots
    disable_events:
      - ambush_captive_hit
      - ambush_collected
      - ambush_failed
      - ball_ended
      - start_villain_select
      - start_karl_difficulty_select
      - start_hans_difficulty_select
      - start_katya_difficulty_select
      - start_simon_difficulty_select
      - start_col_difficulty_select
      - villain_mode_started
  ambush_right_ramp_collect:
    switch: s_air_duct
    enable_events:
      - ambush_enable_shots
    disable_events:
      - ambush_collected
      - ambush_failed
      - ball_ended
      - start_villain_select
      - start_karl_difficulty_select
      - start_hans_difficulty_select
      - start_katya_difficulty_select
      - start_simon_difficulty_select
      - start_col_difficulty_select
      - villain_mode_started
