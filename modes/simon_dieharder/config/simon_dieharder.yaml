#config_version=6

# ------------------------------------------------------------
# SIMON DIE HARDER
# ------------------------------------------------------------
# VPW-style Simon Says:
#   - 5 random Simon shots.
#   - Each shot is only picked once.
#   - Die Harder timer is 10s less than Simon Die Hard.
#   - Normal timer = 20 seconds per shot.
#   - Hans Bonus active = 30 seconds per shot.
#   - Correct progress shots score 1,500,000 x PF multiplier.
#   - Final shot scores 3,000,000 x PF multiplier.
#   - Hits 1–4 post simon_dieharder_play_random_hit_video and
#     update simon_dieharder_hit_video_trigger for Godot random videos.
#   - Hit 5 goes to Simon defeated result.
#   - Fail / ball lost disables flippers and uses ball-lost flow.
#   - Completion sets shared simon_complete so Simon cannot be selected again.
#   - Completion sets simon_bonus for wizard/multiball bonus use.
#   - Completion posts Extra Ball bridge and wizard check.
#   - Villain MVP starts on mode start and finishes only on win/fail result.
#   - Simon insert l41 is white.
#   - Simon mode insert flash is dimmed slightly while flashing.
#   - Simon ball save flashes white.
# ------------------------------------------------------------
mode:
  start_events:
    - start_simon_dieharder{current_player.simon_complete==0}
  stop_events:
    - simon_dieharder_completed
    - simon_dieharder_failed
  priority: 170

# ------------------------------------------------------------
# TIMERS
# ------------------------------------------------------------
# Simon Die Harder gets 20 seconds normally.
# Hans Bonus gives 30 seconds.
# Mystery Add More Time adds 20 seconds.
# ------------------------------------------------------------
timers:
  simon_dieharder_timer:
    start_value: 20
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: simon_dieharder_start_normal_shot_timer
        action: restart
        value: 20
      - event: simon_dieharder_start_hans_bonus_shot_timer
        action: restart
        value: 30
      - event: simon_dieharder_stop_shot_timer
        action: stop
      - event: simon_dieharder_complete
        action: stop
      - event: simon_dieharder_fail_mode
        action: stop
      - event: simon_dieharder_completed
        action: stop
      - event: simon_dieharder_failed
        action: stop
      - event: add_villain_time_from_mystery
        action: add
        value: 20

# ------------------------------------------------------------
# BALL SAVES
# ------------------------------------------------------------
# 2 second ball save on mode start.
# 5 second ball save on completion.
# Both flash Simon's villain colour: white.
# ------------------------------------------------------------
ball_saves:
  simon_dieharder_start_save:
    active_time: 2s
    hurry_up_time: 0s
    grace_period: 0s
    auto_launch: true
    balls_to_save: 1
    enable_events:
      - mode_simon_dieharder_started
    disable_events:
      - simon_dieharder_complete
      - simon_dieharder_fail_mode
      - simon_dieharder_completed
      - simon_dieharder_failed
      - mode_simon_dieharder_stopping

  simon_dieharder_complete_save:
    active_time: 5s
    hurry_up_time: 0s
    grace_period: 0s
    auto_launch: true
    balls_to_save: 1
    enable_events:
      - simon_dieharder_complete
    disable_events:
      - simon_dieharder_fail_mode
      - simon_dieharder_failed
      - mode_simon_dieharder_stopping

# ------------------------------------------------------------
# COUNTERS
# ------------------------------------------------------------
# 5 correct Simon Says shots completes Simon.
# ------------------------------------------------------------
counters:
  simon_dieharder_shots:
    count_events:
      - simon_dieharder_correct_progress_shot
      - simon_dieharder_correct_final_shot
    starting_count: 0
    count_complete_value: 5
    direction: up
    persist_state: false
    reset_on_complete: false
    reset_events:
      - mode_simon_dieharder_started

# ------------------------------------------------------------
# SHOTS
# ------------------------------------------------------------
# Orbit and captive shots use shot devices.
# Air Duct and Left Ramp use real switch events in event_player.
# ------------------------------------------------------------
shots:
  simon_dieharder_left_loop:
    hit_events: left_orbit_hit
    enable_events:
      - mode_simon_dieharder_started
    disable_events:
      - simon_dieharder_complete
      - simon_dieharder_fail_mode
      - simon_dieharder_completed
      - simon_dieharder_failed

  simon_dieharder_captive_ball:
    switch: s_captiveball
    enable_events:
      - mode_simon_dieharder_started
    disable_events:
      - simon_dieharder_complete
      - simon_dieharder_fail_mode
      - simon_dieharder_completed
      - simon_dieharder_failed

  simon_dieharder_right_loop:
    hit_events: right_orbit_hit
    enable_events:
      - mode_simon_dieharder_started
    disable_events:
      - simon_dieharder_complete
      - simon_dieharder_fail_mode
      - simon_dieharder_completed
      - simon_dieharder_failed

# ------------------------------------------------------------
# RANDOM EVENT PLAYER
# ------------------------------------------------------------
# Chooses the next unused Simon Says shot.
# ------------------------------------------------------------
random_event_player:
  simon_dieharder_choose_next_shot:
    events:
      - simon_dieharder_choose_left_loop{current_player.simon_dieharder_used_left_loop==0}
      - simon_dieharder_choose_captive_ball{current_player.simon_dieharder_used_captive_ball==0}
      - simon_dieharder_choose_right_loop{current_player.simon_dieharder_used_right_loop==0}
      - simon_dieharder_choose_right_ramp{current_player.simon_dieharder_used_right_ramp==0}
      - simon_dieharder_choose_left_ramp{current_player.simon_dieharder_used_left_ramp==0}

# ------------------------------------------------------------
# EVENT PLAYER
# ------------------------------------------------------------
# Handles start, shot choice, timer choice, correct hits,
# fail flow, completion flow, Villain MVP tracking, and cleanup.
# ------------------------------------------------------------
event_player:
  mode_simon_dieharder_started:
    - villain_mode_started
    - stop_base_music
    - simon_dieharder_music_start
    - simon_dieharder_reset_mode
    - simon_dieharder_choose_next_shot|250ms
    - nakatomi_entrance_lock_close
    - release_villain_select_vuk
    - reset_bullet_total
    - reset_bullets
    - record_start_simon_dieharder_villain_mvp

  record_start_simon_dieharder_villain_mvp:
    record_start_villain_mvp:
      mode: SIMON DIE HARDER

  record_finish_simon_dieharder_villain_mvp:
    record_finish_villain_mvp:
      mode: SIMON DIE HARDER

  mode_simon_dieharder_stopping:
    - villain_mode_stopped
    - enable_flippers
    - wire_ramp_exit_closed
    - simon_dieharder_cleanup

  simon_dieharder_choose_next_shot{device.counters.simon_dieharder_shots.value==0}:
    - simon_dieharder_set_progress_1
  simon_dieharder_choose_next_shot{device.counters.simon_dieharder_shots.value==1}:
    - simon_dieharder_set_progress_2
  simon_dieharder_choose_next_shot{device.counters.simon_dieharder_shots.value==2}:
    - simon_dieharder_set_progress_3
  simon_dieharder_choose_next_shot{device.counters.simon_dieharder_shots.value==3}:
    - simon_dieharder_set_progress_4
  simon_dieharder_choose_next_shot{device.counters.simon_dieharder_shots.value==4}:
    - simon_dieharder_set_progress_5

  simon_dieharder_choose_left_loop{current_player.hans_bonus==1}:
    - simon_dieharder_start_hans_bonus_shot_timer
  simon_dieharder_choose_left_loop{current_player.hans_bonus!=1}:
    - simon_dieharder_start_normal_shot_timer
  simon_dieharder_choose_captive_ball{current_player.hans_bonus==1}:
    - simon_dieharder_start_hans_bonus_shot_timer
  simon_dieharder_choose_captive_ball{current_player.hans_bonus!=1}:
    - simon_dieharder_start_normal_shot_timer
  simon_dieharder_choose_right_loop{current_player.hans_bonus==1}:
    - simon_dieharder_start_hans_bonus_shot_timer
  simon_dieharder_choose_right_loop{current_player.hans_bonus!=1}:
    - simon_dieharder_start_normal_shot_timer
  simon_dieharder_choose_right_ramp{current_player.hans_bonus==1}:
    - simon_dieharder_start_hans_bonus_shot_timer
  simon_dieharder_choose_right_ramp{current_player.hans_bonus!=1}:
    - simon_dieharder_start_normal_shot_timer
  simon_dieharder_choose_left_ramp{current_player.hans_bonus==1}:
    - simon_dieharder_start_hans_bonus_shot_timer
  simon_dieharder_choose_left_ramp{current_player.hans_bonus!=1}:
    - simon_dieharder_start_normal_shot_timer

  simon_dieharder_left_loop_hit{current_player.simon_dieharder_current_shot==1 and device.counters.simon_dieharder_shots.value<4}:
    - simon_dieharder_correct_progress_shot
  simon_dieharder_captive_ball_hit{current_player.simon_dieharder_current_shot==2 and device.counters.simon_dieharder_shots.value<4}:
    - simon_dieharder_correct_progress_shot
  simon_dieharder_right_loop_hit{current_player.simon_dieharder_current_shot==3 and device.counters.simon_dieharder_shots.value<4}:
    - simon_dieharder_correct_progress_shot
  s_air_duct_active{current_player.simon_dieharder_current_shot==4 and device.counters.simon_dieharder_shots.value<4}:
    - simon_dieharder_correct_progress_shot
  s_upper_pf_entrance_active{current_player.simon_dieharder_current_shot==5 and device.counters.simon_dieharder_shots.value<4}:
    - simon_dieharder_correct_progress_shot

  simon_dieharder_left_loop_hit{current_player.simon_dieharder_current_shot==1 and device.counters.simon_dieharder_shots.value>=4}:
    - simon_dieharder_correct_final_shot
  simon_dieharder_captive_ball_hit{current_player.simon_dieharder_current_shot==2 and device.counters.simon_dieharder_shots.value>=4}:
    - simon_dieharder_correct_final_shot
  simon_dieharder_right_loop_hit{current_player.simon_dieharder_current_shot==3 and device.counters.simon_dieharder_shots.value>=4}:
    - simon_dieharder_correct_final_shot
  s_air_duct_active{current_player.simon_dieharder_current_shot==4 and device.counters.simon_dieharder_shots.value>=4}:
    - simon_dieharder_correct_final_shot
  s_upper_pf_entrance_active{current_player.simon_dieharder_current_shot==5 and device.counters.simon_dieharder_shots.value>=4}:
    - simon_dieharder_correct_final_shot

  simon_dieharder_correct_progress_shot:
    - simon_dieharder_stop_shot_timer
    - simon_dieharder_play_random_hit_video
    - simon_dieharder_clear_current_shot
    - simon_dieharder_choose_next_shot|500ms

  simon_dieharder_correct_final_shot:
    - simon_dieharder_stop_shot_timer
    - simon_dieharder_complete

  timer_simon_dieharder_timer_complete{current_player.simon_dieharder_result_started==0}:
    - simon_dieharder_fail_mode

  ball_drain{current_player.simon_dieharder_result_started==0}:
    - simon_dieharder_fail_mode

  simon_dieharder_fail_mode:
    - disable_flippers
    - play_ball_lost
    - simon_dieharder_lights_off
    - simon_dieharder_failed|5s
    - reset_bullet_total
    - reset_bullets

  simon_dieharder_complete:
    - simon_dieharder_completed|4s
    - reset_bullet_total
    - reset_bullets

  simon_dieharder_completed:
    - record_finish_simon_dieharder_villain_mvp
    - simon_completed
    - count_simon_for_extra_ball
    - check_wizard_mode
    - reset_bullet_total
    - reset_bullets

  simon_dieharder_failed:
    - record_finish_simon_dieharder_villain_mvp
    - simon_failed
    - resume_base_music|500ms
    - reset_bullet_total
    - reset_bullets

# ------------------------------------------------------------
# VARIABLE PLAYER
# ------------------------------------------------------------
# Stores Simon state, selected shot, Hans Bonus timer state,
# display text, scoring, completion rewards, and result flags.
# ------------------------------------------------------------
variable_player:
  simon_dieharder_reset_mode:
    villain_mode_running:
      action: set
      int: 1
    simon_dieharder_completion_active:
      action: set
      int: 0
    simon_dieharder_failed_active:
      action: set
      int: 0
    simon_dieharder_result_started:
      action: set
      int: 0
    simon_dieharder_time:
      action: set
      int: 20
    simon_dieharder_hans_bonus_active:
      action: set
      int: current_player.hans_bonus
    simon_dieharder_progress:
      action: set
      int: 0
    simon_dieharder_progress_text:
      action: set
      string: 1/5
    simon_dieharder_hit_video_trigger:
      action: set
      int: 0
    simon_dieharder_shot_number:
      action: set
      int: 1
    simon_dieharder_total_shots:
      action: set
      int: 5
    simon_dieharder_shot_name:
      action: set
      string: ""
    simon_dieharder_instruction:
      action: set
      string: SIMON SAYS
    simon_dieharder_current_shot:
      action: set
      int: 0
    simon_dieharder_used_left_loop:
      action: set
      int: 0
    simon_dieharder_used_captive_ball:
      action: set
      int: 0
    simon_dieharder_used_right_loop:
      action: set
      int: 0
    simon_dieharder_used_right_ramp:
      action: set
      int: 0
    simon_dieharder_used_left_ramp:
      action: set
      int: 0
    simon_dieharder_villain_score:
      action: set
      int: 500000

  mode_simon_dieharder_started{current_player.playfield_multiplier == None}:
    playfield_multiplier:
      action: set
      int: 1

  simon_dieharder_start_normal_shot_timer:
    simon_dieharder_time:
      action: set
      int: 20
    simon_dieharder_hans_bonus_active:
      action: set
      int: 0

  simon_dieharder_start_hans_bonus_shot_timer:
    simon_dieharder_time:
      action: set
      int: 30
    simon_dieharder_hans_bonus_active:
      action: set
      int: 1

  timer_simon_dieharder_timer_tick:
    simon_dieharder_time:
      action: set
      int: ticks

  simon_dieharder_set_progress_1:
    simon_dieharder_progress_text:
      action: set
      string: 1/5
  simon_dieharder_set_progress_2:
    simon_dieharder_progress_text:
      action: set
      string: 2/5
  simon_dieharder_set_progress_3:
    simon_dieharder_progress_text:
      action: set
      string: 3/5
  simon_dieharder_set_progress_4:
    simon_dieharder_progress_text:
      action: set
      string: 4/5
  simon_dieharder_set_progress_5:
    simon_dieharder_progress_text:
      action: set
      string: 5/5

  simon_dieharder_choose_left_loop:
    simon_dieharder_current_shot:
      action: set
      int: 1
    simon_dieharder_used_left_loop:
      action: set
      int: 1
    simon_dieharder_shot_name:
      action: set
      string: LEFT ORBIT
    simon_dieharder_instruction:
      action: set
      string: SIMON SAYS HIT LEFT ORBIT
    simon_dieharder_shot_number:
      action: set
      int: device.counters.simon_dieharder_shots.value + 1

  simon_dieharder_choose_captive_ball:
    simon_dieharder_current_shot:
      action: set
      int: 2
    simon_dieharder_used_captive_ball:
      action: set
      int: 1
    simon_dieharder_shot_name:
      action: set
      string: CAPTIVE BALL
    simon_dieharder_instruction:
      action: set
      string: SIMON SAYS HIT CAPTIVE BALL
    simon_dieharder_shot_number:
      action: set
      int: device.counters.simon_dieharder_shots.value + 1

  simon_dieharder_choose_right_loop:
    simon_dieharder_current_shot:
      action: set
      int: 3
    simon_dieharder_used_right_loop:
      action: set
      int: 1
    simon_dieharder_shot_name:
      action: set
      string: RIGHT ORBIT
    simon_dieharder_instruction:
      action: set
      string: SIMON SAYS HIT RIGHT ORBIT
    simon_dieharder_shot_number:
      action: set
      int: device.counters.simon_dieharder_shots.value + 1

  simon_dieharder_choose_right_ramp:
    simon_dieharder_current_shot:
      action: set
      int: 4
    simon_dieharder_used_right_ramp:
      action: set
      int: 1
    simon_dieharder_shot_name:
      action: set
      string: AIR DUCT
    simon_dieharder_instruction:
      action: set
      string: SIMON SAYS HIT AIR DUCT
    simon_dieharder_shot_number:
      action: set
      int: device.counters.simon_dieharder_shots.value + 1

  simon_dieharder_choose_left_ramp:
    simon_dieharder_current_shot:
      action: set
      int: 5
    simon_dieharder_used_left_ramp:
      action: set
      int: 1
    simon_dieharder_shot_name:
      action: set
      string: LEFT RAMP
    simon_dieharder_instruction:
      action: set
      string: SIMON SAYS HIT LEFT RAMP
    simon_dieharder_shot_number:
      action: set
      int: device.counters.simon_dieharder_shots.value + 1

  simon_dieharder_clear_current_shot:
    simon_dieharder_current_shot:
      action: set
      int: 0

  simon_dieharder_correct_progress_shot:
    score:
      action: add
      int: "1500000 * current_player.playfield_multiplier"
    simon_dieharder_villain_score:
      action: add
      int: "1500000 * current_player.playfield_multiplier"
    simon_dieharder_progress:
      action: add
      int: 1
    simon_dieharder_hit_video_trigger:
      action: add
      int: 1

  simon_dieharder_correct_final_shot:
    score:
      action: add
      int: "3000000 * current_player.playfield_multiplier"
    simon_dieharder_villain_score:
      action: add
      int: "3000000 * current_player.playfield_multiplier"
    simon_dieharder_progress:
      action: add
      int: 1

  simon_dieharder_complete:
    simon_dieharder_completion_active:
      action: set
      int: 1
    simon_dieharder_result_started:
      action: set
      int: 1
    simon_dieharder_instruction:
      action: set
      string: SIMON DEFEATED

  simon_dieharder_fail_mode:
    simon_dieharder_failed_active:
      action: set
      int: 1
    simon_dieharder_result_started:
      action: set
      int: 1
    simon_dieharder_instruction:
      action: set
      string: SIMON BALL LOST

  simon_dieharder_completed:
    simon_complete:
      action: set
      int: 1
    simon_dieharder_complete:
      action: set
      int: 1
    simon_bonus:
      action: set
      int: 1
    bonus_multiplier:
      action: set
      int: 6
    modes_complete:
      action: add
      int: 1
    villains_completed:
      action: add
      int: 1
    simon_dieharder_result_started:
      action: set
      int: 0

  simon_dieharder_failed:
    simon_dieharder_failed:
      action: set
      int: 1
    simon_dieharder_result_started:
      action: set
      int: 0

  mode_simon_dieharder_stopping:
    villain_mode_running:
      action: set
      int: 0
    simon_dieharder_completion_active:
      action: set
      int: 0
    simon_dieharder_failed_active:
      action: set
      int: 0
    simon_dieharder_result_started:
      action: set
      int: 0

