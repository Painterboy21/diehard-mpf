        f147: ffffff
    - duration: 80ms
      lights:
        f140: off
        f141: off
        f142: off
        f143: off
        f144: off
        f145: off
        f146: off
        f147: off

  simon_dieharder_gi_hit_flash:
    - duration: 80ms
      lights:
        GI: ffffff
    - duration: 120ms
      lights:
        GI: ffffff

# ------------------------------------------------------------
# SHOW PLAYER
# ------------------------------------------------------------
# Runs Simon Die Harder insert flash, selected shot flash,
# hit flashers, ball-save flash, and cleanup.
# ------------------------------------------------------------
show_player:
  ball_save_simon_dieharder_start_save_enabled:
    flash_color:
      key: simon_dieharder_start_save_flash
      loops: -1
      speed: 8
      show_tokens:
        lights: BALL_SAVE
        color: ffffff

  ball_save_simon_dieharder_start_save_disabled:
    simon_dieharder_start_save_flash:
      action: stop

  ball_save_simon_dieharder_complete_save_enabled:
    flash_color:
      key: simon_dieharder_complete_save_flash
      loops: -1
      speed: 8
      show_tokens:
        lights: BALL_SAVE
        color: ffffff

  ball_save_simon_dieharder_complete_save_disabled:
    simon_dieharder_complete_save_flash:
      action: stop

  mode_simon_dieharder_started:
    simon_dieharder_insert_flash:
      key: key_simon_dieharder_insert_flash
      loops: -1
      speed: 1
      priority: 1300

  simon_dieharder_choose_left_loop:
    simon_dieharder_left_loop_flash:
      key: key_simon_dieharder_current_shot
      loops: -1
      speed: 1
      priority: 1200

  simon_dieharder_choose_captive_ball:
    simon_dieharder_captive_ball_flash:
      key: key_simon_dieharder_current_shot
      loops: -1
      speed: 1
      priority: 1200

  simon_dieharder_choose_right_loop:
    simon_dieharder_right_loop_flash:
      key: key_simon_dieharder_current_shot
      loops: -1
      speed: 1
      priority: 1200

  simon_dieharder_choose_right_ramp:
    simon_dieharder_right_ramp_flash:
      key: key_simon_dieharder_current_shot
      loops: -1
      speed: 1
      priority: 1200

  simon_dieharder_choose_left_ramp:
    simon_dieharder_left_ramp_flash:
      key: key_simon_dieharder_current_shot
      loops: -1
      speed: 1
      priority: 1200

  simon_dieharder_correct_progress_shot:
    key_simon_dieharder_current_shot:
      action: stop
    simon_dieharder_white_flasher_hit:
      key: key_simon_dieharder_white_flasher_hit
      loops: 1
      speed: 1
      priority: 950
    simon_dieharder_gi_hit_flash:
      key: key_simon_dieharder_gi_hit_flash
      loops: 1
      speed: 1
      priority: 900

  simon_dieharder_correct_final_shot:
    key_simon_dieharder_current_shot:
      action: stop
    simon_dieharder_white_flasher_hit:
      key: key_simon_dieharder_white_flasher_hit
      loops: 1
      speed: 1
      priority: 950
    simon_dieharder_gi_hit_flash:
      key: key_simon_dieharder_gi_hit_flash
      loops: 1
      speed: 1
      priority: 900

  simon_dieharder_complete:
    simon_dieharder_start_save_flash:
      action: stop
    key_simon_dieharder_insert_flash:
      action: stop
    key_simon_dieharder_current_shot:
      action: stop
    key_simon_dieharder_white_flasher_hit:
      action: stop
    key_simon_dieharder_gi_hit_flash:
      action: stop

  simon_dieharder_fail_mode:
    simon_dieharder_start_save_flash:
      action: stop
    simon_dieharder_complete_save_flash:
      action: stop
    key_simon_dieharder_insert_flash:
      action: stop
    key_simon_dieharder_current_shot:
      action: stop
    key_simon_dieharder_white_flasher_hit:
      action: stop
    key_simon_dieharder_gi_hit_flash:
      action: stop

  mode_simon_dieharder_stopping:
    simon_dieharder_start_save_flash:
      action: stop
    simon_dieharder_complete_save_flash:
      action: stop
    key_simon_dieharder_insert_flash:
      action: stop
    key_simon_dieharder_current_shot:
      action: stop
    key_simon_dieharder_white_flasher_hit:
      action: stop
    key_simon_dieharder_gi_hit_flash:
      action: stop

# ------------------------------------------------------------
# SLIDE PLAYER
# ------------------------------------------------------------
# Background runs during Simon Die Harder.
# Timer fail / ball drain uses Die Harder ball-lost flow:
# no flippers, play_ball_lost, then simon_ball_lost slide.
# ------------------------------------------------------------
slide_player:
  mode_simon_dieharder_started:
    simon_dieharder_background:
      action: play
      expire: 0s
      priority: 500

  simon_dieharder_complete:
    simon_dieharder_background:
      action: remove
    simon_defeated:
      action: play
      expire: 0s
      priority: 900

  simon_dieharder_completed:
    simon_defeated:
      action: remove

  simon_dieharder_fail_mode:
    simon_dieharder_background:
      action: remove
    simon_ball_lost:
      action: play
      expire: 0s
      priority: 900

  simon_dieharder_failed:
    simon_ball_lost:
      action: remove

  mode_simon_dieharder_stopping:
    simon_dieharder_background:
      action: remove
    simon_defeated:
      action: remove
    simon_ball_lost:
      action: remove

# ------------------------------------------------------------
# SOUND PLAYER
# ------------------------------------------------------------
# Starts Simon music and stops it when Simon ends.
# ------------------------------------------------------------
sound_player:
  simon_dieharder_music_start:
    SimonTheme:
      key: main_music
      action: play
      loops: -1
      volume: 0.8

  simon_dieharder_complete:
    SimonTheme:
      key: main_music
      action: stop

  simon_dieharder_fail_mode:
    SimonTheme:
      key: main_music
      action: stop

  mode_simon_dieharder_stopping:
    SimonTheme:
      key: main_music
      action: stop