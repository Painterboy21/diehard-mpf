#config_version=6
# ------------------------------------------------------------
# QUALIFY NAKATOMI
# ------------------------------------------------------------
# What this mode does:
#   - Runs during normal single-ball play before Nakatomi Multiball.
#   - Qualifies the Nakatomi lock from the two Holly shots.
#   - Opens the Nakatomi entrance when lock is lit.
#   - Locks 3 balls using the tower VUK / Nakatomi lock flow.
#   - Lock progress is shared across all players as a steal multiball.
#   - Starts Nakatomi Multiball after the 3rd lock slide is removed.
#   - Once claimed, no other player can qualify or start it that game.
#   - Stops during villains, Ambush, wizard mode, Airplane lock flow, or other multiballs.
#   - Every start event is gated so Nakatomi cannot restart once played.
#   - Blocked while Yippee Ki Yay or final Wizard is running.
# ------------------------------------------------------------
mode:
  start_events:
    - ball_started{current_player.number == 1 and current_player.ball == 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - ball_started{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - multiball_central_park_ended{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - multiball_airplane_ended{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - mode_ambush_stopped{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    # Hans finished
    - hans_diehard_won_complete{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - hans_diehard_failed_complete{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - hans_dieharder_won_complete{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - hans_dieharder_failed_complete{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    # Katya finished
    - katya_completed{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - katya_failed{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - katya_dieharder_completed{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - katya_dieharder_failed{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    # Karl finished
    - karl_diehard_completed{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - karl_diehard_failed{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - karl_dieharder_completed{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - karl_dieharder_failed{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    # Simon finished
    - simon_completed{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - simon_failed{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - simon_dieharder_completed{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - simon_dieharder_failed{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    # Col / Stuart finished
    - col_stuart_diehard_completed{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - col_stuart_diehard_failed{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - col_stuart_dieharder_completed{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - col_stuart_dieharder_failed{current_player.played_nakatomi_multiball==0 and machine.nakatomi_multiball_claimed != 1 and current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
  stop_events:
    - ball_ended
    # Stop during multiballs
    - multiball_nakatomi_started
    - multiball_central_park_started
    - multiball_airplane_started
    - start_airplane_multiball
    - mode_airplane_multiball_started
    # Stop during Ambush
    - start_ambush_from_vuk_hold
    - start_ambush_from_mystery
    - mode_ambush_started
    # Stop when Airplane third ball lock completes
    - airplane_ball_2_locked_complete
    # Stop during any villain mode
    - villain_mode_started
    # Hans started
    - start_hans_diehard
    - start_hans_dieharder
    # Katya started
    - start_katya_diehard
    - start_katya_dieharder
    # Karl started
    - start_karl_diehard
    - start_karl_dieharder
    # Simon started
    - start_simon_diehard
    - start_simon_dieharder
    # Col / Stuart started
    - start_col_stuart_diehard
    - start_col_stuart_dieharder
    - start_col_diehard
    - start_col_dieharder
    - mode_col_diehard_started
    - mode_col_dieharder_started
    - mode_col_stuart_diehard_started
    - mode_col_stuart_dieharder_started
    # Yippee / Wizard started
    - start_yippee_ki_yay_wizard
    - start_yippee_ki_yay_final_wizard
    - mode_yippee_ki_yay_wizard_started
    - mode_wizard_mode_started
  priority: 120
# ------------------------------------------------------------
# EVENT PLAYER
# ------------------------------------------------------------
# Handles lock gate/entrance behaviour and starts multiball after
# the final lock slide is removed.
# ------------------------------------------------------------
event_player:
  timer_nakatomi_lock_reset_complete:
    - nakatomi_lock_open
  qualify_nakatomi_on_complete:
    - nakatomi_lock_open
    - nakatomi_entrance_lock_open
  qualify_nakatomi_on_complete{machine.nakatomi_balls_locked_shared < 3}:
    - enable_nakatomi_multiball_lock
  trigger_nakatomi_ball_locked:
    - nakatomi_entrance_lock_close
  mode_qualify_nakatomi_started{current_player.shot_nakatomi_lock_lit == 1}:
    - nakatomi_entrance_lock_open
  mode_qualify_nakatomi_started{current_player.shot_nakatomi_lock_lit == 0}:
    - nakatomi_entrance_lock_close
  mode_qualify_nakatomi_started{current_player.shot_nakatomi_lock_lit == 1 and machine.nakatomi_balls_locked_shared < 3}:
    - enable_nakatomi_multiball_lock
  mode_qualify_nakatomi_started{machine.nakatomi_balls_locked_shared > 0}:
    - nakatomi_lock_open
  multiball_nakatomi_started.1:
    - nakatomi_lock_close
    - nakatomi_entrance_lock_close
  slide_nakatomi_mb_removed:
    - start_nakatomi_multiball
# ------------------------------------------------------------
# MULTIBALL LOCKS
# ------------------------------------------------------------
# Locks 3 balls for Nakatomi using the tower VUK flow.
# ------------------------------------------------------------
multiball_locks:
  nakatomi:
    balls_to_lock: 3
    lock_devices: tower_vuk
    balls_to_replace: 2
    enable_events: enable_nakatomi_multiball_lock
    disable_events: trigger_nakatomi_ball_locked
    reset_count_for_current_player_events: restart_nakatomi_locks
    locked_ball_counting_strategy: physical_only
# ------------------------------------------------------------
# QUEUE RELAY PLAYER
# ------------------------------------------------------------
# Holds trough replacement eject while the Nakatomi lock slide is playing.
# ------------------------------------------------------------
queue_relay_player:
  balldevice_trough_ball_eject_attempt{current_player.ball_locking_nakatomi == 1}:
    post: wait_for_naktomi_locking_slide
    wait_for: trigger_nakatomi_ball_locked
# ------------------------------------------------------------
# SHOT GROUPS
# ------------------------------------------------------------
# Completing both Holly shots lights the Nakatomi lock.
# ------------------------------------------------------------
shot_groups:
  qualify_nakatomi:
    shots: nakatomi_lock_left,nakatomi_lock_right
    restart_events: trigger_nakatomi_ball_locked
# ------------------------------------------------------------
# SHOTS
# ------------------------------------------------------------
# Holly shots qualify the lock. l7 flashes green when lock is lit.
# ------------------------------------------------------------
shots:
  nakatomi_lock_left:
    switch: s_holly_l
    profile: profile_nakatomi_lock
    show_tokens:
      lights: l17
  nakatomi_lock_right:
    switch: s_holly_l1
    profile: profile_nakatomi_lock
    show_tokens:
      lights: l16
  nakatomi_lock_lit:
    profile: profile_off_then_flash
    show_tokens:
      lights: l7
      color: 00ff00
    control_events:
      - events: qualify_nakatomi_on_complete
        state: 1
      - events: trigger_nakatomi_ball_locked
        state: 0
# ------------------------------------------------------------
# SHOW PLAYER
# ------------------------------------------------------------
# Plays the Nakatomi ball locked show and posts the lock-complete event.
# ------------------------------------------------------------
show_player:
  multiball_lock_nakatomi_locked_ball:
    nakatomi_ball_locked:
      key: key_nakatomi_ball_locked
      loops: 0
      events_when_completed: trigger_nakatomi_ball_locked
# ------------------------------------------------------------
# SLIDE PLAYER
# ------------------------------------------------------------
# Shows lock lit, ball 1 locked, ball 2 locked, and multiball intro slides.
# ------------------------------------------------------------
slide_player:
  qualify_nakatomi_on_complete:
    lock_is_lit:
      action: play
      expire: 0s
  multiball_lock_nakatomi_locked_ball{machine.nakatomi_balls_locked_shared == 0}:
    ball_1_locked:
      action: play
      expire: 0s
  multiball_lock_nakatomi_locked_ball{machine.nakatomi_balls_locked_shared == 1}:
    ball_2_locked:
      action: play
      expire: 0s
  multiball_lock_nakatomi_locked_ball{machine.nakatomi_balls_locked_shared == 2}:
    nakatomi_mb:
      action: play
      expire: 0s
# ------------------------------------------------------------
# TIMERS
# ------------------------------------------------------------
# Reopens the Nakatomi lock hold path after lock qualification / mode restart.
# ------------------------------------------------------------
timers:
  nakatomi_lock_reset:
    start_value: 0
    end_value: 1
    direction: up
    control_events:
      - event: qualify_nakatomi_on_complete
        action: restart
      - event: mode_qualify_nakatomi_started{machine.nakatomi_balls_locked_shared > 0}
        action: restart
      - event: multiball_nakatomi_started
        action: stop
    restart_on_complete: True
    start_running: False
    tick_interval: 60000ms
# ------------------------------------------------------------
# VARIABLE PLAYER
# ------------------------------------------------------------
# Tracks the current player's locking state plus shared game-wide
# lock progress and the game-wide Nakatomi Multiball claimed flag.
# ------------------------------------------------------------
variable_player:
  mode_qualify_nakatomi_started.100{current_player.number == 1 and current_player.ball == 1}:
    nakatomi_balls_locked_shared:
      action: set_machine
      int: 0
    nakatomi_multiball_claimed:
      action: set_machine
      int: 0
  mode_qualify_nakatomi_started:
    ball_locking_nakatomi:
      action: set
      int: 0
  multiball_nakatomi_started.100:
    nakatomi_multiball_claimed:
      action: set_machine
      int: 1
  multiball_lock_nakatomi_locked_ball:
    ball_locking_nakatomi:
      action: set
      int: 1
    eob_bonus_multiball:
      action: add
      int: 100000
  trigger_nakatomi_ball_locked.10:
    ball_locking_nakatomi:
      action: set
      int: 0
    nakatomi_balls_locked_shared:
      action: add_machine
      int: 1
# ------------------------------------------------------------
# COIL PLAYER
# ------------------------------------------------------------
# Ejects from the tower VUK after the Nakatomi lock slide completes.
# ------------------------------------------------------------
coil_player:
  trigger_nakatomi_ball_locked: c_towervuk_eject