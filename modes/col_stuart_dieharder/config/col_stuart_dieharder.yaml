#config_version=6

# ------------------------------------------------------------
# COL / STUART DIE HARDER
# ------------------------------------------------------------
# What this mode does:
#   - Starts from start_col_stuart_dieharder.
#   - Only starts if Col/Stuart has not already been completed.
#   - Player hits any lit yellow shot once.
#   - That same shot stays lit.
#   - Player must hit that same shot again to complete the mode.
#   - Normal timer = 45 seconds.
#   - Hans Bonus timer = 70 seconds.
#   - Mystery Add More Time adds +10 seconds.
#   - Complete plays ColDefeated.
#   - Fail/timer/ball drain plays the ball-lost / player-died slide.
#   - Completion counts Col/Stuart toward Extra Ball.
#   - Completion unlocks 5x playfield path and sets Stuart bonus.
#   - Left ramp uses s_upper_pf_entrance.
# ------------------------------------------------------------
mode:
  start_events:
    - start_col_stuart_dieharder{current_player.col_stuart_complete==0}
  stop_events:
    - col_stuart_dieharder_completed
    - col_stuart_dieharder_failed
    - ball_ended
  priority: 170

timers:
  col_stuart_dieharder_timer:
    start_value: 35
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: col_stuart_start_normal_timer
        action: restart
        value: 35
      - event: col_stuart_start_hans_bonus_timer
        action: restart
        value: 60
      - event: col_stuart_dieharder_completed
        action: stop
      - event: col_stuart_dieharder_failed
        action: stop
      - event: add_villain_time_from_mystery
        action: add
        value: 10

ball_saves:
  col_stuart_dieharder_start_save:
    active_time: 2s
    hurry_up_time: 0s
    grace_period: 0s
    auto_launch: true
    balls_to_save: 1
    enable_events:
      - col_stuart_enable_start_ball_save
    disable_events:
      - col_stuart_disable_start_ball_save
      - col_stuart_fail_mode
      - col_stuart_dieharder_completed
      - col_stuart_dieharder_failed
      - mode_col_stuart_dieharder_stopping
      - ball_ended
      - tilt
  col_stuart_dieharder_complete_save:
    active_time: 5s
    hurry_up_time: 1s
    grace_period: 1s
    auto_launch: true
    balls_to_save: 1
    enable_events:
      - col_stuart_enable_complete_ball_save
    disable_events:
      - col_stuart_disable_complete_ball_save
      - mode_col_stuart_dieharder_stopping
      - ball_ended
      - tilt

shots:
  col_stuart_dieharder_left_orbit:
    hit_events:
      - left_orbit_hit
    enable_events:
      - col_stuart_enable_left_orbit
    disable_events:
      - col_stuart_disable_left_orbit
      - col_stuart_disable_all_shots
      - col_stuart_dieharder_completed
      - col_stuart_dieharder_failed
      - col_stuart_fail_mode
  col_stuart_dieharder_left_ramp:
    switch: s_upper_pf_entrance
    enable_events:
      - col_stuart_enable_left_ramp
    disable_events:
      - col_stuart_disable_left_ramp
      - col_stuart_disable_all_shots
      - col_stuart_dieharder_completed
      - col_stuart_dieharder_failed
      - col_stuart_fail_mode
  col_stuart_dieharder_right_ramp:
    switch: s_air_duct
    enable_events:
      - col_stuart_enable_right_ramp
    disable_events:
      - col_stuart_disable_right_ramp
      - col_stuart_disable_all_shots
      - col_stuart_dieharder_completed
      - col_stuart_dieharder_failed
      - col_stuart_fail_mode
  col_stuart_dieharder_upper_loop:
    switch: s_mid_orbit
    enable_events:
      - col_stuart_enable_upper_loop
    disable_events:
      - col_stuart_disable_upper_loop
      - col_stuart_disable_all_shots
      - col_stuart_dieharder_completed
      - col_stuart_dieharder_failed
      - col_stuart_fail_mode
  col_stuart_dieharder_right_orbit:
    hit_events:
      - right_orbit_hit
    enable_events:
      - col_stuart_enable_right_orbit
    disable_events:
      - col_stuart_disable_right_orbit
      - col_stuart_disable_all_shots
      - col_stuart_dieharder_completed
      - col_stuart_dieharder_failed
      - col_stuart_fail_mode

event_player:
  mode_col_stuart_dieharder_started:
    - villain_mode_started
    - stop_base_music
    - col_stuart_music_start
    - col_stuart_reset
    - col_stuart_enable_start_ball_save
    - reset_bullets
    - reset_bullet_total
    - nakatomi_entrance_lock_close
    - col_stuart_enable_all_remaining|100ms
    - col_stuart_clear_start_text|50ms
    - col_stuart_set_start_text|150ms
  mode_col_stuart_dieharder_started{current_player.hans_bonus == 1}:
    - col_stuart_start_hans_bonus_timer
  mode_col_stuart_dieharder_started{current_player.hans_bonus != 1}:
    - col_stuart_start_normal_timer
  mode_col_stuart_dieharder_stopping:
    - villain_mode_stopped
    - flipper_on
    - wire_ramp_exit_closed
    - col_stuart_disable_all_shots
    - col_stuart_disable_start_ball_save
    - col_stuart_disable_complete_ball_save
  timer_col_stuart_dieharder_timer_complete{current_player.col_stuart_result_started == 0}:
    - col_stuart_fail_mode
  ball_drain{current_player.col_stuart_result_started == 0}:
    - col_stuart_fail_mode
  col_stuart_fail_mode:
    - flipper_off
    - play_ball_lost
    - col_stuart_ball_lost_slide
    - col_stuart_lights_off
    - col_stuart_disable_all_shots
    - col_stuart_disable_start_ball_save
    - reset_bullets
    - reset_bullet_total
    - wire_ramp_exit_closed
    - col_stuart_dieharder_failed|5s
  col_stuart_dieharder_failed:
    - resume_base_music|500ms
  col_stuart_check_complete{current_player.col_stuart_progress >= 2 and current_player.col_stuart_result_started == 0}:
    - col_stuart_defeated_slide
    - col_stuart_disable_all_shots
    - col_stuart_disable_start_ball_save
    - col_stuart_enable_complete_ball_save
    - col_stuart_dieharder_completed|5s
  col_stuart_defeated_slide:
    - show_col_dieharder_villian_bonus_widget|250ms
  col_stuart_dieharder_completed:
    - col_stuart_score_complete
    - count_stuart_for_extra_ball
    - unlock_5x_playfield
    - reset_bullets
    - reset_bullet_total
    - wire_ramp_exit_closed
    - resume_base_music|500ms
    - restore_col_stuart_complete_insert|750ms
  col_stuart_dieharder_left_orbit_hit{current_player.col_stuart_shot_mode == 0 and current_player.col_stuart_left_orbit_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_left_orbit_first_hit
    - col_stuart_disable_all_shots
    - col_stuart_enable_left_orbit
    - col_stuart_flash_left_orbit
    - col_stuart_update_remaining|20ms
  col_stuart_dieharder_left_ramp_hit{current_player.col_stuart_shot_mode == 0 and current_player.col_stuart_left_ramp_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_left_ramp_first_hit
    - col_stuart_disable_all_shots
    - col_stuart_enable_left_ramp
    - col_stuart_flash_left_ramp
    - col_stuart_update_remaining|20ms
  col_stuart_dieharder_right_ramp_hit{current_player.col_stuart_shot_mode == 0 and current_player.col_stuart_right_ramp_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_right_ramp_first_hit
    - col_stuart_disable_all_shots
    - col_stuart_enable_right_ramp
    - col_stuart_flash_right_ramp
    - col_stuart_update_remaining|20ms
  col_stuart_dieharder_upper_loop_hit{current_player.col_stuart_shot_mode == 0 and current_player.col_stuart_upper_loop_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_upper_loop_first_hit
    - col_stuart_disable_all_shots
    - col_stuart_enable_upper_loop
    - col_stuart_flash_upper_loop
    - col_stuart_update_remaining|20ms
  col_stuart_dieharder_right_orbit_hit{current_player.col_stuart_shot_mode == 0 and current_player.col_stuart_right_orbit_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_right_orbit_first_hit
    - col_stuart_disable_all_shots
    - col_stuart_enable_right_orbit
    - col_stuart_flash_right_orbit
    - col_stuart_update_remaining|20ms
  col_stuart_dieharder_left_orbit_hit{current_player.col_stuart_shot_mode == 1 and current_player.col_stuart_last_shot == 1 and current_player.col_stuart_result_started == 0}:
    - col_stuart_left_orbit_confirmed
    - col_stuart_disable_all_shots
    - col_stuart_flash_left_orbit
    - col_stuart_after_confirmed|20ms
  col_stuart_dieharder_left_ramp_hit{current_player.col_stuart_shot_mode == 1 and current_player.col_stuart_last_shot == 2 and current_player.col_stuart_result_started == 0}:
    - col_stuart_left_ramp_confirmed
    - col_stuart_disable_all_shots
    - col_stuart_flash_left_ramp
    - col_stuart_after_confirmed|20ms
  col_stuart_dieharder_right_ramp_hit{current_player.col_stuart_shot_mode == 1 and current_player.col_stuart_last_shot == 3 and current_player.col_stuart_result_started == 0}:
    - col_stuart_right_ramp_confirmed
    - col_stuart_disable_all_shots
    - col_stuart_flash_right_ramp
    - col_stuart_after_confirmed|20ms
  col_stuart_dieharder_upper_loop_hit{current_player.col_stuart_shot_mode == 1 and current_player.col_stuart_last_shot == 4 and current_player.col_stuart_result_started == 0}:
    - col_stuart_upper_loop_confirmed
    - col_stuart_disable_all_shots
    - col_stuart_flash_upper_loop
    - col_stuart_after_confirmed|20ms
  col_stuart_dieharder_right_orbit_hit{current_player.col_stuart_shot_mode == 1 and current_player.col_stuart_last_shot == 5 and current_player.col_stuart_result_started == 0}:
    - col_stuart_right_orbit_confirmed
    - col_stuart_disable_all_shots
    - col_stuart_flash_right_orbit
    - col_stuart_after_confirmed|20ms
  col_stuart_after_confirmed{current_player.col_stuart_progress >= 2}:
    - col_stuart_check_complete
  col_stuart_enable_all_remaining{current_player.col_stuart_left_orbit_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_enable_left_orbit
    - col_stuart_flash_left_orbit
  col_stuart_enable_all_remaining{current_player.col_stuart_left_ramp_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_enable_left_ramp
    - col_stuart_flash_left_ramp
  col_stuart_enable_all_remaining{current_player.col_stuart_right_ramp_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_enable_right_ramp
    - col_stuart_flash_right_ramp
  col_stuart_enable_all_remaining{current_player.col_stuart_upper_loop_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_enable_upper_loop
    - col_stuart_flash_upper_loop
  col_stuart_enable_all_remaining{current_player.col_stuart_right_orbit_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_enable_right_orbit
    - col_stuart_flash_right_orbit
  ball_save_col_stuart_dieharder_start_save_saving_ball:
    - ball_save_saving_ball
  ball_save_col_stuart_dieharder_complete_save_saving_ball:
    - ball_save_saving_ball

