#config_version=6

widgets:
  playfield_2x:
    widget: playfield_2x
  playfield_3x:
    widget: playfield_3x
  playfield_4x:
    widget: playfield_4x
  playfield_5x:
    widget: playfield_5x

mode:
  start_events: ball_started
  stop_events: ball_ended
  priority: 90

timers:
  playfield_x_timer:
    start_value: 30
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: playfield_x_started
        action: restart
      - event: playfield_x_expired
        action: stop
      - event: ball_ended
        action: stop

event_player:
  drop_target_bank1_down{current_player.playfield_multiplier<3 or current_player.stuart_bonus_active==1}:
    - pf_x_drop_1_lit

  drop_target_bank2_down{current_player.playfield_multiplier<3 or current_player.stuart_bonus_active==1}:
    - pf_x_drop_2_lit

  drop_target_bank3_down{current_player.playfield_multiplier<3 or current_player.stuart_bonus_active==1}:
    - pf_x_drop_3_lit

  drop_target_bank_bank_down{current_player.playfield_multiplier==1}:
    - playfield_x_qualified

  drop_target_bank_bank_down{current_player.playfield_multiplier==2}:
    - playfield_x_qualified

  drop_target_bank_bank_down{current_player.stuart_bonus_active==1 and current_player.playfield_multiplier>=3 and current_player.playfield_multiplier<5}:
    - playfield_x_qualified

  s_popbumper_left_active{current_player.playfield_x_qualified==1}:
    - increase_playfield_x
    - playfield_x_collected|10ms
    - playfield_x_started|20ms

  s_popbumper_right_active{current_player.playfield_x_qualified==1}:
    - increase_playfield_x
    - playfield_x_collected|10ms
    - playfield_x_started|20ms

  timer_playfield_x_timer_complete:
    - playfield_x_expired

variable_player:
  mode_playfield_x_started:
    playfield_multiplier:
      int: 1
      action: set
    playfield_x_qualified:
      int: 0
      action: set

  drop_target_bank1_down:
    score:
      int: "10000 * current_player.playfield_multiplier"
      action: add

  drop_target_bank2_down:
    score:
      int: "10000 * current_player.playfield_multiplier"
      action: add

  drop_target_bank3_down:
    score:
      int: "10000 * current_player.playfield_multiplier"
      action: add

  playfield_x_qualified:
    playfield_x_qualified:
      int: 1
      action: set

  increase_playfield_x{current_player.stuart_bonus_active!=1 and current_player.playfield_multiplier<3}:
    playfield_multiplier:
      int: 1
      action: add

  increase_playfield_x{current_player.stuart_bonus_active==1 and current_player.playfield_multiplier<5}:
    playfield_multiplier:
      int: 1
      action: add

  playfield_x_collected:
    score:
      int: "50000 * current_player.playfield_multiplier"
      action: add
    playfield_x_qualified:
      int: 0
      action: set

  playfield_x_expired:
    playfield_multiplier:
      int: 1
      action: set
    playfield_x_qualified:
      int: 0
      action: set

widget_player:
  playfield_x_started{current_player.playfield_multiplier==2}:
    playfield_2x:
      action: play
      expire: 2s

  playfield_x_started{current_player.playfield_multiplier==3}:
    playfield_3x:
      action: play
      expire: 2s

  playfield_x_started{current_player.playfield_multiplier==4}:
    playfield_4x:
      action: play
      expire: 2s

  playfield_x_started{current_player.playfield_multiplier==5}:
    playfield_5x:
      action: play
      expire: 2s

show_player:
  pf_x_drop_1_lit:
    flash_color:
      key: pf_x_l18_yellow_slow
      speed: 2
      loops: -1
      priority: 1000
      show_tokens:
        lights: l18
        color: yellow

  pf_x_drop_2_lit:
    pf_x_l18_yellow_slow:
      action: stop
    flash_color:
      key: pf_x_l18_yellow_fast
      speed: 5
      loops: -1
      priority: 1000
      show_tokens:
        lights: l18
        color: yellow

  playfield_x_qualified:
    pf_x_l18_yellow_slow:
      action: stop
    pf_x_l18_yellow_fast:
      action: stop
    pf_x_l18_green_ready:
      action: stop
    flash_color:
      key: pf_x_l18_green_ready
      speed: 8
      loops: -1
      priority: 1000
      show_tokens:
        lights: l18
        color: green

  playfield_x_collected:
    pf_x_l18_yellow_slow:
      action: stop
    pf_x_l18_yellow_fast:
      action: stop
    pf_x_l18_green_ready:
      action: stop
    pf_x_2x_flash:
      action: stop
    pf_x_3x_flash:
      action: stop
    pf_x_4x_flash:
      action: stop
    pf_x_5x_flash:
      action: stop

  playfield_x_started{current_player.playfield_multiplier==2}:
    flash_color:
      key: pf_x_2x_flash
      speed: 5
      loops: -1
      priority: 1000
      show_tokens:
        lights: l12
        color: yellow

  playfield_x_started{current_player.playfield_multiplier==3}:
    pf_x_2x_flash:
      action: stop
    flash_color:
      key: pf_x_3x_flash
      speed: 5
      loops: -1
      priority: 1000
      show_tokens:
        lights: l13
        color: yellow

  playfield_x_started{current_player.playfield_multiplier==4}:
    pf_x_3x_flash:
      action: stop
    flash_color:
      key: pf_x_4x_flash
      speed: 5
      loops: -1
      priority: 1000
      show_tokens:
        lights: l15
        color: yellow

  playfield_x_started{current_player.playfield_multiplier==5}:
    pf_x_4x_flash:
      action: stop
    flash_color:
      key: pf_x_5x_flash
      speed: 5
      loops: -1
      priority: 1000
      show_tokens:
        lights: l14
        color: yellow

  playfield_x_expired:
    pf_x_l18_yellow_slow:
      action: stop
    pf_x_l18_yellow_fast:
      action: stop
    pf_x_l18_green_ready:
      action: stop
    pf_x_2x_flash:
      action: stop
    pf_x_3x_flash:
      action: stop
    pf_x_4x_flash:
      action: stop
    pf_x_5x_flash:
      action: stop

  ball_ended:
    pf_x_l18_yellow_slow:
      action: stop
    pf_x_l18_yellow_fast:
      action: stop
    pf_x_l18_green_ready:
      action: stop
    pf_x_2x_flash:
      action: stop
    pf_x_3x_flash:
      action: stop
    pf_x_4x_flash:
      action: stop
    pf_x_5x_flash:
      action: stop

light_player:
  playfield_x_collected:
    l18:
      color: off
      priority: 1000

  playfield_x_started{current_player.playfield_multiplier==2}:
    l18:
      color: off
      priority: 1000

  playfield_x_started{current_player.playfield_multiplier==3}:
    l12:
      color: white
      priority: 1000
    l18:
      color: off
      priority: 1000

  playfield_x_started{current_player.playfield_multiplier==4}:
    l12:
      color: white
      priority: 1000
    l13:
      color: white
      priority: 1000
    l18:
      color: off
      priority: 1000

  playfield_x_started{current_player.playfield_multiplier==5}:
    l12:
      color: white
      priority: 1000
    l13:
      color: white
      priority: 1000
    l15:
      color: white
      priority: 1000
    l18:
      color: off
      priority: 1000

  playfield_x_expired:
    l12:
      color: off
      priority: 1000
    l13:
      color: off
      priority: 1000
    l14:
      color: off
      priority: 1000
    l15:
      color: off
      priority: 1000
    l18:
      color: off
      priority: 1000

  ball_ended:
    l12:
      color: off
      priority: 1000
    l13:
      color: off
      priority: 1000
    l14:
      color: off
      priority: 1000
    l15:
      color: off
      priority: 1000
    l18:
      color: off
      priority: 1000