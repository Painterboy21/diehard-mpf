#config_version=6

mode:
  start_events: ball_started
  stop_events: ball_ended
  priority: 90


timers:
  playfield_x_timer:
    start_value: 30
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: playfield_x_started
        action: restart
      - event: playfield_x_expired
        action: stop
      - event: ball_ended
        action: stop


event_player:

  drop_target_bank1_down:
    - pf_x_drop_1_lit

  drop_target_bank2_down:
    - pf_x_drop_2_lit

  drop_target_bank3_down:
    - pf_x_drop_3_lit

  drop_target_bank_bank_down{current_player.stuart_bonus_active!=1 and current_player.playfield_multiplier<3}:
    - playfield_x_qualified

  drop_target_bank_bank_down{current_player.stuart_bonus_active==1 and current_player.playfield_multiplier<5}:
    - playfield_x_qualified


  s_popbumper_left_active{current_player.playfield_x_qualified==1}:
    - increase_playfield_x
    - playfield_x_collected|10ms
    - playfield_x_started|20ms

  s_popbumper_right_active{current_player.playfield_x_qualified==1}:
    - increase_playfield_x
    - playfield_x_collected|10ms
    - playfield_x_started|20ms


  timer_playfield_x_timer_complete:
    - playfield_x_expired


variable_player:
  mode_playfield_x_started:
    playfield_multiplier:
      int: 1
      action: set
    playfield_x_qualified:
      int: 0
      action: set

  drop_target_bank1_down:
    score: 10000 * current_player.playfield_multiplier

  drop_target_bank2_down:
    score: 10000 * current_player.playfield_multiplier

  drop_target_bank3_down:
    score: 10000 * current_player.playfield_multiplier

  playfield_x_qualified:
    playfield_x_qualified:
      int: 1
      action: set

  increase_playfield_x{current_player.stuart_bonus_active!=1 and current_player.playfield_multiplier<3}:
    playfield_multiplier: 1

  increase_playfield_x{current_player.stuart_bonus_active==1 and current_player.playfield_multiplier<5}:
    playfield_multiplier: 1

  playfield_x_collected:
    score: 50000 * current_player.playfield_multiplier
    playfield_x_qualified:
      int: 0
      action: set

  playfield_x_expired:
    playfield_multiplier:
      int: 1
      action: set
    playfield_x_qualified:
      int: 0
      action: set


show_player:
  pf_x_drop_1_lit:
    flash_color:
      key: pf_x_l18_yellow_slow
      speed: 2
      loops: -1
      priority: 90
      show_tokens:
        lights: l18
        color: yellow


  pf_x_drop_2_lit:
    pf_x_l18_yellow_slow:
      action: stop

    flash_color:
      key: pf_x_l18_yellow_fast
      speed: 5
      loops: -1
      priority: 90
      show_tokens:
        lights: l18
        color: yellow


  playfield_x_qualified:
    pf_x_l18_yellow_slow:
      action: stop

    pf_x_l18_yellow_fast:
      action: stop

    flash_color:
      key: pf_x_l18_green_ready
      speed: 8
      loops: -1
      priority: 95
      show_tokens:
        lights: l18
        color: green


  playfield_x_collected:
    pf_x_l18_green_ready:
      action: stop

    flash_color:
      key: pf_x_l18_red_collect
      speed: 10
      loops: 4
      priority: 110
      show_tokens:
        lights: l18
        color: red

  playfield_x_started{current_player.playfield_multiplier==2}:
    flash_color:
      key: pf_x_2x_flash
      speed: 5
      loops: -1
      priority: 91
      show_tokens:
        lights: l12
        color: orange

  playfield_x_started{current_player.playfield_multiplier==3}:
    pf_x_2x_flash:
      action: stop

    flash_color:
      key: pf_x_3x_flash
      speed: 5
      loops: -1
      priority: 91
      show_tokens:
        lights: l13
        color: orange

  playfield_x_started{current_player.playfield_multiplier==4}:
    pf_x_3x_flash:
      action: stop

    flash_color:
      key: pf_x_4x_flash
      speed: 5
      loops: -1
      priority: 91
      show_tokens:
        lights: l15
        color: orange

  playfield_x_started{current_player.playfield_multiplier==5}:
    pf_x_4x_flash:
      action: stop

    flash_color:
      key: pf_x_5x_flash
      speed: 5
      loops: -1
      priority: 91
      show_tokens:
        lights: l14
        color: orange


  playfield_x_expired:
    pf_x_l18_yellow_slow:
      action: stop

    pf_x_l18_yellow_fast:
      action: stop

    pf_x_l18_green_ready:
      action: stop

    pf_x_2x_flash:
      action: stop

    pf_x_3x_flash:
      action: stop

    pf_x_4x_flash:
      action: stop

    pf_x_5x_flash:
      action: stop


light_player:
  playfield_x_started{current_player.playfield_multiplier==2}:
    l12:
      color: ffcc00
      priority: 90

  playfield_x_started{current_player.playfield_multiplier==3}:
    l12:
      color: ffcc00
      priority: 90

    l13:
      color: ffcc00
      priority: 90

  playfield_x_started{current_player.playfield_multiplier==4}:
    l12:
      color: ffcc00
      priority: 90

    l13:
      color: ffcc00
      priority: 90

    l15:
      color: ffcc00
      priority: 90

  playfield_x_started{current_player.playfield_multiplier==5}:
    l12:
      color: ffcc00
      priority: 90

    l13:
      color: ffcc00
      priority: 90

    l15:
      color: ffcc00
      priority: 90

    l14:
      color: ffcc00
      priority: 90