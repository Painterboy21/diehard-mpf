#config_version=6

# ------------------------------------------------------------
# PLAYFIELD X
# ------------------------------------------------------------
# What this mode does:
#   - Starts each ball.
#   - Drop target bank qualifies Playfield X.
#   - Pop bumper collects and increases the playfield multiplier.
#   - Normal max is 3x.
#   - unlock_4x_playfield allows 4x for the rest of the game.
#   - unlock_5x_playfield allows 5x for the rest of the game.
#   - Active multiplier resets when timer expires.
#   - Unlocked max does not reset each ball.
# ------------------------------------------------------------
widgets:
  playfield_2x:
    widget: playfield_2x
  playfield_3x:
    widget: playfield_3x
  playfield_4x:
    widget: playfield_4x
  playfield_5x:
    widget: playfield_5x

# ------------------------------------------------------------
# MODE
# ------------------------------------------------------------
# Runs Playfield X during the ball.
# ------------------------------------------------------------
mode:
  start_events: ball_started
  stop_events: ball_ended
  priority: 90

# ------------------------------------------------------------
# TIMERS
# ------------------------------------------------------------
# Runs the active Playfield X countdown.
# When it expires, active multiplier resets back to 1x.
# ------------------------------------------------------------
timers:
  playfield_x_timer:
    start_value: 30
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: playfield_x_started
        action: restart
      - event: playfield_x_expired
        action: stop
      - event: ball_ended
        action: stop

# ------------------------------------------------------------
# EVENT PLAYER
# ------------------------------------------------------------
# Qualifies Playfield X from drop targets, collects it from
# pop bumpers, and handles timer expiry.
# ------------------------------------------------------------
event_player:
  drop_target_bank1_down{current_player.playfield_multiplier < current_player.playfield_x_max}:
    - pf_x_drop_1_lit
  drop_target_bank2_down{current_player.playfield_multiplier < current_player.playfield_x_max}:
    - pf_x_drop_2_lit
  drop_target_bank3_down{current_player.playfield_multiplier < current_player.playfield_x_max}:
    - pf_x_drop_3_lit
  drop_target_bank_bank_down{current_player.playfield_multiplier < current_player.playfield_x_max}:
    - playfield_x_qualified
  s_popbumper_left_active{current_player.playfield_x_qualified==1 and current_player.playfield_multiplier < current_player.playfield_x_max}:
    - increase_playfield_x
    - playfield_x_collected|10ms
    - playfield_x_started|20ms
  s_popbumper_right_active{current_player.playfield_x_qualified==1 and current_player.playfield_multiplier < current_player.playfield_x_max}:
    - increase_playfield_x
    - playfield_x_collected|10ms
    - playfield_x_started|20ms
  timer_playfield_x_timer_complete:
    - playfield_x_expired

# ------------------------------------------------------------
# VARIABLE PLAYER
# ------------------------------------------------------------
# Stores active multiplier, qualification state, and max
# multiplier unlock. Max stays unlocked for the rest of the game.
# ------------------------------------------------------------
variable_player:
  mode_playfield_x_started:
    playfield_multiplier:
      int: 1
      action: set
    playfield_x_qualified:
      int: 0
      action: set
  mode_playfield_x_started{current_player.playfield_x_max == None}:
    playfield_x_max:
      int: 3
      action: set
  mode_playfield_x_started{current_player.col_stuart_diehard_complete==1 and current_player.playfield_x_max < 4}:
    playfield_x_max:
      int: 4
      action: set
  mode_playfield_x_started{current_player.col_stuart_dieharder_complete==1 and current_player.playfield_x_max < 5}:
    playfield_x_max:
      int: 5
      action: set
  unlock_4x_playfield{current_player.playfield_x_max < 4}:
    playfield_x_max:
      int: 4
      action: set
  unlock_5x_playfield{current_player.playfield_x_max < 5}:
    playfield_x_max:
      int: 5
      action: set
  drop_target_bank1_down:
    score:
      int: "10000 * current_player.playfield_multiplier"
      action: add
  drop_target_bank2_down:
    score:
      int: "10000 * current_player.playfield_multiplier"
      action: add
  drop_target_bank3_down:
    score:
      int: "10000 * current_player.playfield_multiplier"
      action: add
  playfield_x_qualified:
    playfield_x_qualified:
      int: 1
      action: set
  increase_playfield_x{current_player.playfield_multiplier < current_player.playfield_x_max}:
    playfield_multiplier:
      int: 1
      action: add
  playfield_x_collected:
    score:
      int: "50000 * current_player.playfield_multiplier"
      action: add
    playfield_x_qualified:
      int: 0
      action: set
  playfield_x_expired:
    playfield_multiplier:
      int: 1
      action: set
    playfield_x_qualified:
      int: 0
      action: set

# ------------------------------------------------------------
# WIDGET PLAYER
# ------------------------------------------------------------
# Shows the correct Playfield X widget when multiplier starts.
# ------------------------------------------------------------
widget_player:
  playfield_x_started{current_player.playfield_multiplier==2}:
    playfield_2x:
      action: play
      expire: 2s
  playfield_x_started{current_player.playfield_multiplier==3}:
    playfield_3x:
      action: play
      expire: 2s
  playfield_x_started{current_player.playfield_multiplier==4}:
    playfield_4x:
      action: play
      expire: 2s
  playfield_x_started{current_player.playfield_multiplier==5}:
    playfield_5x:
      action: play
      expire: 2s

# ------------------------------------------------------------
# SHOW PLAYER
# ------------------------------------------------------------
# Flashes drop target progress, ready light, and active
# Playfield X multiplier lights.
# ------------------------------------------------------------
show_player:
  pf_x_drop_1_lit:
    flash_color:
      key: pf_x_l18_yellow_slow
      speed: 2
      loops: -1
      priority: 1000
      show_tokens:
        lights: l18
        color: yellow
  pf_x_drop_2_lit:
    pf_x_l18_yellow_slow:
      action: stop
    flash_color:
      key: pf_x_l18_yellow_fast
      speed: 5
      loops: -1
      priority: 1000
      show_tokens:
        lights: l18
        color: yellow
  playfield_x_qualified:
    pf_x_l18_yellow_slow:
      action: stop
    pf_x_l18_yellow_fast:
      action: stop
    pf_x_l18_green_ready:
      action: stop
    flash_color:
      key: pf_x_l18_green_ready
      speed: 8
      loops: -1
      priority: 1000
      show_tokens:
        lights: l18
        color: green
  playfield_x_collected:
    pf_x_l18_yellow_slow:
      action: stop
    pf_x_l18_yellow_fast:
      action: stop
    pf_x_l18_green_ready:
      action: stop
    pf_x_2x_flash:
      action: stop
    pf_x_3x_flash:
      action: stop
    pf_x_4x_flash:
      action: stop
    pf_x_5x_flash:
      action: stop
  playfield_x_started{current_player.playfield_multiplier==2}:
    flash_color:
      key: pf_x_2x_flash
      speed: 5
      loops: -1
      priority: 1000
      show_tokens:
        lights: l12
        color: yellow
  playfield_x_started{current_player.playfield_multiplier==3}:
    pf_x_2x_flash:
      action: stop
    flash_color:
      key: pf_x_3x_flash
      speed: 5
      loops: -1
      priority: 1000
      show_tokens:
        lights: l13
        color: yellow
  playfield_x_started{current_player.playfield_multiplier==4}:
    pf_x_3x_flash:
      action: stop
    flash_color:
      key: pf_x_4x_flash
      speed: 5
      loops: -1
      priority: 1000
      show_tokens:
        lights: l15
        color: yellow
  playfield_x_started{current_player.playfield_multiplier==5}:
    pf_x_4x_flash:
      action: stop
    flash_color:
      key: pf_x_5x_flash
      speed: 5
      loops: -1
      priority: 1000
      show_tokens:
        lights: l14
        color: yellow
  playfield_x_expired:
    pf_x_l18_yellow_slow:
      action: stop
    pf_x_l18_yellow_fast:
      action: stop
    pf_x_l18_green_ready:
      action: stop
    pf_x_2x_flash:
      action: stop
    pf_x_3x_flash:
      action: stop
    pf_x_4x_flash:
      action: stop
    pf_x_5x_flash:
      action: stop
  ball_ended:
    pf_x_l18_yellow_slow:
      action: stop
    pf_x_l18_yellow_fast:
      action: stop
    pf_x_l18_green_ready:
      action: stop
    pf_x_2x_flash:
      action: stop
    pf_x_3x_flash:
      action: stop
    pf_x_4x_flash:
      action: stop
    pf_x_5x_flash:
      action: stop

# ------------------------------------------------------------
# LIGHT PLAYER
# ------------------------------------------------------------
# Holds completed multiplier lights solid white and clears
# Playfield X lights when expired or ball ends.
# ------------------------------------------------------------
light_player:
  playfield_x_collected:
    l18:
      color: off
      priority: 1000
  playfield_x_started{current_player.playfield_multiplier==2}:
    l18:
      color: off
      priority: 1000
  playfield_x_started{current_player.playfield_multiplier==3}:
    l12:
      color: white
      priority: 1000
    l18:
      color: off
      priority: 1000
  playfield_x_started{current_player.playfield_multiplier==4}:
    l12:
      color: white
      priority: 1000
    l13:
      color: white
      priority: 1000
    l18:
      color: off
      priority: 1000
  playfield_x_started{current_player.playfield_multiplier==5}:
    l12:
      color: white
      priority: 1000
    l13:
      color: white
      priority: 1000
    l15:
      color: white
      priority: 1000
    l18:
      color: off
      priority: 1000
  playfield_x_expired:
    l12:
      color: off
      priority: 1000
    l13:
      color: off
      priority: 1000
    l14:
      color: off
      priority: 1000
    l15:
      color: off
      priority: 1000
    l18:
      color: off
      priority: 1000
  ball_ended:
    l12:
      color: off
      priority: 1000
    l13:
      color: off
      priority: 1000
    l14:
      color: off
      priority: 1000
    l15:
      color: off
      priority: 1000
    l18:
      color: off
      priority: 1000