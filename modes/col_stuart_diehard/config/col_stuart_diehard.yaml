    col_stuart_last_shot:
      action: set
      int: 0
    col_stuart_result_started:
      action: set
      int: 0
    col_stuart_result_display:
      action: set
      int: 0
    col_stuart_left_orbit_done:
      action: set
      int: 0
    col_stuart_left_ramp_done:
      action: set
      int: 0
    col_stuart_right_ramp_done:
      action: set
      int: 0
    col_stuart_upper_loop_done:
      action: set
      int: 0
    col_stuart_right_orbit_done:
      action: set
      int: 0
    col_stuart_villain_score:
      action: set
      int: 500000
    col_stuart_progress_shot_text:
      action: set
      string: "HIT ANY YELLOW SHOT"

  col_stuart_clear_start_text:
