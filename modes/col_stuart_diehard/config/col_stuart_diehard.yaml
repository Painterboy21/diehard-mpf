      int: 1000000
    col_stuart_progress:
      action: add
      int: 1
    col_stuart_last_shot:
      action: set
      int: 1
    col_stuart_shot_mode:
      action: set
      int: 1
    col_stuart_progress_shot_text:
      action: set
      string: "HIT LEFT ORBIT AGAIN"

  col_stuart_left_ramp_first_hit:
    score:
      action: add
      int: "1000000 * current_player.playfield_multiplier"
    col_stuart_villain_score:
      action: add
      int: 1000000
    col_stuart_progress:
      action: add
      int: 1
    col_stuart_last_shot:
      action: set
      int: 2
    col_stuart_shot_mode:
      action: set
      int: 1
    col_stuart_progress_shot_text:
      action: set
      string: "HIT LEFT RAMP AGAIN"

  col_stuart_right_ramp_first_hit:
    score:
      action: add
      int: "1000000 * current_player.playfield_multiplier"
    col_stuart_villain_score:
      action: add
      int: 1000000
    col_stuart_progress:
      action: add
      int: 1
    col_stuart_last_shot:
      action: set
      int: 3
    col_stuart_shot_mode:
      action: set
      int: 1
    col_stuart_progress_shot_text:
      action: set
      string: "HIT RIGHT RAMP AGAIN"

  col_stuart_upper_loop_first_hit:
