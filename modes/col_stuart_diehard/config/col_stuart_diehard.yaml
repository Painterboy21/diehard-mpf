      action: add
      int: "1000000 * current_player.playfield_multiplier"
    col_stuart_villain_score:
      action: add
      int: 1000000
    col_stuart_progress:
      action: add
      int: 1
    col_stuart_last_shot:
      action: set
      int: 4
    col_stuart_shot_mode:
      action: set
      int: 1
    col_stuart_progress_shot_text:
      action: set
