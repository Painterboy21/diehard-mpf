# ------------------------------------------------------------
# LIGHT PLAYER
# ------------------------------------------------------------
# Sets Col/Stuart blue mode colour, clears shot lights on result,
# and leaves Col/Stuart insert solid blue on completion.
# ------------------------------------------------------------
light_player:
  mode_col_stuart_diehard_started:
    GI:
      color: "0044ff"
    SPOTS:
      color: 757575
    SPOTS_BUMPER:
      color: 757575
    l1000:
      color: "0044ff"
    l1001:
      color: "0044ff"
    l44:
      color: "0044ff"

  col_stuart_diehard_completed:
    l1000: off
    l1001: off
    l20: off
    l21: off
    l22: off
    l23: off
    l24: off
    l44:
      color: "0044ff"
    l14:
      color: "0044ff"
    l15:
      color: "0044ff"

  col_stuart_diehard_failed:
    l1000: off
    l1001: off
    l20: off
    l21: off
    l22: off
    l23: off
    l24: off

# ------------------------------------------------------------
# SHOWS
# ------------------------------------------------------------
# Local shot insert flash, blue flasher burst, and GI/SPOTS hit flash.
# ------------------------------------------------------------
shows:
  col_stuart_flash_insert:
    - duration: 220ms
      lights:
        (led): (color)
    - duration: 220ms
      lights:
        (led): off

  col_stuart_hit_flashers:
    - duration: 80ms
      lights:
        f140: "0044ff"
        f141: "0044ff"
        f142: "0044ff"
        f143: "0044ff"
        f144: "0044ff"
        f145: "0044ff"
        f146: "0044ff"
        f147: "0044ff"
    - duration: 80ms
      lights:
        f140: off
        f141: off
        f142: off
        f143: off
        f144: off
        f145: off
        f146: off
        f147: off

  col_stuart_gi_spots_hit_flash:
    - duration: 80ms
      lights:
        GI: "ffffff"
        SPOTS: "ffffff"
        SPOTS_BUMPER: "ffffff"
    - duration: 120ms
      lights:
        GI: "0044ff"
        SPOTS: "202050"
        SPOTS_BUMPER: "101040"

# ------------------------------------------------------------
# SHOW PLAYER
# ------------------------------------------------------------
# Handles villain insert flash, yellow shot flashes, hit feedback,
# GI/SPOTS hit flash, and ball-save insert flashing.
# ------------------------------------------------------------
show_player:
  mode_col_stuart_diehard_started:
    col_stuart_insert_flash:
      show: col_stuart_flash_insert
      loops: -1
      speed: 2
      priority: 900
      show_tokens:
        led: l44
        color: "0044ff"

  col_stuart_enable_left_orbit:
    col_stuart_left_orbit_flash:
      show: col_stuart_flash_insert
      loops: -1
      speed: 2
      priority: 700
      show_tokens:
        led: l20
        color: "ffff00"

  col_stuart_disable_left_orbit:
    col_stuart_left_orbit_flash:
