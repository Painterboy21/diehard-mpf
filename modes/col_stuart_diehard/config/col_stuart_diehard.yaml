# ------------------------------------------------------------
# SLIDE PLAYER
# ------------------------------------------------------------
# Plays Col/Stuart background and intro, then swaps to defeated
# or escaped result slides.
# Mystery clear restores the Col/Stuart background after Add More Time.
# ------------------------------------------------------------
slide_player:
  mode_col_stuart_diehard_started:
    col_stuart_background:
      action: play
      expire: 0s
      priority: 500
    col_intro:
      action: play
      expire: 5s
      priority: 10000

  add_villain_time_from_mystery:
    col_intro:
      action: remove

  mystery_clear_award_display:
    col_intro:
      action: remove
    col_stuart_background:
      action: play
      expire: 0s
      priority: 10050

  slide_mystery_removed:
    col_stuart_background:
      action: play
      expire: 0s
      priority: 10050

  mode_col_stuart_diehard_stopping:
    col_stuart_background:
      action: remove
    col_intro:
      action: remove
    ColDefeated:
      action: remove
    ColEscaped:
      action: remove

  col_stuart_defeated_slide:
    col_intro:
      action: remove
    col_stuart_background:
      action: remove
    ColDefeated:
      action: play
      expire: 5s
      priority: 10000

  col_stuart_escaped_slide:
    col_intro:
      action: remove
    col_stuart_background:
      action: remove
    ColEscaped:
      action: play
      expire: 5s
      priority: 10000

# ------------------------------------------------------------
# WIDGET PLAYER
# ------------------------------------------------------------
# Shows and removes timer and progress-shot widgets.
# Mystery clear restores the Col/Stuart widgets after Add More Time.
# ------------------------------------------------------------
widget_player:
  mode_col_stuart_diehard_started:
    col_stuart_diehard_timer_widget:
      slide: col_stuart_background
      action: play
    col_stuart_progress_shot_widget:
      slide: col_stuart_background
      action: play

  mystery_clear_award_display:
    col_stuart_diehard_timer_widget:
      slide: col_stuart_background
      action: play
    col_stuart_progress_shot_widget:
      slide: col_stuart_background
      action: play

  slide_mystery_removed:
    col_stuart_diehard_timer_widget:
      slide: col_stuart_background
      action: play
    col_stuart_progress_shot_widget:
      slide: col_stuart_background
      action: play

  mode_col_stuart_diehard_stopping:
    col_stuart_diehard_timer_widget:
      action: remove
    col_stuart_progress_shot_widget:
      action: remove

  col_stuart_diehard_completed:
    col_stuart_diehard_timer_widget:
      action: remove
    col_stuart_progress_shot_widget:
      action: remove

  col_stuart_diehard_failed:
    col_stuart_diehard_timer_widget:
      action: remove
    col_stuart_progress_shot_widget:
      action: remove

# ------------------------------------------------------------
# SOUND PLAYER
# ------------------------------------------------------------
# Plays Col/Stuart music and stops it when the mode ends.
# ------------------------------------------------------------
sound_player:
  col_stuart_music_start:
    colonel_stuart:
      key: main_music
      action: play
      loops: -1
      volume: 0.8

  col_stuart_diehard_completed:
    colonel_stuart:
      key: main_music
      action: stop

  col_stuart_diehard_failed:
    colonel_stuart:
      key: main_music
      action: stop

  ball_ended:
    colonel_stuart:
      key: main_music
      action: stop