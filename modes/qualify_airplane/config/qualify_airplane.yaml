#config_version=6

mode:
  start_events: ball_started
  stop_events: ball_ended
  priority: 150

event_player: 
  counter_airplane_light_lock_hit{hits==5}:
   - lock_lit
   - airplane_lock_ready
  counter_airplane_light_lock_hit{hits==10}:
   - lock_lit
  counter_airplane_light_lock_hit{hits==15}:
   - lock_lit

sequences:
  airplane_ball_1_locked:
    events:
      - counter_airplane_light_lock_hit{hits==5}
      - s_UrampUp001_active
    events_when_complete: airplane_ball_1_locked



counters:
  airplane_light_lock:
    count_events: s_captiveball_active
    count_complete_value: 15
    persist_state: true


shots:
  airplane_lock_1:
    switch: s_captiveball
    profile: profile_airplane_light_off
    show_tokens: 
      lights: l62
    control_events: 
      - events: lock_lit
        state: 1
      - events: 
        state: 0

  airplane_lock:
    switch: s_captiveball
    profile: profile_airplane_lock_lit
    show_tokens: 
      lights: l61
    control_events: 
      - events: lock_lit
        state: 1
      - events: 
        state: 0

  airplane_lock_complete:
    switch: s_UrampUp001

