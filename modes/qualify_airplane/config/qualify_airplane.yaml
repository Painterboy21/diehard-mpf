#config_version=6

mode:
  start_events:
    - ball_started{current_player.airplane_mb_played==0}
    - multiball_nakatomi_ended
    - multiball_central_park_ended
    - mode_ambush_stopped
    - hans_diehard_won_complete
    - hans_diehard_failed_complete
    - hans_dieharder_won_complete
    - hans_dieharder_failed_complete
    - katya_completed
    - katya_failed
  stop_events:
    - ball_ended
    - multiball_nakatomi_started
    - multiball_central_park_started
    - mode_ambush_started
    - start_hans_diehard
    - start_hans_dieharder
    - start_katya_diehard
    - start_katya_dieharder
  priority: 150


ball_saves:
  airplane_save:
    active_time: 8s           
    hurry_up_time: 4s                
    enable_events: airplane_ball_3_locked_complete
    disable_events: start_airplane_multiball
    auto_launch: true
    balls_to_save: -1

ball_holds:
  airplane_lock_hold: 
    enable_events: counter_airplane_light_lock_hit{hits==5}
    disable_events: start_airplane_multiball
    hold_devices: UrampUp001
    balls_to_hold: 1
    release_all_events:
      - slide_airplane_ball_1_removed
      - slide_airplane_ball_2_removed
      - slide_airplane_mb_removed 
      - start_airplane_multiball
      - tilt
      - ball_ended  

shows:
  flash_captive_yellow:
    - duration: 100ms
      lights:
        l62: ffff00
    - duration: 100ms
      lights:
        l62: off
  flash_rightvuk_release:
    - duration: 100ms
      lights:
        f142: 00ff00
    - duration: 100ms
      lights:
        f142: off

show_player:
  s_captiveball_active:
    flash_captive_yellow:
      loops: 6
      speed: 1
  airplane_lock_release_warning:
    flash_rightvuk_release:
      loops: 8
      speed: 1
  s_UrampUp001_active{current_player.airplane_lock_lit==1}: 
    plane_ball_locked: 
      key: key_plane_ball_locked1
      loops: 0

event_player:
  mode_qualify_airplane_started:
    - airplane_reset_locks
    - airplane_enable_lock_counter
  counter_airplane_light_lock_hit{hits==5}:
    - lock_lit
    - airplane_disable_lock_counter
  s_UrampUp001_active{current_player.airplane_lock_lit==1 and current_player.airplane_virtual_locks==0}:
    - airplane_ball_1_locked_complete
  s_UrampUp001_active{current_player.airplane_lock_lit==1 and current_player.airplane_virtual_locks==1}:
    - airplane_ball_2_locked_complete
  s_UrampUp001_active{current_player.airplane_lock_lit==1 and current_player.airplane_virtual_locks==2}:
    - airplane_ball_3_locked_complete
  slide_airplane_ball_1_removed:
    - airplane_lock_release_warning
    - airplane_lock_slide_done|500ms
    - airplane_reset_locks|600ms
    - airplane_enable_lock_counter|600ms
  slide_airplane_ball_2_removed:
    - airplane_lock_release_warning
    - airplane_lock_slide_done|500ms
    - airplane_reset_locks|600ms
    - airplane_enable_lock_counter|600ms
  airplane_ball_3_locked_complete:
    - airplane_ball_3_locked
    - airplane_disable_lock_counter
  slide_airplane_mb_removed:
    - airplane_lock_release_warning
    - airplane_lock_slide_done|500ms
    - start_airplane_multiball|600ms


counters:
  airplane_light_lock:
    count_events: s_captiveball_active
    count_complete_value: 5
    enable_events: airplane_enable_lock_counter
    disable_events:
      - airplane_disable_lock_counter
      - airplane_multiball_start
    reset_events: airplane_reset_locks
    persist_state: false


shots:
  airplane_save:
    profile: shoot_again
    show_tokens: 
      color: ff0000
    enable_events: airplane_ball_3_locked_complete
    disable_events: start_airplane_multiball
    control_events: 
      - events: qualify_airplane_on_complete
        state: 1

  airplane_lock_1:
    switch: s_captiveball
    profile: profile_airplane_light_off
    show_tokens:
      lights: l62
    control_events:
      - events: lock_lit
        state: 0
      - events: airplane_reset_locks
        state: 1
      - events: airplane_ball_3_locked_complete
        state: 2

  airplane_lock:
    switch: s_captiveball
    profile: profile_airplane_lock_lit
    show_tokens:
      lights: l61
    control_events:
      - events: lock_lit
        state: 0
      - events: airplane_reset_locks
        state: 1
      - events: airplane_ball_3_locked_complete
        state: 2

  airplane_lock_complete:
    switch: s_UrampUp001

slide_player:
  airplane_ball_1_locked_complete:
    airplane_ball_1:
      action: play
      expire: 0s
  airplane_ball_2_locked_complete:
    airplane_ball_2:
      action: play
      expire: 0s
  airplane_ball_3_locked_complete:
    airplane_mb:
      action: play
      expire: 0s
  counter_airplane_light_lock_hit{hits==5}:
    airplane_lock_lit:
      action: play
      expire: 0s

variable_player:
  mode_started:
    airplane_lock_lit:
      int: 0
      action: set
    airplane_virtual_locks:
      int: 0
      action: set
  counter_airplane_light_lock_hit{hits==5}:
    airplane_lock_lit:
      int: 1
      action: set
  airplane_ball_1_locked_complete:
    airplane_virtual_locks:
      int: 1
      action: add
    airplane_lock_lit:
      int: 0
      action: set
    eob_bonus_multiball:
      action: add
      int: 100000
  airplane_ball_2_locked_complete:
    airplane_virtual_locks:
      int: 1
      action: add
    airplane_lock_lit:
      int: 0
      action: set
    eob_bonus_multiball:
      action: add
      int: 100000
  airplane_ball_3_locked_complete:
    airplane_virtual_locks:
      int: 1
      action: add
    airplane_lock_lit:
      int: 0
      action: set
    eob_bonus_multiball:
      action: add
      int: 100000
  counter_airplane_light_lock_hit:
    score:
      int: 50000
      action: add
