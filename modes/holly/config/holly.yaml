#config_version=6

# ------------------------------------------------------------
# MODE
# Starts Holly targets during normal play and restarts them
# after villain modes finish.
#
# Stops when ball ends or when any villain mode starts.
# Also blocked while Yippee Ki Yay or final Wizard is running.
# ------------------------------------------------------------
mode:
  start_events:
    - ball_started{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}

    # Hans finished
    - hans_diehard_won_complete{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - hans_diehard_failed_complete{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - hans_dieharder_won_complete{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - hans_dieharder_failed_complete{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}

    # Karl finished
    - karl_diehard_completed{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - karl_diehard_failed{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - karl_dieharder_completed{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - karl_dieharder_failed{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}

    # Katya finished
    - katya_completed{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - katya_failed{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - katya_dieharder_completed{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - katya_dieharder_failed{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}

    # Simon finished
    - simon_completed{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - simon_failed{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - simon_dieharder_completed{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - simon_dieharder_failed{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}

    # Col / Stuart finished
    - col_stuart_diehard_completed{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - col_stuart_diehard_failed{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - col_stuart_dieharder_completed{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}
    - col_stuart_dieharder_failed{current_player.yippee_ki_yay_running != 1 and current_player.wizard_mode_running != 1}

  stop_events:
    - ball_ended

    # Hans started
    - start_hans_diehard
    - start_hans_dieharder

    # Karl started
    - start_karl_diehard
    - start_karl_dieharder

    # Katya started
    - start_katya_diehard
    - start_katya_dieharder

    # Simon started
    - start_simon_diehard
    - start_simon_dieharder

    # Col / Stuart started
    - start_col_stuart_diehard
    - start_col_stuart_dieharder

    # Yippee / Wizard started
    - start_yippee_ki_yay_wizard
    - start_yippee_ki_yay_final_wizard
    - mode_yippee_ki_yay_wizard_started
    - mode_wizard_mode_started

  priority: 120

# ------------------------------------------------------------
# BALL SAVES
# Holly completion starts the Holly ball save.
# ------------------------------------------------------------
ball_saves:
  holly:
    active_time: 12000ms
    grace_period: 3000ms
    hurry_up_time: 5000ms
    enable_events: holly_targets_on_complete
    auto_launch: true
    balls_to_save: -1

# ------------------------------------------------------------
# SHOT GROUPS
# HOLLY target bank.
# Completes when all H-O-L-L-Y targets are hit.
# Restarts after ball save grace or when the mode stops while
# all targets are complete.
# ------------------------------------------------------------
shot_groups:
  holly_targets:
    shots: holly_h, holly_o, holly_l, holly_l1, holly_y
    restart_events:
      - ball_save_holly_grace_period
      - mode_holly_stopping{device.shot_groups.holly_targets.common_state == 1}

# ------------------------------------------------------------
# SHOTS
# Individual HOLLY target shots.
# Each target uses the profile_holly profile and lights its
# matching insert orange.
# ------------------------------------------------------------
shots:
  holly_h:
    switch: s_holly_h
    profile: profile_holly
    start_enabled: true
    show_tokens:
      lights: l30
      color: de780b

  holly_o:
    switch: s_holly_o
    profile: profile_holly
    start_enabled: true
    show_tokens:
      lights: l31
      color: de780b

  holly_l:
    switch: s_holly_l
    profile: profile_holly
    start_enabled: true
    show_tokens:
      lights: l32
      color: de780b

  holly_l1:
    switch: s_holly_l1
    profile: profile_holly
    start_enabled: true
    show_tokens:
      lights: l33
      color: de780b

  holly_y:
    switch: s_holly_y
    profile: profile_holly
    start_enabled: true
    show_tokens:
      lights: l34
      color: de780b

# ------------------------------------------------------------
# SHOW PLAYER
# Flashes individual target inserts when hit.
# Lights the whole HOLLY group blue when complete.
# ------------------------------------------------------------
show_player:
  holly_h_hit:
    flicker_color:
      key: key_holly_h_hit
      priority: 1
      loops: 2
      speed: 2
      show_tokens:
        lights: l30
        color: de780b

  holly_o_hit:
    flicker_color:
      key: key_holly_o_hit
      priority: 1
      loops: 2
      speed: 2
      show_tokens:
        lights: l31
        color: de780b

  holly_l_hit:
    flicker_color:
      key: key_holly_l_hit
      priority: 1
      loops: 2
      speed: 2
      show_tokens:
        lights: l32
        color: de780b

  holly_l1_hit:
    flicker_color:
      key: key_holly_l1_hit
      priority: 1
      loops: 2
      speed: 2
      show_tokens:
        lights: l33
        color: de780b

  holly_y_hit:
    flicker_color:
      key: key_holly_y_hit
      priority: 1
      loops: 2
      speed: 2
      show_tokens:
        lights: l34
        color: de780b

  holly_targets_on_complete:
    led_color:
      key: key_holly_targets_on_complete
      priority: 1
      show_tokens:
        lights: HOLLY
        color: 0000ff

  holly_targets_off_complete:
    off:
      key: key_holly_targets_off_complete
      priority: 1
      show_tokens:
        lights: HOLLY

# ------------------------------------------------------------
# SLIDE PLAYER
# Shows the Holly complete slide when the target bank completes.
# ------------------------------------------------------------
slide_player:
  holly_targets_on_complete:
    holly_complete:
      action: play
      expire: 0s

# ------------------------------------------------------------
# SOUND PLAYER
# Plays Holly target hit sound.
# ------------------------------------------------------------
sound_player:
  holly_targets_hit:
    hollytarget1:
      key: key_holly_targets_hit
      action: play

# ------------------------------------------------------------
# VARIABLE PLAYER
# Awards points and EOB bonus for Holly target hits and
# completed HOLLY bank.
#
# Scores respect playfield_multiplier.
# ------------------------------------------------------------
variable_player:
  holly_targets_hit:
    score:
      action: add
      int: "(5000 * current_player.playfield_multiplier)"

    eob_bonus_holly:
      action: add
      int: 4000

  holly_targets_on_complete:
    score:
      action: add
      int: "(50000 * current_player.playfield_multiplier)"

    eob_bonus_holly:
      action: add
      int: 200000