#config_version=6

mode:
  start_events: start_airplane_multiball{current_player.airplane_mb_played==0}
  stop_events:
    - ball_ended
    - multiball_airplane_ended
  priority: 150

light_player:
  mode_airplane_multiball_started:
    GI:
      color: ffb700
    SPOTS:
      color: 505050
    SPOTS_BUMPER:
      color: 969650

  airplane_disable_super_jackpot:
    l52: off

shows:
  airplane_super_red_flash:
    - duration: 100ms
      lights:
        l52: ff0000
    - duration: 100ms
      lights:
        l52: off

  airplane_captive_insane:
    - duration: 30ms
      coils:
        c_captivetarget:
          pulse_ms: 50

    - duration: 30ms

    - duration: 30ms
      coils:
        c_captivetarget:
          pulse_ms: 50

    - duration: 30ms

    - duration: 30ms
      coils:
        c_captivetarget:
          pulse_ms: 50

    - duration: 70ms

show_player:
  airplane_super_jackpot_hit:
    airplane_captive_insane:
      loops: 35
 
  airplane_left_orbit_jackpot_hit: 
    plane_jackpot: 
      key: plane_mb_jackpot
      loops: 0
      speed: 1

  airplane_right_orbit_jackpot_hit: 
    plane_jackpot: 
      key: plane_mb_jackpot
      loops: 0
      speed: 1
  
  airplane_mid_orbit_jackpot_hit: 
    plane_jackpot: 
      key: plane_mb_jackpot
      loops: 0
      speed: 1

  airplane_air_duct_jackpot_hit: 
    plane_jackpot: 
      key: plane_mb_jackpot
      loops: 0
      speed: 1

  airplane_upper_pf_jackpot_hit: 
    plane_jackpot: 
      key: plane_mb_jackpot
      loops: 0
      speed: 1

  airplane_light_super_jackpot:
    airplane_super_red_flash:
      loops: -1
      speed: 1

  airplane_disable_super_jackpot:
    airplane_super_red_flash:
      action: stop

event_player:
  mode_airplane_multiball_started:
    - airplane_start_multiball

  multiball_airplane_started:
    - airplane_enable_captive_for_jackpot

  airplane_left_orbit_jackpot_hit{current_player.airplane_mb_stage==1 and device.counters.airplane_stage_1_jackpot_counter.value<5}: airplane_enable_captive_for_jackpot
  airplane_right_orbit_jackpot_hit{current_player.airplane_mb_stage==1 and device.counters.airplane_stage_1_jackpot_counter.value<5}: airplane_enable_captive_for_jackpot
  airplane_mid_orbit_jackpot_hit{current_player.airplane_mb_stage==1 and device.counters.airplane_stage_1_jackpot_counter.value<5}: airplane_enable_captive_for_jackpot
  airplane_air_duct_jackpot_hit{current_player.airplane_mb_stage==1 and device.counters.airplane_stage_1_jackpot_counter.value<5}: airplane_enable_captive_for_jackpot
  airplane_upper_pf_jackpot_hit{current_player.airplane_mb_stage==1 and device.counters.airplane_stage_1_jackpot_counter.value<5}: airplane_enable_captive_for_jackpot

  airplane_left_orbit_jackpot_hit{current_player.airplane_mb_stage>=2 and device.counters.airplane_stage_2_jackpot_counter.value<8}: airplane_enable_captive_for_jackpot
  airplane_right_orbit_jackpot_hit{current_player.airplane_mb_stage>=2 and device.counters.airplane_stage_2_jackpot_counter.value<8}: airplane_enable_captive_for_jackpot
  airplane_mid_orbit_jackpot_hit{current_player.airplane_mb_stage>=2 and device.counters.airplane_stage_2_jackpot_counter.value<8}: airplane_enable_captive_for_jackpot
  airplane_air_duct_jackpot_hit{current_player.airplane_mb_stage>=2 and device.counters.airplane_stage_2_jackpot_counter.value<8}: airplane_enable_captive_for_jackpot
  airplane_upper_pf_jackpot_hit{current_player.airplane_mb_stage>=2 and device.counters.airplane_stage_2_jackpot_counter.value<8}: airplane_enable_captive_for_jackpot

  airplane_super_jackpot_ready:
    - airplane_disable_jackpots
    - airplane_light_super_jackpot

  airplane_super_jackpot_hit{current_player.airplane_mb_stage==1}:
    - airplane_super_jackpot_score_stage_1
    - airplane_disable_super_jackpot
    - reset_airplane_stage_1_jackpot_counter
    - reset_airplane_stage_2_jackpot_counter
    - airplane_enable_captive_for_jackpot|100ms

  airplane_super_jackpot_hit{current_player.airplane_mb_stage>=2}:
    - airplane_super_jackpot_score_stage_2
    - airplane_disable_super_jackpot
    - reset_airplane_stage_2_jackpot_counter
    - airplane_enable_captive_for_jackpot|100ms

random_event_player:
  airplane_captive_jackpot_select_hit:
    force_different: true
    scope: player
    events:
      - airplane_light_left_orbit_jackpot
      - airplane_light_right_orbit_jackpot
      - airplane_light_mid_orbit_jackpot
      - airplane_light_air_duct_jackpot
      - airplane_light_upper_pf_jackpot

shots:
  airplane_captive_jackpot_select:
    switch: s_captiveball
    profile: profile_airplane_light_1
    enable_events:
      - airplane_enable_captive_for_jackpot
    disable_events:
      - airplane_captive_jackpot_select_hit
      - airplane_super_jackpot_ready
    show_tokens:
      lights: l52

  airplane_left_orbit_jackpot:
    hit_events: left_orbit_hit
    profile: airplane_jackpot_profile
    enable_events:
      - airplane_light_left_orbit_jackpot
    disable_events:
      - airplane_left_orbit_jackpot_hit
      - airplane_disable_jackpots
    show_tokens:
      lights: l20

  airplane_right_orbit_jackpot:
    hit_events: right_orbit_hit
    profile: airplane_jackpot_profile
    enable_events:
      - airplane_light_right_orbit_jackpot
    disable_events:
      - airplane_right_orbit_jackpot_hit
      - airplane_disable_jackpots
    show_tokens:
      lights: l22

  airplane_mid_orbit_jackpot:
    switch: s_mid_orbit
    profile: airplane_jackpot_profile
    enable_events:
      - airplane_light_mid_orbit_jackpot
    disable_events:
      - airplane_mid_orbit_jackpot_hit
      - airplane_disable_jackpots
    show_tokens:
      lights: l23

  airplane_air_duct_jackpot:
    switch: s_air_duct
    profile: airplane_jackpot_profile
    enable_events:
      - airplane_light_air_duct_jackpot
    disable_events:
      - airplane_air_duct_jackpot_hit
      - airplane_disable_jackpots
    show_tokens:
      lights: l24

  airplane_upper_pf_jackpot:
    switch: s_upper_pf_entrance
    profile: airplane_jackpot_profile
    enable_events:
      - airplane_light_upper_pf_jackpot
    disable_events:
      - airplane_upper_pf_jackpot_hit
      - airplane_disable_jackpots
    show_tokens:
      lights: l21

  airplane_super_jackpot:
    switch: s_captiveball
    profile: airplane_super_jackpot_profile
    enable_events:
      - airplane_light_super_jackpot
    disable_events:
      - airplane_super_jackpot_hit
      - airplane_disable_super_jackpot
    show_tokens:
      lights: l52

counters:
  airplane_stage_1_jackpot_counter:
    count_events:
      - airplane_left_orbit_jackpot_hit{current_player.airplane_mb_stage==1}
      - airplane_right_orbit_jackpot_hit{current_player.airplane_mb_stage==1}
      - airplane_mid_orbit_jackpot_hit{current_player.airplane_mb_stage==1}
      - airplane_air_duct_jackpot_hit{current_player.airplane_mb_stage==1}
      - airplane_upper_pf_jackpot_hit{current_player.airplane_mb_stage==1}
    starting_count: 0
    count_complete_value: 5
    events_when_complete: airplane_super_jackpot_ready
    reset_events:
      - multiball_airplane_started
      - reset_airplane_stage_1_jackpot_counter

  airplane_stage_2_jackpot_counter:
    count_events:
      - airplane_left_orbit_jackpot_hit{current_player.airplane_mb_stage>=2}
      - airplane_right_orbit_jackpot_hit{current_player.airplane_mb_stage>=2}
      - airplane_mid_orbit_jackpot_hit{current_player.airplane_mb_stage>=2}
      - airplane_air_duct_jackpot_hit{current_player.airplane_mb_stage>=2}
      - airplane_upper_pf_jackpot_hit{current_player.airplane_mb_stage>=2}
    starting_count: 0
    count_complete_value: 8
    events_when_complete: airplane_super_jackpot_ready
    reset_events:
      - multiball_airplane_started
      - reset_airplane_stage_2_jackpot_counter

multiballs:
  airplane:
    start_events: airplane_start_multiball
    ball_count: 3
    ball_count_type: total
    shoot_again: 30s
    add_a_ball_events:
      - add_a_ball_in_multiball
    add_a_ball_shoot_again: 10s

    
widget_player:
  airplane_start_multiball:
    airplane_captive_ball:
      action: play

  airplane_captive_jackpot_select_hit:
    airplane_captive_ball:
      action: remove

  airplane_super_jackpot_ready:
    airplane_super_jackpot_lit:
      action: play

  airplane_super_jackpot_hit:
    airplane_super_jackpot_lit:
      action: remove
    airplane_super_jackpot:
      action: play
      expire: 3s





slide_player:
  airplane_left_orbit_jackpot_hit:
    jackpot:
      action: play
      expire: 0s

  airplane_right_orbit_jackpot_hit:
    jackpot:
      action: play
      expire: 0s

  airplane_mid_orbit_jackpot_hit:
    jackpot:
      action: play
      expire: 0s

  airplane_air_duct_jackpot_hit:
    jackpot:
      action: play
      expire: 0s

  airplane_upper_pf_jackpot_hit:
    jackpot:
      action: play
      expire: 0s

  airplane_super_jackpot_hit:
    airplane_super_jackpot:
      action: play
      expire: 0s

variable_player:
  airplane_start_multiball:
    airplane_mb_played:
      int: 1
      action: set
    airplane_mb_stage:
      int: 1
      action: set

  airplane_captive_jackpot_select_hit:
    score:
      action: add
      int: 500000

  airplane_light_super_jackpot:
    airplane_super_jackpot_available:
      int: 1
      action: set

  airplane_disable_super_jackpot:
    airplane_super_jackpot_available:
      int: 0
      action: set

  airplane_super_jackpot_score_stage_1:
    score:
      action: add
      int: 10000000
    last_jackpot_value:
      action: set
      int: 10000000
    airplane_mb_stage:
      int: 2
      action: set

  airplane_super_jackpot_score_stage_2:
    score:
      action: add
      int: 20000000
    last_jackpot_value:
      action: set
      int: 20000000

  airplane_left_orbit_jackpot_hit{current_player.airplane_mb_stage==1}:
    score:
      action: add
      int: 2000000
    last_jackpot_value:
      action: set
      int: 2000000

  airplane_right_orbit_jackpot_hit{current_player.airplane_mb_stage==1}:
    score:
      action: add
      int: 2000000
    last_jackpot_value:
      action: set
      int: 2000000

  airplane_mid_orbit_jackpot_hit{current_player.airplane_mb_stage==1}:
    score:
      action: add
      int: 2000000
    last_jackpot_value:
      action: set
      int: 2000000

  airplane_air_duct_jackpot_hit{current_player.airplane_mb_stage==1}:
    score:
      action: add
      int: 2000000
    last_jackpot_value:
      action: set
      int: 2000000

  airplane_upper_pf_jackpot_hit{current_player.airplane_mb_stage==1}:
    score:
      action: add
      int: 2000000
    last_jackpot_value:
      action: set
      int: 2000000

  airplane_left_orbit_jackpot_hit{current_player.airplane_mb_stage>=2}:
    score:
      action: add
      int: 4000000
    last_jackpot_value:
      action: set
      int: 4000000

  airplane_right_orbit_jackpot_hit{current_player.airplane_mb_stage>=2}:
    score:
      action: add
      int: 4000000
    last_jackpot_value:
      action: set
      int: 4000000

  airplane_mid_orbit_jackpot_hit{current_player.airplane_mb_stage>=2}:
    score:
      action: add
      int: 4000000
    last_jackpot_value:
      action: set
      int: 4000000

  airplane_air_duct_jackpot_hit{current_player.airplane_mb_stage>=2}:
    score:
      action: add
      int: 4000000
    last_jackpot_value:
      action: set
      int: 4000000

  airplane_upper_pf_jackpot_hit{current_player.airplane_mb_stage>=2}:
    score:
      action: add
      int: 4000000
    last_jackpot_value:
      action: set
      int: 4000000