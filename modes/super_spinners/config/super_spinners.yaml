#config_version=6

mode:
  start_events:
    - ball_started
  stop_events:
    - ball_ended
  priority: 160


timers:
  super_spinners_timer:
    start_value: 120
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false

    control_events:
      - event: super_spinners_start
        action: restart

      - event: super_spinners_stop
        action: stop

      - event: ball_ended
        action: stop


event_player:
  timer_super_spinners_timer_complete:
    - super_spinners_stop


variable_player:

  # ------------------------------------------------------------
  # Start / stop Super Spinners
  # ------------------------------------------------------------

  super_spinners_start:
    super_spinners:
      action: set
      int: 1

  super_spinners_stop:
    super_spinners:
      action: set
      int: 0

  ball_ended:
    super_spinners:
      action: set
      int: 0


  # ------------------------------------------------------------
  # VPW score adjusted to timed version:
  # Normal spinner already scores 1010 elsewhere.
  # Super Spinners should total 5010.
  #
  # This adds the extra 4000 while active:
  # 1010 + 4000 = 5010.
  # ------------------------------------------------------------

  SpinnerLeft_active{current_player.super_spinners == 1}:
    score:
      action: add
      int: 4000

  SpinnerRight_active{current_player.super_spinners == 1}:
    score:
      action: add
      int: 4000