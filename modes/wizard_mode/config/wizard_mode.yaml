#config_version=6
# ------------------------------------------------------------
# WIZARD MODE
# ------------------------------------------------------------
# Final Yippee Ki Yay wizard mode, copied from the VPW flow:
#   - starts after phase 3 posts start_yippee_ki_yay_final_wizard
#   - runs a 60 second final jackpot multiball
#   - 5-ball total multiball
#   - 60 second ball save
#   - base jackpot is 5,000,000
#   - adds 1,000,000 for each completed/earned major bonus
#   - every major shot awards the same wizard jackpot value
#   - playfield multiplier applies to the jackpot score
#   - arrows above bullet shots flash red
#   - bullet inserts stay dim white and flash red on jackpot hit
#   - ball save flashes red
# ------------------------------------------------------------
mode:
  start_events:
    - start_yippee_ki_yay_final_wizard
  stop_events:
    - wizard_mode_complete
    - ball_ended
    - tilt
  priority: 700
# ------------------------------------------------------------
# MULTIBALL / BALL SAVE
# ------------------------------------------------------------
multiballs:
  wizard_mode:
    ball_count: 5
    ball_count_type: total
    start_events:
      - wizard_mode_start_multiball
    stop_events:
      - wizard_mode_complete
      - mode_wizard_mode_stopping
      - ball_ending
      - tilt
ball_saves:
  wizard_mode_ball_save:
    active_time: 60s
    hurry_up_time: 10s
    grace_period: 2s
    auto_launch: true
    balls_to_save: -1
    enable_events:
      - wizard_mode_start_multiball
    disable_events:
      - wizard_mode_complete
      - mode_wizard_mode_stopping
      - ball_ending
      - tilt
# ------------------------------------------------------------
# TIMER
# ------------------------------------------------------------
timers:
  wizard_mode_timer:
    start_value: 60
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: wizard_mode_start_multiball
        action: restart
      - event: wizard_mode_complete
        action: stop
      - event: mode_wizard_mode_stopping
        action: stop
      - event: ball_ending
        action: stop
      - event: tilt
        action: stop
# ------------------------------------------------------------
# EVENT PLAYER
# ------------------------------------------------------------
event_player:
  mode_wizard_mode_started:
    - nakatomi_entrance_lock_close
    - wizard_mode_set_base_value
    - wizard_mode_add_bonus_value|50ms
    - wizard_mode_start_multiball|100ms
  wizard_mode_start_multiball:
    - nakatomi_entrance_lock_close
  timer_wizard_mode_timer_complete:
    - wizard_mode_complete
  balldevice_bd_plunger_ball_enter{current_player.wizard_mode_running == 1}:
    - wizard_mode_auto_plunge|75ms
    - wizard_mode_auto_plunge|300ms
  left_orbit_hit{current_player.wizard_mode_running == 1}:
    - wizard_mode_jackpot_hit
  right_orbit_hit{current_player.wizard_mode_running == 1}:
    - wizard_mode_jackpot_hit
  s_mid_orbit_active{current_player.wizard_mode_running == 1}:
    - wizard_mode_jackpot_hit
  s_captiveball_active{current_player.wizard_mode_running == 1}:
    - wizard_mode_jackpot_hit
  s_air_duct_active{current_player.wizard_mode_running == 1}:
    - wizard_mode_jackpot_hit
  s_UrampUp001_active{current_player.wizard_mode_running == 1}:
    - wizard_mode_jackpot_hit
  balldevice_tower_vuk_ball_enter{current_player.wizard_mode_running == 1}:
    - wizard_mode_jackpot_hit
  wizard_mode_complete:
    - nakatomi_entrance_lock_close
# ------------------------------------------------------------
# VARIABLE PLAYER
# ------------------------------------------------------------
variable_player:
  wizard_mode_set_base_value:
    wizard_mode_running:
      action: set
      int: 1
    wizard_mode_value:
      action: set
      int: 5000000
    wizard_mode_shots:
      action: set
      int: 0
    wizard_mode_won:
      action: set
      int: 1
  wizard_mode_add_bonus_value{current_player.hans_bonus == 1}:
    wizard_mode_value:
      action: add
      int: 1000000
  wizard_mode_add_bonus_value{current_player.simon_complete == 1}:
    wizard_mode_value:
      action: add
      int: 1000000
  wizard_mode_add_bonus_value{current_player.karl_bonus == 1}:
    wizard_mode_value:
      action: add
      int: 1000000
  wizard_mode_add_bonus_value{current_player.stuart_bonus == 1}:
    wizard_mode_value:
      action: add
      int: 1000000
  wizard_mode_add_bonus_value{current_player.katya_bonus == 1}:
    wizard_mode_value:
      action: add
      int: 1000000
  wizard_mode_add_bonus_value{current_player.nakatomi_super_collected == 1}:
    wizard_mode_value:
      action: add
      int: 1000000
  wizard_mode_add_bonus_value{current_player.airplane_mb_stage2 == 1}:
    wizard_mode_value:
      action: add
      int: 1000000
  wizard_mode_add_bonus_value{current_player.score_park_super_jackpot_hit > 0}:
    wizard_mode_value:
      action: add
      int: 1000000
  wizard_mode_jackpot_hit:
    wizard_mode_shots:
      action: add
      int: 1
    score:
      action: add
      int: "current_player.wizard_mode_value * current_player.playfield_multiplier"
    last_jackpot_value:
      action: set
      int: "current_player.wizard_mode_value * current_player.playfield_multiplier"
  wizard_mode_complete:
    wizard_mode_running:
      action: set
      int: 0
  mode_wizard_mode_stopping:
    wizard_mode_running:
      action: set
      int: 0
