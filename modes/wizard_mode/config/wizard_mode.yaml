# ------------------------------------------------------------
# SLIDE PLAYER
# ------------------------------------------------------------
slide_player:
  wizard_mode_show_jackpot_slide:
    jackpot:
      action: play
      priority: 19000
      expire: 1.5s

  wizard_mode_show_won_slide:
    you_won:
      action: play
      priority: 50000
      expire: 14s

  wizard_mode_complete:
    jackpot:
      action: remove
    you_won:
      action: remove

  mode_wizard_mode_stopping:
    jackpot:
      action: remove

# ------------------------------------------------------------
# SHOWS
# ------------------------------------------------------------
shows:
  wizard_mode_ball_save_yippee_slow_flash:
    - duration: 900ms
      lights:
        (lights): (color)
    - duration: 900ms
      lights:
        (lights): off

# ------------------------------------------------------------
# SHOW PLAYER
# ------------------------------------------------------------
show_player:
  wizard_mode_start_multiball:
    flash_color:
      key: key_wizard_mode_arrow_red_flash
      loops: -1
      speed: 4
      priority: 12000
      show_tokens:
        lights: l20,l21,l22,l23,l24
        color: ff0000
    wizard_mode_ball_save_yippee_slow_flash:
      key: key_wizard_mode_ball_save_yippee_slow_flash
      loops: -1
      speed: 1
      priority: 12000
      show_tokens:
        lights: BALL_SAVE,l8
        color: 999999

  wizard_mode_jackpot_hit:
    flash_color:
      key: key_wizard_mode_all_flashers_white
      loops: 3
      speed: 10
      priority: 14000
      show_tokens:
        lights: f140,f141,f142,f143,f144,f145,f146,f147
        color: ffffff

  wizard_mode_left_orbit_bullet_flash:
    flicker_color:
      key: key_wizard_mode_left_orbit_bullet_flash
      loops: 2
      speed: 8
      priority: 13000
      show_tokens:
        lights: l50
        color: ff0000

  wizard_mode_upper_pf_bullet_flash:
    flicker_color:
      key: key_wizard_mode_upper_pf_bullet_flash
      loops: 2
      speed: 8
      priority: 13000
      show_tokens:
        lights: l51
        color: ff0000

  wizard_mode_right_orbit_bullet_flash:
    flicker_color:
      key: key_wizard_mode_right_orbit_bullet_flash
      loops: 2
      speed: 8
      priority: 13000
      show_tokens:
        lights: l53
        color: ff0000

  wizard_mode_mid_orbit_bullet_flash:
    flicker_color:
      key: key_wizard_mode_mid_orbit_bullet_flash
      loops: 2
      speed: 8
      priority: 13000
      show_tokens:
        lights: l54
        color: ff0000

  wizard_mode_air_duct_bullet_flash:
    flicker_color:
      key: key_wizard_mode_air_duct_bullet_flash
      loops: 2
      speed: 8
      priority: 13000
      show_tokens:
        lights: l55
        color: ff0000

  wizard_mode_stop_shows:
    flash_color:
      key: key_wizard_mode_arrow_red_flash
      action: stop
    wizard_mode_ball_save_yippee_slow_flash:
      key: key_wizard_mode_ball_save_yippee_slow_flash
      action: stop

  wizard_mode_complete:
    flash_color:
      key: key_wizard_mode_arrow_red_flash
      action: stop
    wizard_mode_ball_save_yippee_slow_flash:
