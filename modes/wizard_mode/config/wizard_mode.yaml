# ------------------------------------------------------------
# SHOW PLAYER
# ------------------------------------------------------------
show_player:
  wizard_mode_start_multiball:
    flicker_color:
      key: key_wizard_mode_yippee_flash
      speed: 3
      show_tokens:
        lights: l10
        color: ff0000

  wizard_mode_jackpot_hit:
    flicker_color:
      key: key_wizard_mode_jackpot_flash
      loops: 0
      speed: 8
      show_tokens:
        lights: NONRGB
        color: ffffff

  wizard_mode_complete:
    flicker_color:
      key: key_wizard_mode_yippee_flash
      action: stop

  mode_wizard_mode_stopping:
    flicker_color:
      key: key_wizard_mode_yippee_flash
      action: stop
