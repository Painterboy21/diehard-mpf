# ------------------------------------------------------------
# SHOW PLAYER
# ------------------------------------------------------------
show_player:
  wizard_mode_start_multiball:
    flash_color:
      key: key_wizard_mode_arrow_and_ball_save_flash
      loops: -1
      speed: 4
      priority: 12000
      show_tokens:
        lights: l20,l21,l22,l23,l24,BALL_SAVE
        color: ff0000
    flicker_color:
      key: key_wizard_mode_yippee_flash
      loops: -1
      speed: 3
      priority: 12000
      show_tokens:
        lights: l8
        color: ff0000
  wizard_mode_jackpot_hit:
    flicker_color:
      key: key_wizard_mode_bullets_red_hit_flash
      loops: 1
      speed: 8
      priority: 13000
      show_tokens:
        lights: l50,l51,l53,l54,l55
        color: ff0000
    flash_color:
      key: key_wizard_mode_jackpot_white_flash
      loops: 0
      speed: 8
      priority: 13000
      show_tokens:
        lights: NONRGB
        color: ffffff
  wizard_mode_complete:
    flash_color:
      key: key_wizard_mode_arrow_and_ball_save_flash
      action: stop
    flicker_color:
      key: key_wizard_mode_yippee_flash
      action: stop
  mode_wizard_mode_stopping:
    flash_color:
      key: key_wizard_mode_arrow_and_ball_save_flash
      action: stop
    flicker_color:
