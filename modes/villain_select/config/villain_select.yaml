#config_version=6

mode:
  start_events:
    - start_villain_select
  stop_events:
    - start_col_difficulty_select
    - start_hans_difficulty_select
    - start_karl_difficulty_select
    - start_katya_difficulty_select
    - start_simon_difficulty_select
    - villain_selection_complete
    - ball_ended
  priority: 300
  code: mpf.modes.carousel.code.carousel.Carousel

light_player:
  mode_villain_select_started:
    GI:
      color: 000000
    SPOTS:
      color: 000000

mode_settings:
  selectable_items:
    - villain_instructions
    - Katya_Villain_Select{current_player.katya_complete!=1}
    - Col_Stuart_Villain_Select{current_player.col_stuart_complete!=1}
    - Hans_Gruber_Villain_Select{current_player.hans_complete!=1}
    - Simon_Gruber_Villain_Select{current_player.simon_complete!=1}
    - Karl_Vreski_Villain_Select{current_player.karl_complete!=1}

  next_item_events:
    - s_right_flipper_active

  previous_item_events:
    - s_left_flipper_active

  select_item_events:
    - villain_select_choose

blocking:
  sw_start:
    all: True

slide_player:
  mode_villain_select_started:
    villain_select:
      action: play
      expire: 0s

  mode_villain_select_stopping:
    villain_select:
      action: remove

event_player:
  s_start_active:
    - villain_select_no_pick

  s_actionbtn_active{current_player.villain_select_highlighted=="villain_instructions"}:
    - villain_select_no_pick

  s_actionbtn_active{current_player.villain_select_highlighted!="villain_instructions"}:
    - villain_select_choose

  s_fire_active{current_player.villain_select_highlighted=="villain_instructions"}:
    - villain_select_no_pick

  s_fire_active{current_player.villain_select_highlighted!="villain_instructions"}:
    - villain_select_choose

  carousel_item_selected{carousel=="villain_select" and item=="villain_instructions"}:
    - villain_select_no_pick

  carousel_item_selected{carousel=="villain_select" and item=="Col_Stuart_Villain_Select" and current_player.col_stuart_complete!=1}:
    - set_villain_col
    - start_col_difficulty_select|250ms

  carousel_item_selected{carousel=="villain_select" and item=="Hans_Gruber_Villain_Select" and current_player.hans_complete!=1}:
    - set_villain_hans
    - start_hans_difficulty_select|250ms

  carousel_item_selected{carousel=="villain_select" and item=="Karl_Vreski_Villain_Select" and current_player.karl_complete!=1}:
    - set_villain_karl
    - start_karl_difficulty_select|250ms

  carousel_item_selected{carousel=="villain_select" and item=="Katya_Villain_Select" and current_player.katya_complete!=1}:
    - set_villain_katya
    - start_katya_difficulty_select|250ms

  carousel_item_selected{carousel=="villain_select" and item=="Simon_Gruber_Villain_Select" and current_player.simon_complete!=1}:
    - set_villain_simon
    - start_simon_difficulty_select|250ms

  carousel_item_highlighted{carousel=="villain_select" and item=="Col_Stuart_Villain_Select" and current_player.col_stuart_complete!=1}:
    - flash_col_light

  carousel_item_highlighted{carousel=="villain_select" and item=="Hans_Gruber_Villain_Select" and current_player.hans_complete!=1}:
    - flash_hans_light

  carousel_item_highlighted{carousel=="villain_select" and item=="Karl_Vreski_Villain_Select" and current_player.karl_complete!=1}:
    - flash_karl_light

  carousel_item_highlighted{carousel=="villain_select" and item=="Katya_Villain_Select" and current_player.katya_complete!=1}:
    - flash_katya_light

  carousel_item_highlighted{carousel=="villain_select" and item=="Simon_Gruber_Villain_Select" and current_player.simon_complete!=1}:
    - flash_simon_light

  carousel_item_highlighted{carousel=="villain_select" and item=="villain_instructions"}:
    - stop_villain_flash

variable_player:
  carousel_item_highlighted{carousel=="villain_select"}:
    villain_select_highlighted:
      string: "{item}"
      action: set

  set_villain_col:
    selected_villain:
      string: col
      action: set

  set_villain_hans:
    selected_villain:
      string: hans
      action: set

  set_villain_karl:
    selected_villain:
      string: karl
      action: set

  set_villain_katya:
    selected_villain:
      string: katya
      action: set

  set_villain_simon:
    selected_villain:
      string: simon
      action: set

  mode_villain_select_started:
    villain_select_running:
      int: 1
      action: set

  mode_villain_select_stopping:
    villain_select_running:
      int: 0
      action: set

show_player:
  mode_villain_select_started:
    flash_color:
      key: villain_select_insert_flash
      priority: 40
      loops: -1
      speed: 4
      show_tokens:
        lights: l10
        color: ffff00

    InsertsVillainSpinOrange:
      loops: -1
      speed: 50

  start_col_difficulty_select:
    villain_select_insert_flash:
      action: stop
    villain_flash:
      action: stop
    InsertsVillainSpinOrange:
      action: stop

  start_hans_difficulty_select:
    villain_select_insert_flash:
      action: stop
    villain_flash:
      action: stop
    InsertsVillainSpinOrange:
      action: stop

  start_karl_difficulty_select:
    villain_select_insert_flash:
      action: stop
    villain_flash:
      action: stop
    InsertsVillainSpinOrange:
      action: stop

  start_katya_difficulty_select:
    villain_select_insert_flash:
      action: stop
    villain_flash:
      action: stop
    InsertsVillainSpinOrange:
      action: stop

  start_simon_difficulty_select:
    villain_select_insert_flash:
      action: stop
    villain_flash:
      action: stop
    InsertsVillainSpinOrange:
      action: stop

  stop_villain_flash:
    villain_flash:
      action: stop

  mode_villain_select_stopped:
    villain_select_insert_flash:
      action: stop
    villain_flash:
      action: stop
    InsertsVillainSpinOrange:
      action: stop

  flash_col_light:
    flash_color:
      key: villain_flash
      priority: 50
      loops: -1
      speed: 6
      show_tokens:
        lights: l44, l1000, l1001
        color: 0044ff

  flash_hans_light:
    flash_color:
      key: villain_flash
      priority: 50
      loops: -1
      speed: 6
      show_tokens:
        lights: l43, l1000, l1001
        color: 00ff00

  flash_karl_light:
    flash_color:
      key: villain_flash
      priority: 50
      loops: -1
      speed: 6
      show_tokens:
        lights: l40, l1000, l1001
        color: ff8800

  flash_katya_light:
    flash_color:
      key: villain_flash
      priority: 50
      loops: -1
      speed: 6
      show_tokens:
        lights: l42, l1000, l1001
        color: ff00aa

  flash_simon_light:
    flash_color:
      key: villain_flash
      priority: 50
      loops: -1
      speed: 6
      show_tokens:
        lights: l41, l1000, l1001
        color: ffffff