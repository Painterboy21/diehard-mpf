#config_version=6

mode:
  start_events: start_villain_select
  stop_events:
    - villain_selection_complete
    - ball_ended
  priority: 300
  code: mpf.modes.carousel.code.carousel.Carousel

ball_holds:
  villain_select_hold:
    balls_to_hold: 1
    hold_devices: rightvuk
    enable_events:
      - mode_villain_select_started


slide_player:
  mode_villain_select_started:
    villain_select:
      action: play
      expire: 0s

mode_settings:
  selectable_items:
    - villain_col_die_hard
    - villain_col_die_harder
  next_item_events: s_right_flipper_active
  previous_item_events: s_left_flipper_active
  select_item_events: s_fire_active




  