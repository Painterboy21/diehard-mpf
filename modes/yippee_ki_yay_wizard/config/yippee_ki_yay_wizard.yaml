      action: set
      int: 0
    yippee_ki_yay_phase_2_scoop_armed:
      action: set
      int: 0
    yippee_ki_yay_phase_2_ball_save_running:
      action: set
      int: 0
    score:
      action: add
      int: "5000000 * current_player.playfield_multiplier"
  yippee_ki_yay_phase_2_complete:
