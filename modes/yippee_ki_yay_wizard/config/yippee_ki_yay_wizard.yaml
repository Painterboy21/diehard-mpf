      int: "2500000 * current_player.playfield_multiplier"
  yippee_ki_yay_phase_1_ball_3_locked:
    score:
      action: add
      int: "2500000 * current_player.playfield_multiplier"
  ball_save_yippee_ki_yay_phase_1_ball_save_enabled:
    yippee_ki_yay_phase_1_ball_save_running:
      action: set
      int: 1
  ball_save_yippee_ki_yay_phase_1_ball_save_disabled:
    yippee_ki_yay_phase_1_ball_save_running:
      action: set
      int: 0
    score:
      action: add
      int: "5000000 * current_player.playfield_multiplier"
  arm_yippee_ki_yay_phase_1_vuk:
    yippee_ki_yay_phase_1_vuk_armed:
      action: set
      int: 1
  disarm_yippee_ki_yay_phase_1_vuk:
    yippee_ki_yay_phase_1_vuk_armed:
      action: set
      int: 0
  yippee_ki_yay_phase_1_vuk_counted:
