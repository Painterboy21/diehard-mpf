    score:
      action: add
      int: "2500000 * current_player.playfield_multiplier"
  yippee_ki_yay_phase_2_ball_3_locked:
    score:
      action: add
      int: "2500000 * current_player.playfield_multiplier"
  yippee_ki_yay_phase_2_all_balls_locked:
