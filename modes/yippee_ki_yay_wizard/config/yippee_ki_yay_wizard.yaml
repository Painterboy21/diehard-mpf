      int: 1
    yippee_ki_yay_phase_2_active:
      action: set
      int: 0
    yippee_ki_yay_phase_2_scoop_armed:
      action: set
      int: 0
    yippee_ki_yay_phase_2_ball_save_running:
      action: set
      int: 0
  yippee_ki_yay_phase_2_failed:
    yippee_ki_yay_phase_2_active:
      action: set
      int: 0
    yippee_ki_yay_phase_2_complete:
      action: set
      int: 0
    yippee_ki_yay_phase_2_scoop_armed:
      action: set
      int: 0
    yippee_ki_yay_phase_2_ball_save_running:
      action: set
      int: 0
  yippee_ki_yay_phase_3_start:
