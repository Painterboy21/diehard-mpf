#config_version=6
# ------------------------------------------------------------
# YIPPEE KI YAY WIZARD
# ------------------------------------------------------------
mode:
  start_events:
    - start_yippee_ki_yay_wizard
  stop_events:
    - yippee_ki_yay_phase_1_failed
    - yippee_ki_yay_phase_2_failed
    - yippee_ki_yay_phase_3_failed
    - ball_ended
  priority: 500
# ------------------------------------------------------------
# MULTIBALLS
# ------------------------------------------------------------
multiballs:
  yippee_ki_yay_phase_1:
    ball_count: 3
    ball_count_type: total
    start_events:
      - yippee_ki_yay_phase_1_start_multiball
    stop_events:
      - yippee_ki_yay_phase_1_failed
      - ball_ending
# ------------------------------------------------------------
# BALL SAVES
# ------------------------------------------------------------
ball_saves:
  yippee_ki_yay_phase_1_ball_save:
    active_time: 60s
    hurry_up_time: 10s
    grace_period: 2s
    auto_launch: true
    balls_to_save: -1
    enable_events:
      - yippee_ki_yay_phase_1_start
    disable_events:
      - yippee_ki_yay_phase_1_three_balls_locked
      - yippee_ki_yay_phase_1_complete
      - yippee_ki_yay_phase_1_failed
      - mode_yippee_ki_yay_wizard_stopping
      - ball_ending
      - tilt
  yippee_ki_yay_phase_2_ball_save:
    active_time: 60s
    hurry_up_time: 10s
    grace_period: 2s
    auto_launch: true
    balls_to_save: -1
    enable_events:
      - yippee_ki_yay_phase_2_start
    disable_events:
      - yippee_ki_yay_phase_2_all_balls_locked
      - yippee_ki_yay_phase_2_complete
      - yippee_ki_yay_phase_2_failed
      - mode_yippee_ki_yay_wizard_stopping
      - ball_ending
      - tilt
  yippee_ki_yay_phase_3_ball_save:
    active_time: 60s
    hurry_up_time: 10s
    grace_period: 2s
    auto_launch: true
    balls_to_save: -1
    enable_events:
      - yippee_ki_yay_phase_3_start
    disable_events:
      - yippee_ki_yay_phase_3_all_lanes_complete
      - yippee_ki_yay_phase_3_complete
      - yippee_ki_yay_phase_3_failed
      - mode_yippee_ki_yay_wizard_stopping
      - ball_ending
      - tilt
# ------------------------------------------------------------
# TIMERS
# ------------------------------------------------------------
timers:
  yippee_ki_yay_nakatomi_lock_hold_reset:
    start_value: 0
    end_value: 1
    direction: up
    control_events:
      - event: mode_yippee_ki_yay_wizard_started
        action: restart
      - event: yippee_ki_yay_phase_1_start
        action: restart
      - event: yippee_ki_yay_phase_1_vuk_counted
        action: restart
      - event: yippee_ki_yay_phase_1_release_after_kill
        action: stop
      - event: yippee_ki_yay_phase_1_complete
        action: stop
      - event: yippee_ki_yay_phase_1_failed
        action: stop
      - event: mode_yippee_ki_yay_wizard_stopping
        action: stop
      - event: ball_ending
        action: stop
    restart_on_complete: true
    start_running: false
    tick_interval: 60000ms
# ------------------------------------------------------------
# EVENT PLAYER
# ------------------------------------------------------------
event_player:
  mode_yippee_ki_yay_wizard_started:
    - show_yippee_ki_yay_phase_1_slide
    - yippee_ki_yay_phase_1_start|750ms
  yippee_ki_yay_phase_1_start:
    - yippee_ki_yay_phase_1_start_multiball
    - nakatomi_lock_open
    - nakatomi_entrance_lock_open
    - yippee_ki_yay_phase_1_lock_lit
    - show_yippee_lock_3_balls_widget|250ms
    - arm_yippee_ki_yay_phase_1_vuk|500ms
    - wire_ramp_exit_open
  yippee_ki_yay_phase_1_vuk_counted:
    - nakatomi_lock_open
  timer_yippee_ki_yay_nakatomi_lock_hold_reset_complete:
    - nakatomi_lock_open
  balldevice_tower_vuk_ball_enter{current_player.yippee_ki_yay_phase_1_active == 1 and current_player.yippee_ki_yay_phase_1_complete != 1 and current_player.yippee_ki_yay_phase_1_vuk_armed == 1 and current_player.yippee_ki_yay_phase_1_balls_locked == 0}:
    - yippee_ki_yay_phase_1_ball_1_locked
    - yippee_ki_yay_phase_1_vuk_counted
    - yippee_ki_yay_phase_1_ball_1_lock_show
    - yippee_ki_yay_phase_1_release_vuk|1000ms
    - yippee_ki_yay_phase_1_check_count|1500ms
  balldevice_tower_vuk_ball_enter{current_player.yippee_ki_yay_phase_1_active == 1 and current_player.yippee_ki_yay_phase_1_complete != 1 and current_player.yippee_ki_yay_phase_1_vuk_armed == 1 and current_player.yippee_ki_yay_phase_1_balls_locked == 1}:
    - yippee_ki_yay_phase_1_ball_2_locked
    - yippee_ki_yay_phase_1_vuk_counted
    - yippee_ki_yay_phase_1_ball_2_lock_show
    - yippee_ki_yay_phase_1_release_vuk|1000ms
    - yippee_ki_yay_phase_1_check_count|1500ms
  balldevice_tower_vuk_ball_enter{current_player.yippee_ki_yay_phase_1_active == 1 and current_player.yippee_ki_yay_phase_1_complete != 1 and current_player.yippee_ki_yay_phase_1_vuk_armed == 1 and current_player.yippee_ki_yay_phase_1_balls_locked == 2}:
    - yippee_ki_yay_phase_1_ball_3_locked
    - yippee_ki_yay_phase_1_vuk_counted
    - yippee_ki_yay_phase_1_release_vuk|1000ms
    - yippee_ki_yay_phase_1_check_count|1500ms
  yippee_ki_yay_phase_1_check_count{current_player.yippee_ki_yay_phase_1_balls_locked < 3 and current_player.yippee_ki_yay_phase_1_complete != 1}:
    - arm_yippee_ki_yay_phase_1_vuk
  yippee_ki_yay_phase_1_check_count{current_player.yippee_ki_yay_phase_1_balls_locked >= 3 and current_player.yippee_ki_yay_phase_1_complete != 1}:
    - yippee_ki_yay_phase_1_three_balls_locked
  yippee_ki_yay_phase_1_three_balls_locked:
    - disarm_yippee_ki_yay_phase_1_vuk
    - nakatomi_entrance_lock_close
    - yippee_ki_yay_phase_1_play_kill_video
    - yippee_ki_yay_phase_1_release_after_kill|8000ms
    - wire_ramp_exit_close
  yippee_ki_yay_phase_1_release_after_kill{current_player.yippee_ki_yay_phase_1_complete != 1}:
    - nakatomi_lock_close
    - yippee_ki_yay_phase_1_complete
    - show_yippee_ki_yay_phase_2_slide
    - yippee_ki_yay_phase_2_start|100ms
  yippee_ki_yay_phase_2_start:
    - yippee_ki_yay_phase_2_refresh|500ms
    - show_yippee_airplane_lock_1_widget|100ms
    - arm_yippee_ki_yay_phase_2_scoop|500ms
    - yippee_ki_yay_phase_2_show_trailer
  s_UrampUp001_active{current_player.yippee_ki_yay_phase_2_active == 1 and current_player.yippee_ki_yay_phase_2_scoop_armed == 1 and current_player.yippee_ki_yay_phase_2_balls_locked == 0}:
    - disarm_yippee_ki_yay_phase_2_scoop
    - yippee_ki_yay_phase_2_ball_1_locked
    - yippee_ki_yay_phase_2_ball_1_lock_show
    - yippee_ki_yay_phase_2_scoop_counted
    - show_yippee_airplane_lock_2_widget|250ms
    - yippee_ki_yay_phase_2_release_scoop|1000ms
    - yippee_ki_yay_phase_2_check_count|1500ms
  s_UrampUp001_active{current_player.yippee_ki_yay_phase_2_active == 1 and current_player.yippee_ki_yay_phase_2_scoop_armed == 1 and current_player.yippee_ki_yay_phase_2_balls_locked == 1}:
    - disarm_yippee_ki_yay_phase_2_scoop
    - yippee_ki_yay_phase_2_ball_2_locked
    - yippee_ki_yay_phase_2_ball_2_lock_show
    - yippee_ki_yay_phase_2_scoop_counted
    - show_yippee_airplane_lock_3_widget|250ms
    - yippee_ki_yay_phase_2_release_scoop|1000ms
    - yippee_ki_yay_phase_2_check_count|1500ms
  s_UrampUp001_active{current_player.yippee_ki_yay_phase_2_active == 1 and current_player.yippee_ki_yay_phase_2_scoop_armed == 1 and current_player.yippee_ki_yay_phase_2_balls_locked == 2}:
    - disarm_yippee_ki_yay_phase_2_scoop
    - yippee_ki_yay_phase_2_ball_3_locked
    - yippee_ki_yay_phase_2_ball_3_lock_show
    - yippee_ki_yay_phase_2_scoop_counted
    - show_yippee_airplane_lock_3_widget|250ms
    - yippee_ki_yay_phase_2_release_scoop|1000ms
    - yippee_ki_yay_phase_2_check_count|1500ms
  yippee_ki_yay_phase_2_check_count{current_player.yippee_ki_yay_phase_2_balls_locked < 3 and current_player.yippee_ki_yay_phase_2_complete != 1}:
    - arm_yippee_ki_yay_phase_2_scoop
  yippee_ki_yay_phase_2_check_count{current_player.yippee_ki_yay_phase_2_balls_locked >= 3 and current_player.yippee_ki_yay_phase_2_complete != 1}:
    - yippee_ki_yay_phase_2_all_balls_locked
  yippee_ki_yay_phase_2_all_balls_locked:
    - disarm_yippee_ki_yay_phase_2_scoop
    - yippee_ki_yay_phase_2_play_kill_video
    - yippee_ki_yay_phase_2_to_phase_3|9200ms
  yippee_ki_yay_phase_2_to_phase_3:
    - yippee_ki_yay_phase_2_complete
    - show_yippee_ki_yay_phase_3_slide
    - yippee_ki_yay_phase_3_start|100ms
    - wire_ramp_exit_closed
  yippee_ki_yay_phase_3_start:
    - yippee_ki_yay_phase_3_refresh|500ms
    - show_yippee_phase_3_lanes_1_widget|250ms
  s_upper_pf_entrance_inactive{current_player.yippee_ki_yay_phase_3_active == 1 and current_player.yippee_ki_yay_phase_3_lanes_hit >= 2 and current_player.yippee_ki_yay_phase_3_complete != 1}:
    - central_park_start_multiball_hit
    - yippee_ki_yay_phase_3_final_lane_complete|500ms
  s_TrPF1_active{current_player.yippee_ki_yay_phase_3_active == 1 and current_player.yippee_ki_yay_phase_3_left_done != 1 and current_player.yippee_ki_yay_phase_3_lanes_hit < 2 and current_player.yippee_ki_yay_phase_3_complete != 1}:
    - yippee_ki_yay_phase_3_left_lane_hit
  s_TrPF2_active{current_player.yippee_ki_yay_phase_3_active == 1 and current_player.yippee_ki_yay_phase_3_middle_done != 1 and current_player.yippee_ki_yay_phase_3_lanes_hit < 2 and current_player.yippee_ki_yay_phase_3_complete != 1}:
    - yippee_ki_yay_phase_3_middle_lane_hit
  s_TrPF3_active{current_player.yippee_ki_yay_phase_3_active == 1 and current_player.yippee_ki_yay_phase_3_right_done != 1 and current_player.yippee_ki_yay_phase_3_lanes_hit < 2 and current_player.yippee_ki_yay_phase_3_complete != 1}:
    - yippee_ki_yay_phase_3_right_lane_hit
  s_TrPF1_active{current_player.yippee_ki_yay_phase_3_active == 1 and current_player.yippee_ki_yay_phase_3_left_done != 1 and current_player.yippee_ki_yay_phase_3_lanes_hit >= 2 and current_player.yippee_ki_yay_phase_3_complete != 1}:
    - yippee_ki_yay_phase_3_left_lane_hit
    - yippee_ki_yay_phase_3_final_lane_complete|50ms
  s_TrPF2_active{current_player.yippee_ki_yay_phase_3_active == 1 and current_player.yippee_ki_yay_phase_3_middle_done != 1 and current_player.yippee_ki_yay_phase_3_lanes_hit >= 2 and current_player.yippee_ki_yay_phase_3_complete != 1}:
    - yippee_ki_yay_phase_3_middle_lane_hit
    - yippee_ki_yay_phase_3_final_lane_complete|50ms
  s_TrPF3_active{current_player.yippee_ki_yay_phase_3_active == 1 and current_player.yippee_ki_yay_phase_3_right_done != 1 and current_player.yippee_ki_yay_phase_3_lanes_hit >= 2 and current_player.yippee_ki_yay_phase_3_complete != 1}:
    - yippee_ki_yay_phase_3_right_lane_hit
    - yippee_ki_yay_phase_3_final_lane_complete|50ms
  yippee_ki_yay_phase_3_final_lane_complete{current_player.yippee_ki_yay_phase_3_complete != 1}:
    - yippee_ki_yay_phase_3_all_lanes_complete
    - yippee_ki_yay_phase_3_play_kill_video
    - yippee_ki_yay_phase_3_release_after_kill|9200ms
  yippee_ki_yay_phase_3_release_after_kill:
    - trmagl_fling
    - trmagr_fling
    - yippee_ki_yay_phase_3_complete
    - start_yippee_ki_yay_final_wizard|500ms
  ball_drain{current_player.yippee_ki_yay_phase_1_active == 1 and current_player.yippee_ki_yay_phase_1_complete != 1 and current_player.yippee_ki_yay_phase_1_ball_save_running != 1}:
    - yippee_ki_yay_phase_1_failed
  ball_save_yippee_ki_yay_phase_1_ball_save_saving_ball:
    - ball_save_saving_ball
  ball_drain{current_player.yippee_ki_yay_phase_2_active == 1 and current_player.yippee_ki_yay_phase_2_complete != 1 and current_player.yippee_ki_yay_phase_2_ball_save_running != 1}:
    - yippee_ki_yay_phase_2_failed
  ball_save_yippee_ki_yay_phase_2_ball_save_saving_ball:
    - ball_save_saving_ball
  ball_drain{current_player.yippee_ki_yay_phase_3_active == 1 and current_player.yippee_ki_yay_phase_3_complete != 1 and current_player.yippee_ki_yay_phase_3_ball_save_running != 1}:
    - yippee_ki_yay_phase_3_failed
  ball_save_yippee_ki_yay_phase_3_ball_save_saving_ball:
    - ball_save_saving_ball
  yippee_ki_yay_phase_1_failed:
    - disarm_yippee_ki_yay_phase_1_vuk
    - nakatomi_entrance_lock_close
    - nakatomi_lock_close
    - wire_ramp_exit_close
  yippee_ki_yay_phase_2_failed:
    - disarm_yippee_ki_yay_phase_2_scoop
    - yippee_ki_yay_phase_2_release_scoop
  yippee_ki_yay_phase_3_failed:
    - wire_ramp_exit_closed
    - trmagl_fling
    - trmagr_fling
  mode_yippee_ki_yay_wizard_stopping:
    - disarm_yippee_ki_yay_phase_1_vuk
    - disarm_yippee_ki_yay_phase_2_scoop
    - nakatomi_entrance_lock_close
    - nakatomi_lock_close
    - wire_ramp_exit_close
