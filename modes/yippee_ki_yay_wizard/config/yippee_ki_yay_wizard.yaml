#config_version=6
# ------------------------------------------------------------
# YIPPEE KI YAY WIZARD
# ------------------------------------------------------------
# Simple Phase 1 test:
#   - Starts from start_yippee_ki_yay_wizard.
#   - Closes the Nakatomi cage lock.
#   - Opens the Nakatomi entrance gate.
#   - Flashes l7 green for the lock shot.
#   - Uses tower_vuk as the lock counter, like normal Nakatomi.
#   - Counts 3 tower_vuk locks.
#   - Pulses the tower VUK once after each lock.
#   - Re-enables the lock for ball 1 and ball 2.
#   - On ball 3:
#       - closes the entrance gate
#       - opens the Nakatomi cage lock
#       - releases the 3 balls
#       - posts yippee_ki_yay_phase_1_complete
#
# No slides.
# No ball-hold extras.
# No Godot events yet.
# ------------------------------------------------------------
mode:
  start_events:
    - start_yippee_ki_yay_wizard
  stop_events:
    - ball_ended
  priority: 500
# ------------------------------------------------------------
# EVENT PLAYER
# ------------------------------------------------------------
# Starts Phase 1, prepares the physical Nakatomi lock,
# enables the tower VUK lock counter, and releases the cage on ball 3.
# ------------------------------------------------------------
event_player:
  mode_yippee_ki_yay_wizard_started:
    - yippee_ki_yay_phase_1_start|250ms
  yippee_ki_yay_phase_1_start:
    - nakatomi_lock_close
    - nakatomi_entrance_lock_open
    - yippee_ki_yay_phase_1_lock_lit
    - enable_yippee_ki_yay_phase_1_lock
  multiball_lock_yippee_ki_yay_phase_1_locked_ball{current_player.yippee_ki_yay_phase_1_active == 1 and current_player.yippee_ki_yay_phase_1_complete != 1}:
    - disable_yippee_ki_yay_phase_1_lock
    - yippee_ki_yay_phase_1_release_vuk|1000ms
    - yippee_ki_yay_phase_1_lock_finished|1200ms
    - yippee_ki_yay_phase_1_check_count|1300ms
  yippee_ki_yay_phase_1_check_count{current_player.yippee_ki_yay_phase_1_balls_locked < 3 and current_player.yippee_ki_yay_phase_1_complete != 1}:
    - enable_yippee_ki_yay_phase_1_lock
  yippee_ki_yay_phase_1_check_count{current_player.yippee_ki_yay_phase_1_balls_locked >= 3 and current_player.yippee_ki_yay_phase_1_complete != 1}:
    - yippee_ki_yay_phase_1_three_balls_locked
  yippee_ki_yay_phase_1_three_balls_locked:
    - disable_yippee_ki_yay_phase_1_lock
    - nakatomi_entrance_lock_close
    - nakatomi_lock_open
    - yippee_ki_yay_phase_1_complete
  mode_yippee_ki_yay_wizard_stopping:
    - disable_yippee_ki_yay_phase_1_lock
    - nakatomi_entrance_lock_close
    - nakatomi_lock_open
# ------------------------------------------------------------
# MULTIBALL LOCKS
# ------------------------------------------------------------
# This uses tower_vuk exactly like the normal Nakatomi lock counter.
# Do not use reset_count_for_current_player_events here because
# MPF cannot reset physical balls with physical_only.
# ------------------------------------------------------------
multiball_locks:
  yippee_ki_yay_phase_1:
    balls_to_lock: 3
    lock_devices: tower_vuk
    balls_to_replace: 2
    enable_events: enable_yippee_ki_yay_phase_1_lock
    disable_events:
      - disable_yippee_ki_yay_phase_1_lock
      - yippee_ki_yay_phase_1_complete
    locked_ball_counting_strategy: physical_only
# ------------------------------------------------------------
# QUEUE RELAY PLAYER
# ------------------------------------------------------------
# If MPF tries to replace a locked ball while the VUK release is still
# happening, wait until yippee_ki_yay_phase_1_lock_finished.
# ------------------------------------------------------------
queue_relay_player:
  balldevice_trough_ball_eject_attempt{current_player.yippee_ki_yay_phase_1_locking == 1}:
    post: wait_for_yippee_ki_yay_phase_1_lock
    wait_for: yippee_ki_yay_phase_1_lock_finished
# ------------------------------------------------------------
# VARIABLE PLAYER
# ------------------------------------------------------------
# Tracks Phase 1 state and the 3 VUK-counted locked balls.
# ------------------------------------------------------------
variable_player:
  mode_yippee_ki_yay_wizard_started:
    yippee_ki_yay_phase_1_active:
      action: set
      int: 0
    yippee_ki_yay_phase_1_complete:
      action: set
      int: 0
    yippee_ki_yay_phase_1_balls_locked:
      action: set
      int: 0
    yippee_ki_yay_phase_1_locking:
      action: set
      int: 0
  yippee_ki_yay_phase_1_start:
    yippee_ki_yay_phase_1_active:
      action: set
      int: 1
    yippee_ki_yay_phase_1_complete:
      action: set
      int: 0
    yippee_ki_yay_phase_1_balls_locked:
      action: set
      int: 0
    yippee_ki_yay_phase_1_locking:
      action: set
      int: 0
  multiball_lock_yippee_ki_yay_phase_1_locked_ball:
    yippee_ki_yay_phase_1_balls_locked:
      action: add
      int: 1
    yippee_ki_yay_phase_1_locking:
      action: set
      int: 1
  yippee_ki_yay_phase_1_lock_finished:
    yippee_ki_yay_phase_1_locking:
      action: set
      int: 0
  yippee_ki_yay_phase_1_three_balls_locked:
    yippee_ki_yay_phase_1_active:
      action: set
      int: 0
    yippee_ki_yay_phase_1_complete:
      action: set
      int: 1
    yippee_ki_yay_phase_1_locking:
      action: set
      int: 0
# ------------------------------------------------------------
# COIL PLAYER
# ------------------------------------------------------------
# Pulses the tower VUK once after each valid multiball lock count.
# ------------------------------------------------------------
coil_player:
  yippee_ki_yay_phase_1_release_vuk: c_towervuk_eject
# ------------------------------------------------------------
# SHOW PLAYER
# ------------------------------------------------------------
# Flashes the Nakatomi lock light while Phase 1 is waiting for VUK locks.
# Stops when the 3rd VUK lock is counted and the cage opens.
# ------------------------------------------------------------
show_player:
  yippee_ki_yay_phase_1_lock_lit:
    yippee_ki_yay_nakatomi_lock_green_flash:
      key: yippee_ki_yay_nakatomi_lock_green_flash
      priority: 3000
      loops: -1
  yippee_ki_yay_phase_1_three_balls_locked:
    yippee_ki_yay_nakatomi_lock_green_flash:
      action: stop
  mode_yippee_ki_yay_wizard_stopping:
    yippee_ki_yay_nakatomi_lock_green_flash:
      action: stop
# ------------------------------------------------------------
# LIGHT PLAYER
# ------------------------------------------------------------
# Makes sure l7 is off once Phase 1 completes or the mode stops.
# ------------------------------------------------------------
light_player:
  yippee_ki_yay_phase_1_three_balls_locked:
    l7:
      color: off
      priority: 5000
  mode_yippee_ki_yay_wizard_stopping:
    l7:
      color: off
      priority: 5000
# ------------------------------------------------------------
# SHOWS
# ------------------------------------------------------------
# Simple green flash for the Nakatomi lock insert.
# ------------------------------------------------------------
shows:
  yippee_ki_yay_nakatomi_lock_green_flash:
    - time: 0
      lights:
        l7: 00ff00
    - time: 250ms
      lights:
        l7: off
    - time: 500ms