# ------------------------------------------------------------
# SLIDE PLAYER
# ------------------------------------------------------------
# Background runs during Simon.
# Defeated/Escaped result slides use Karl-style high priority result flow.
# ------------------------------------------------------------
slide_player:
  mode_simon_diehard_started:
    simon_diehard_background:
      action: play
      expire: 0s
      priority: 500

  mode_simon_diehard_stopping:
    simon_diehard_background:
      action: remove

  simon_diehard_completed_slide:
    simon_diehard_background:
      action: remove
    simon_defeated:
      action: play
      expire: 5s
      priority: 10000

  simon_diehard_fail_mode:
    simon_diehard_background:
      action: remove
    simon_escaped:
      action: play
      expire: 5s
      priority: 10000

# ------------------------------------------------------------
# SOUND PLAYER
# ------------------------------------------------------------
# Starts Simon music and stops it when Simon ends.
# ------------------------------------------------------------
sound_player:
  simon_diehard_music_start:
    SimonTheme:
      key: main_music
      action: play
      loops: -1
      volume: 0.8

  mode_simon_diehard_stopping:
    SimonTheme:
      key: main_music
      action: stop