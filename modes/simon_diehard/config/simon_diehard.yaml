# SHOW PLAYER
# ------------------------------------------------------------
# Runs Simon insert flash, selected shot flash, hit flashers,
# completion ball save flash, and cleanup.
# ------------------------------------------------------------
show_player:
  ball_save_simon_diehard_start_save_enabled:
    flash_color:
      key: simon_diehard_start_save_flash
      loops: -1
      speed: 8
      show_tokens:
        lights: BALL_SAVE
        color: ffffff

  ball_save_simon_diehard_start_save_disabled:
    simon_diehard_start_save_flash:
      action: stop

  ball_save_simon_diehard_complete_save_enabled:
    flash_color:
      key: simon_diehard_complete_save_flash
      loops: -1
      speed: 8
      show_tokens:
        lights: BALL_SAVE
        color: ffffff

  ball_save_simon_diehard_complete_save_disabled:
    simon_diehard_complete_save_flash:
      action: stop

  mode_simon_diehard_started:
    simon_diehard_insert_flash:
