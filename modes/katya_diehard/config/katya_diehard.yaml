#config_version=6

# ------------------------------------------------------------
# MODE
# Katya Die Hard.
#
# Uses shared completion gate:
#   katya_complete
#
# Once Katya is completed in either Die Hard or Die Harder,
# both versions are blocked for the rest of the game.
#
# Failed / escaped Katya can be replayed.
# ------------------------------------------------------------
mode:
  start_events:
    - start_katya_diehard{current_player.katya_complete==0}
  stop_events:
    - katya_completed
    - katya_failed
  priority: 250

# ------------------------------------------------------------
# TIMERS
# Normal timer = 93s.
# Hans Bonus timer = 123s if current_player.hans_bonus == 1.
# Mystery Add More Time = +20s.
#
# Hans Bonus is NOT cleared here.
# ------------------------------------------------------------
timers:
  katya_timer:
    start_value: 93
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: katya_start_normal_timer
        action: restart
        value: 93
      - event: katya_start_bonus_timer
        action: restart
        value: 123
      - event: katya_completed
        action: stop
      - event: katya_failed
        action: stop
      - event: add_villain_time_from_mystery
        action: add
        value: 20

# ------------------------------------------------------------
# BALL SAVES
# Same style as Katya Die Harder.
#
# Start save:
#   2 seconds.
#
# Complete save:
#   8 seconds active.
#   3 seconds hurry-up.
#   5 seconds grace.
#
# Ball-save light stays Katya colour.
# ------------------------------------------------------------
ball_saves:
  katya_diehard_start_save:
    active_time: 2s
    hurry_up_time: 0s
    grace_period: 0s
    auto_launch: true
    balls_to_save: 1
    enable_events:
      - mode_katya_diehard_started
    disable_events:
      - mode_katya_diehard_stopping

  katya_diehard_complete_save:
    active_time: 8s
    hurry_up_time: 1s
    grace_period: 1s
    auto_launch: true
    balls_to_save: 1
    enable_events:
      - katya_victory_sequence
    disable_events:
      - mode_katya_diehard_stopping

# ------------------------------------------------------------
# COUNTERS
# Counts Katya loop hits.
# Five loop hits lights/enables captive ball final shot.
# ------------------------------------------------------------
counters:
  katya_loop_counter:
    count_events:
      - katya_left_loop_hit
      - katya_right_loop_hit
      - katya_upper_loop_hit
    starting_count: 0
    count_complete_value: 5
    direction: up
    persist_state: false
    reset_on_complete: false
    reset_events:
      - mode_katya_diehard_started
    events_when_complete:
      - katya_loops_complete

# ------------------------------------------------------------
# SHOTS
# Loop shots disable when hit and relight after 3s.
# Captive ball enables after 5 loop hits.
# ------------------------------------------------------------
shots:
  katya_left_loop:
    hit_events:
      - left_orbit_hit
    enable_events:
      - mode_katya_diehard_started
      - katya_left_loop_relight
    disable_events:
      - katya_left_loop_hit
      - katya_loops_complete
      - katya_completed
      - katya_failed

  katya_right_loop:
    hit_events:
      - right_orbit_hit
    enable_events:
      - mode_katya_diehard_started
      - katya_right_loop_relight
    disable_events:
      - katya_right_loop_hit
      - katya_loops_complete
      - katya_completed
      - katya_failed

  katya_upper_loop:
    switch: s_mid_orbit
    enable_events:
      - mode_katya_diehard_started
      - katya_upper_loop_relight
    disable_events:
      - katya_upper_loop_hit
      - katya_loops_complete
      - katya_completed
      - katya_failed

  katya_captive_final:
    switch: s_captiveball
    enable_events:
      - katya_loops_complete
    disable_events:
      - katya_completed
      - katya_failed

# ------------------------------------------------------------
# EVENT PLAYER
# Handles start, Hans Bonus timer choice, loop scoring,
# victory flow, escape flow, ball drain handling, Villain MVP
# tracking, and cleanup.
#
# Die Hard ending:
#   Timer fail / drain = Katya escaped.
#
# This does NOT use Die Harder fail mode.
# No flipper disable.
# No katya_ball_lost.
# ------------------------------------------------------------
event_player:
  mode_katya_diehard_started:
    - villain_mode_started
    - katya_start
    - katya_diehard_music_start
    - reset_bullet_total
    - reset_bullets
    - nakatomi_entrance_lock_close
    - wire_ramp_exit_open
    - record_start_katya_diehard_villain_mvp
  record_start_katya_diehard_villain_mvp:
    record_start_villain_mvp:
      mode: KATYA DIE HARD
  mode_katya_diehard_started{current_player.hans_bonus==1}:
    - katya_start_bonus_timer
  mode_katya_diehard_started{current_player.hans_bonus!=1}:
    - katya_start_normal_timer
  mode_katya_diehard_stopping:
    - villain_mode_stopped
  record_finish_katya_diehard_villain_mvp:
    record_finish_villain_mvp:
      mode: KATYA DIE HARD
  timer_katya_timer_complete:
    - katya_escape_sequence
  ball_drain{current_player.katya_diehard_completion_active==0 and current_player.katya_diehard_result_started==0}:
    - katya_ball_drain_escape
  ball_drain{current_player.katya_diehard_completion_active==1}:
    - reset_bullet_total
    - reset_bullets
  ball_ended{current_player.katya_diehard_completion_active==0 and current_player.katya_diehard_result_started==0}:
    - katya_escape_sequence
  ball_ended{current_player.katya_diehard_completion_active==1}:
    - reset_bullet_total
    - reset_bullets
  katya_ball_drain_escape:
    - katya_failed|4s
  katya_escape_sequence:
    - katya_failed_delay
  katya_failed_delay:
    - katya_failed|4s
  katya_failed:
    - record_finish_katya_diehard_villain_mvp
    - reset_bullet_total
    - reset_bullets
    - wire_ramp_exit_closed
  katya_captive_final_hit:
    - katya_victory_sequence
  katya_victory_sequence:
    - katya_completed_show
    - katya_completed|4s
  katya_completed:
    - record_finish_katya_diehard_villain_mvp
    - reset_bullet_total
    - reset_bullets
    - count_katya_for_extra_ball
    - wire_ramp_exit_closed
  katya_left_loop_hit{device.counters.katya_loop_counter.value<5}:
    - katya_loop_hit_scored
    - katya_left_loop_relight|3s
  katya_right_loop_hit{device.counters.katya_loop_counter.value<5}:
    - katya_loop_hit_scored
    - katya_right_loop_relight|3s
  katya_upper_loop_hit{device.counters.katya_loop_counter.value<5}:
    - katya_loop_hit_scored
    - katya_upper_loop_relight|3s
# ------------------------------------------------------------
# VARIABLE PLAYER
# Stores Katya Die Hard state, timer, shots, Hans Bonus state,
# scoring, completion flags, and result state.
#
# katya_shots:
#   Drives Godot background hit videos.
#
# katya_complete:
#   Shared completion gate for both Die Hard and Die Harder.
# ------------------------------------------------------------
variable_player:
  katya_start:
    villain_mode_running:
      int: 1
      action: set
    katya_diehard_completion_active:
      int: 0
      action: set
    katya_diehard_result_started:
      int: 0
      action: set
    katya_shots:
      int: 0
      action: set
    katya_diehard_time:
      int: 93
      action: set
    katya_diehard_remaining:
      int: 93
      action: set
    katya_diehard_hans_bonus_active:
      int: 0
      action: set
    villain_bonus:
      int: 500000
      action: add

  katya_start{current_player.hans_bonus==1}:
    katya_diehard_hans_bonus_active:
      int: 1
      action: set
    katya_diehard_time:
      int: 123
      action: set
    katya_diehard_remaining:
      int: 123
      action: set

  timer_katya_timer_tick:
    katya_diehard_remaining:
      int: ticks
      action: set

  katya_loop_hit_scored:
    score:
      int: "1500000 * current_player.playfield_multiplier"
      action: add
    villain_bonus:
      int: 1500000
      action: add
    katya_shots:
      int: 1
      action: add

  katya_victory_sequence:
    katya_diehard_completion_active:
      int: 1
      action: set
    katya_diehard_result_started:
      int: 1
      action: set
    eob_bonus_villains:
      int: 1000000
      action: add

  katya_ball_drain_escape:
    katya_diehard_result_started:
      int: 1
      action: set

  katya_escape_sequence:
    katya_diehard_result_started:
      int: 1
      action: set

  katya_captive_final_hit:
    score:
      int: "3000000 * current_player.playfield_multiplier"
      action: add
    villain_bonus:
      int: 3000000
      action: add

  katya_completed:
    katya_complete:
      int: 1
      action: set
    katya_diehard_complete:
      int: 1
      action: set
    modes_complete:
      int: 1
      action: add
    villains_completed:
      int: 1
      action: add
    katya_diehard_result_started:
      int: 0
      action: set

  katya_failed:
    katya_diehard_result_started:
      int: 0
      action: set

  mode_katya_diehard_stopping:
    villain_mode_running:
      int: 0
      action: set
    katya_diehard_completion_active:
      int: 0
      action: set
    katya_diehard_result_started:
      int: 0
      action: set
    katya_diehard_hans_bonus_active:
      int: 0
      action: set

# ------------------------------------------------------------
# LIGHT PLAYER
# Sets Katya Die Hard lighting.
# ------------------------------------------------------------
light_player:
  mode_katya_diehard_started:
    GI:
      color: ff00ff
    SPOTS:
      color: 505050
    SPOTS_BUMPER:
      color: 757575
    l1000:
      color: ff00ff
    l1001:
      color: ff00ff

  katya_completed:
    l1000: off
    l1001: off
    l42:
      color: ff00ff

  katya_failed:
    l1000: off
    l1001: off

# ------------------------------------------------------------
# SHOWS
# Inline Katya Die Hard light shows.
# ------------------------------------------------------------
shows:
  katya_left_loop_flash:
    - duration: 200ms
      lights:
        l20: ff00ff
    - duration: 200ms
      lights:
        l20: off

  katya_right_loop_flash:
    - duration: 200ms
      lights:
        l22: ff00ff
    - duration: 200ms
      lights:
        l22: off

  katya_upper_loop_flash:
    - duration: 200ms
      lights:
        l23: ff00ff
    - duration: 200ms
      lights:
        l23: off

  katya_captive_flash:
    - duration: 120ms
      lights:
        l52: ff0000
    - duration: 120ms
      lights:
        l52: off

  katya_hit_flashers:
    - duration: 80ms
      lights:
        f142: ff00ff
        f143: ff00ff
        f144: ff00ff
        f145: ff00ff
        f146: ff00ff
        f147: ff00ff
    - duration: 80ms
      lights:
        f142: off
        f143: off
        f144: off
        f145: off
        f146: off
        f147: off

  katya_gi_spots_hit_flash:
    - duration: 80ms
      lights:
        GI: ffffff
        SPOTS: ffffff
        SPOTS_BUMPER: ffffff
    - duration: 120ms
      lights:
        GI: ff00ff
        SPOTS: 505050
        SPOTS_BUMPER: 757575

  katya_insert_flash:
    - duration: 200ms
      lights:
        l42: ff00ff
    - duration: 200ms
      lights:
        l42: off

# ------------------------------------------------------------
# SHOW PLAYER
# Handles Katya-colour ball-save flashes, loop/captive flashes,
# hit flashers, GI/SPOTS hit flash, insert flashing, and cleanup.
# ------------------------------------------------------------
show_player:
  ball_save_katya_diehard_start_save_enabled:
    flash_color:
      key: katya_diehard_start_save_flash
      loops: -1
      speed: 8
      show_tokens:
        lights: BALL_SAVE
        color: ff00ff

  ball_save_katya_diehard_start_save_disabled:
    katya_diehard_start_save_flash:
      action: stop

  ball_save_katya_diehard_complete_save_enabled:
    flash_color_with_fade:
      key: katya_diehard_ball_save_flash
      loops: -1
      speed: 2
      show_tokens:
        lights: BALL_SAVE
        color: ff00ff
        fade: 500

  ball_save_katya_diehard_complete_save_hurry_up:
    flash_color:
      key: katya_diehard_ball_save_flash
      loops: -1
      speed: 7
      show_tokens:
        lights: BALL_SAVE
        color: ff00ff

  ball_save_katya_diehard_complete_save_disabled:
    flash_color_with_fade:
      action: stop
      key: katya_diehard_ball_save_flash
    flash_color:
      action: stop
      key: katya_diehard_ball_save_flash

  mode_katya_diehard_started:
    katya_left_loop_flash:
      loops: -1
    katya_right_loop_flash:
      loops: -1
    katya_upper_loop_flash:
      loops: -1
    katya_insert_flash:
      loops: -1

  katya_loop_hit_scored:
    katya_hit_flashers:
      loops: 2
    katya_gi_spots_hit_flash:
      loops: 1
      priority: 850

  katya_left_loop_hit:
    katya_left_loop_flash:
      action: stop

  katya_left_loop_relight:
    katya_left_loop_flash:
      loops: -1

  katya_right_loop_hit:
    katya_right_loop_flash:
      action: stop

  katya_right_loop_relight:
    katya_right_loop_flash:
      loops: -1

  katya_upper_loop_hit:
    katya_upper_loop_flash:
      action: stop

  katya_upper_loop_relight:
    katya_upper_loop_flash:
      loops: -1

  katya_loops_complete:
    katya_left_loop_flash:
      action: stop
    katya_right_loop_flash:
      action: stop
    katya_upper_loop_flash:
      action: stop
    katya_captive_flash:
      loops: -1

  katya_completed:
    katya_diehard_start_save_flash:
      action: stop
    flash_color_with_fade:
      action: stop
      key: katya_diehard_ball_save_flash
    flash_color:
      action: stop
      key: katya_diehard_ball_save_flash
    katya_gi_spots_hit_flash:
      action: stop
    katya_captive_flash:
      action: stop
    katya_insert_flash:
      action: stop

  katya_failed:
    katya_diehard_start_save_flash:
      action: stop
    flash_color_with_fade:
      action: stop
      key: katya_diehard_ball_save_flash
    flash_color:
      action: stop
      key: katya_diehard_ball_save_flash
    katya_gi_spots_hit_flash:
      action: stop
    katya_left_loop_flash:
      action: stop
    katya_right_loop_flash:
      action: stop
    katya_upper_loop_flash:
      action: stop
    katya_captive_flash:
      action: stop
    katya_insert_flash:
      action: stop

  mode_katya_diehard_stopping:
    katya_diehard_start_save_flash:
      action: stop
    flash_color_with_fade:
      action: stop
      key: katya_diehard_ball_save_flash
    flash_color:
      action: stop
      key: katya_diehard_ball_save_flash
    katya_gi_spots_hit_flash:
      action: stop
    katya_left_loop_flash:
      action: stop
    katya_right_loop_flash:
      action: stop
    katya_upper_loop_flash:
      action: stop
    katya_captive_flash:
      action: stop
    katya_insert_flash:
      action: stop

# ------------------------------------------------------------
# SLIDE PLAYER
# Plays Katya Die Hard background and result slides.
#
# Hit videos are NOT MPF slides anymore:
#   katya_hit_1 to katya_hit_5 are removed.
#
# Hit videos are handled inside katya_diehard_background
# by Godot using current_player.katya_shots.
# ------------------------------------------------------------
slide_player:
  mode_katya_diehard_started:
    katya_diehard_background:
      action: play
      expire: 0s
      priority: 600

  mode_katya_diehard_stopping:
    katya_diehard_background:
      action: remove

  katya_completed_show:
    katya_diehard_background:
      action: remove
    katya_defeated:
      action: play
      expire: 4s
      priority: 10000

  katya_ball_drain_escape:
    katya_diehard_background:
      action: remove
    katya_escaped:
      action: play
      expire: 4s
      priority: 10000

  katya_escape_sequence:
    katya_diehard_background:
      action: remove
    katya_escaped:
      action: play
      expire: 4s
      priority: 10000

# ------------------------------------------------------------
# WIDGET PLAYER
# Shows Katya Die Hard timer and progress widgets.
# These are the registered normal Die Hard widget names.
# ------------------------------------------------------------
widget_player:
  mode_katya_diehard_started:
    katya_timer_widget:
      slide: katya_diehard_background
      action: play
    katya_diehard_progress_widget:
      slide: katya_diehard_background
      action: play

  mode_katya_diehard_stopping:
    katya_timer_widget:
      action: remove
    katya_diehard_progress_widget:
      action: remove

  katya_completed:
    katya_timer_widget:
      action: remove
    katya_diehard_progress_widget:
      action: remove

  katya_failed:
    katya_timer_widget:
      action: remove
    katya_diehard_progress_widget:
      action: remove

# ------------------------------------------------------------
# SOUND PLAYER
# Starts Katya music and stops it when the mode stops.
# ------------------------------------------------------------
sound_player:
  katya_diehard_music_start:
    katyatheme:
      key: main_music
      action: play
      loops: -1
      volume: 0.7

  mode_katya_diehard_stopping:
    katyatheme:
      key: main_music
      action: stop