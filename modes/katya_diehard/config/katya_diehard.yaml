#config_version=6

mode:
  start_events: start_katya_diehard{current_player.katya_complete!=1}
  stop_events:
    - katya_completed
    - katya_failed
  priority: 250

light_player:
  mode_katya_diehard_started:
    GI:
      color: ff00ff
    SPOTS:
      color: 400040
    SPOTS_BUMPER:
      color: 700070
    l1000:
      color: ff00ff
    l1001:
      color: ff00ff

  katya_completed:
    l1000: off
    l1001: off
    l42:
      color: ff00ff

  katya_failed:
    l1000: off
    l1001: off

shows:
  katya_left_loop_flash:
    - duration: 200ms
      lights:
        l20: ff00ff
    - duration: 200ms
      lights:
        l20: off

  katya_right_loop_flash:
    - duration: 200ms
      lights:
        l22: ff00ff
    - duration: 200ms
      lights:
        l22: off

  katya_upper_loop_flash:
    - duration: 200ms
      lights:
        l23: ff00ff
    - duration: 200ms
      lights:
        l23: off

  katya_captive_flash:
    - duration: 120ms
      lights:
        l52: ff0000
    - duration: 120ms
      lights:
        l52: off

  katya_hit_flashers:
    - duration: 80ms
      lights:
        f142: ff0000
        f143: ff0000
        f144: ff0000
        f145: ff0000
        f146: ff0000
        f147: ff0000
    - duration: 80ms
      lights:
        f142: off
        f143: off
        f144: off
        f145: off
        f146: off
        f147: off

  katya_insert_flash:
    - duration: 200ms
      lights:
        l42: ff00ff
    - duration: 200ms
      lights:
        l42: off

show_player:
  mode_katya_diehard_started:
    katya_left_loop_flash:
      loops: -1
    katya_right_loop_flash:
      loops: -1
    katya_upper_loop_flash:
      loops: -1
    katya_insert_flash:
      loops: -1

  katya_loop_hit_scored:
    katya_hit_flashers:
      loops: 2

  katya_left_loop_hit:
    katya_left_loop_flash:
      action: stop

  katya_left_loop_relight:
    katya_left_loop_flash:
      loops: -1

  katya_right_loop_hit:
    katya_right_loop_flash:
      action: stop

  katya_right_loop_relight:
    katya_right_loop_flash:
      loops: -1

  katya_upper_loop_hit:
    katya_upper_loop_flash:
      action: stop

  katya_upper_loop_relight:
    katya_upper_loop_flash:
      loops: -1

  katya_loops_complete:
    katya_left_loop_flash:
      action: stop
    katya_right_loop_flash:
      action: stop
    katya_upper_loop_flash:
      action: stop
    katya_captive_flash:
      loops: -1

  katya_completed:
    katya_captive_flash:
      action: stop
    katya_insert_flash:
      action: stop

  katya_failed:
    katya_left_loop_flash:
      action: stop
    katya_right_loop_flash:
      action: stop
    katya_upper_loop_flash:
      action: stop
    katya_captive_flash:
      action: stop
    katya_insert_flash:
      action: stop

event_player:
  mode_katya_diehard_started:
  - katya_start
  - reset_bullet_total
  - reset_bullets
  - nakatomi_entrance_lock_close
  - wire_ramp_exit_open

  timer_katya_timer_complete:
    - katya_escape_sequence

  ball_ended:
    - katya_escape_sequence

  katya_escape_sequence:
    - katya_failed_delay

  katya_failed_delay:
    - katya_failed|4s

  katya_failed:
    - reset_bullet_total
    - reset_bullets 

  katya_completed:
    - reset_bullet_total
    - reset_bullets

  katya_left_loop_hit{device.counters.katya_loop_counter.value<5}:
    - katya_loop_hit_scored
    - katya_left_loop_relight|3s

  katya_right_loop_hit{device.counters.katya_loop_counter.value<5}:
    - katya_loop_hit_scored
    - katya_right_loop_relight|3s

  katya_upper_loop_hit{device.counters.katya_loop_counter.value<5}:
    - katya_loop_hit_scored
    - katya_upper_loop_relight|3s

  counter_katya_loop_counter_complete:
    - katya_loops_complete

  katya_captive_final_hit:
    - katya_victory_sequence

  katya_victory_sequence:
    - katya_completed_show
    - katya_completed|4s

shots:
  katya_left_loop:
    hit_events: left_orbit_hit
    enable_events: mode_katya_diehard_started
    disable_events:
      - katya_loops_complete
      - katya_completed
      - katya_failed

  katya_right_loop:
    hit_events: right_orbit_hit
    enable_events: mode_katya_diehard_started
    disable_events:
      - katya_loops_complete
      - katya_completed
      - katya_failed

  katya_upper_loop:
    switch: s_mid_orbit
    enable_events: mode_katya_diehard_started
    disable_events:
      - katya_loops_complete
      - katya_completed
      - katya_failed

  katya_captive_final:
    switch: s_captiveball
    enable_events: katya_loops_complete
    disable_events:
      - katya_completed
      - katya_failed

counters:
  katya_loop_counter:
    count_events:
      - katya_left_loop_hit
      - katya_right_loop_hit
      - katya_upper_loop_hit
    starting_count: 0
    count_complete_value: 5
    events_when_complete:
      - katya_loops_complete
    reset_events:
      - mode_katya_diehard_started

timers:
  katya_timer:
    start_value: 93
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: true

slide_player:
  mode_katya_diehard_started:
    katya_diehard_background:
      action: play
 

  katya_loop_hit_scored{current_player.katya_shots==1}:
    katya_hit_1:
      action: play


  katya_loop_hit_scored{current_player.katya_shots==2}:
    katya_hit_2:
      action: play
   

  katya_loop_hit_scored{current_player.katya_shots==3}:
    katya_hit_3:
      action: play


  katya_loop_hit_scored{current_player.katya_shots==4}:
    katya_hit_4:
      action: play


  katya_loop_hit_scored{current_player.katya_shots==5}:
    katya_hit_5:
      action: play


  katya_completed_show:
    katya_diehard_background:
      action: remove

    katya_defeated:
      action: play


  katya_failed:
    katya_diehard_background:
      action: remove

    katya_escaped:
      action: play


widget_player:
  mode_katya_diehard_started:
    katya_timer_widget:
      action: play

    katya_diehard_progress_widget:
      action: play

  katya_completed:
    katya_timer_widget:
      action: remove

    katya_diehard_progress_widget:
      action: remove

  katya_failed:
    katya_timer_widget:
      action: remove

    katya_diehard_progress_widget:
      action: remove

variable_player:
  katya_start:
    villain_mode_running:
      int: 1
      action: set

    katya_shots:
      int: 0
      action: set

    katya_diehard_remaining:
      int: 93
      action: set

    villain_bonus:
      int: 500000
      action: add

  timer_katya_timer_tick:
    katya_diehard_remaining:
      int: -1
      action: add

  katya_loop_hit_scored:
    score:
      action: add
      int: 1500000

    villain_bonus:
      action: add
      int: 1500000

    katya_shots:
      action: add
      int: 1

  katya_captive_final_hit:
    score:
      action: add
      int: 3000000

    villain_bonus:
      action: add
      int: 3000000

  katya_completed:
    katya_complete:
      int: 1
      action: set

    modes_complete:
      action: add
      int: 1

  mode_katya_diehard_stopping:
    villain_mode_running:
      int: 0
      action: set

sound_player:
  katya_diehard_music_start:
    katyatheme:
      action: play
      loops: -1
      volume: 0.7

  mode_katya_diehard_stopping:
    katyatheme:
      action: stop