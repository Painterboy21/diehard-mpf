#config_version=6

# ------------------------------------------------------------
# MODE
# Col/Stuart Die Hard starts from Col/Stuart difficulty select.
#
# Replay rule:
#   Failed / escaped = can replay
#   Completed / defeated = blocked
#
# VPW:
#   Stuart Mode
#   Hit 6 lit shots.
#   0/even progress = all unhit bullet shots lit.
#   Odd progress = only the last shot is lit again.
# ------------------------------------------------------------
mode:
  start_events:
    - start_col_stuart_diehard{current_player.col_stuart_complete != 1}
  stop_events:
    - col_stuart_diehard_completed
    - col_stuart_diehard_failed
  priority: 170

# ------------------------------------------------------------
# TIMERS
# VPW code:
#   Normal Stuart = 78000ms
#   Hans Bonus Stuart = 103000ms
#
# Mystery Add More Time adds +20 seconds.
# Result events stop the timer while the result video/slide plays.
# ------------------------------------------------------------
timers:
  col_stuart_diehard_timer:
    start_value: 78
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: col_stuart_start_normal_timer
        action: restart
        value: 78

      - event: col_stuart_start_hans_bonus_timer
        action: restart
        value: 103

      - event: col_stuart_defeated_slide
        action: stop

      - event: col_stuart_escaped_slide
        action: stop

      - event: col_stuart_diehard_completed
        action: stop

      - event: col_stuart_diehard_failed
        action: stop

      - event: add_villain_time_from_mystery
        action: add
        value: 20

# ------------------------------------------------------------
# BALL SAVES
# 2 second start ball save, like your other villain modes.
# Completion ball save is only enabled on defeat.
# ------------------------------------------------------------
ball_saves:
  col_stuart_start_save:
    active_time: 2s
    hurry_up_time: 1s
    grace_period: 1s
    auto_launch: true
    balls_to_save: -1
    enable_events:
      - col_stuart_enable_start_ball_save
    disable_events:
      - col_stuart_defeated_slide
      - col_stuart_escaped_slide
      - col_stuart_diehard_completed
      - col_stuart_diehard_failed
      - tilt

  col_stuart_complete_save:
    active_time: 5s
    hurry_up_time: 2s
    grace_period: 2s
    auto_launch: true
    balls_to_save: -1
    enable_events:
      - col_stuart_enable_complete_ball_save
    disable_events:
      - col_stuart_diehard_completed
      - col_stuart_diehard_failed
      - tilt

# ------------------------------------------------------------
# SHOTS
# VPW Stuart bullet shots:
#   left orbit  -> l20
#   left ramp   -> l21
#   right ramp  -> l24
#   upper loop  -> l23
#   right orbit -> l22
#
# Real machine mappings used from your current modes:
#   left orbit  = left_orbit_hit
#   right orbit = right_orbit_hit
#   left ramp   = s_swleftinlane
#   right ramp  = s_air_duct
#   upper loop  = s_mid_orbit
# ------------------------------------------------------------
shots:
  col_stuart_left_orbit:
    hit_events: left_orbit_hit
    enable_events:
      - col_stuart_enable_left_orbit
    disable_events:
      - col_stuart_disable_all_shots
      - col_stuart_disable_left_orbit
      - col_stuart_diehard_completed
      - col_stuart_diehard_failed

  col_stuart_left_ramp:
    switch: s_swleftinlane
    enable_events:
      - col_stuart_enable_left_ramp
    disable_events:
      - col_stuart_disable_all_shots
      - col_stuart_disable_left_ramp
      - col_stuart_diehard_completed
      - col_stuart_diehard_failed

  col_stuart_right_ramp:
    switch: s_air_duct
    enable_events:
      - col_stuart_enable_right_ramp
    disable_events:
      - col_stuart_disable_all_shots
      - col_stuart_disable_right_ramp
      - col_stuart_diehard_completed
      - col_stuart_diehard_failed

  col_stuart_upper_loop:
    switch: s_mid_orbit
    enable_events:
      - col_stuart_enable_upper_loop
    disable_events:
      - col_stuart_disable_all_shots
      - col_stuart_disable_upper_loop
      - col_stuart_diehard_completed
      - col_stuart_diehard_failed

  col_stuart_right_orbit:
    hit_events: right_orbit_hit
    enable_events:
      - col_stuart_enable_right_orbit
    disable_events:
      - col_stuart_disable_all_shots
      - col_stuart_disable_right_orbit
      - col_stuart_diehard_completed
      - col_stuart_diehard_failed

# ------------------------------------------------------------
# EVENT PLAYER
# Handles mode start, VPW all-shot / repeat-last-shot logic,
# result flow, fail flow, Extra Ball bridge, and cleanup.
# ------------------------------------------------------------
event_player:

  # ------------------------------------------------------------
  # MODE START
  # ------------------------------------------------------------
  mode_col_stuart_diehard_started:
    - villain_mode_started
    - stop_base_music
    - col_stuart_music_start
    - col_stuart_reset
    - col_stuart_enable_start_ball_save
    - reset_bullets
    - reset_bullet_total
    - nakatomi_entrance_lock_close
    - wire_ramp_exit_open
    - col_stuart_enable_all_remaining

  mode_col_stuart_diehard_started{current_player.hans_bonus == 1}:
    - col_stuart_start_hans_bonus_timer

  mode_col_stuart_diehard_started{current_player.hans_bonus != 1}:
    - col_stuart_start_normal_timer

  mode_col_stuart_diehard_stopping:
    - villain_mode_stopped
    - wire_ramp_exit_closed
    - col_stuart_disable_all_shots

  # ------------------------------------------------------------
  # FAIL / ESCAPE FLOW
  # Failed Stuart can be replayed later.
  # ------------------------------------------------------------
  timer_col_stuart_diehard_timer_complete{current_player.col_stuart_result_started == 0}:
    - col_stuart_escaped_slide
    - col_stuart_diehard_failed|5s

  ball_drain{current_player.col_stuart_result_started == 0}:
    - col_stuart_escaped_slide
    - col_stuart_diehard_failed|5s

  col_stuart_diehard_failed:
    - reset_bullets
    - reset_bullet_total
    - wire_ramp_exit_closed

  # ------------------------------------------------------------
  # COMPLETE FLOW
  # Completed Stuart is locked out for the rest of the game.
  # ------------------------------------------------------------
  col_stuart_check_complete{current_player.col_stuart_progress >= 6 and current_player.col_stuart_result_started == 0}:
    - col_stuart_defeated_slide
    - col_stuart_enable_complete_ball_save
    - col_stuart_diehard_completed|4s

  col_stuart_diehard_completed:
    - col_stuart_score_complete
    - count_col_stuart_for_extra_ball
    - unlock_4x_playfield
    - unlock_5x_playfield
    - reset_bullets
    - reset_bullet_total
    - wire_ramp_exit_closed

  # ------------------------------------------------------------
  # ALL-SHOTS PHASE
  # VPW even progress:
  #   hit any unhit lit bullet shot.
  #   Then only that same shot stays lit.
  # ------------------------------------------------------------
  col_stuart_left_orbit_hit{current_player.col_stuart_shot_mode == 0 and current_player.col_stuart_left_orbit_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_left_orbit_first_hit
    - col_stuart_disable_all_shots
    - col_stuart_enable_left_orbit
    - col_stuart_flash_left_orbit
    - col_stuart_update_remaining|20ms

  col_stuart_left_ramp_hit{current_player.col_stuart_shot_mode == 0 and current_player.col_stuart_left_ramp_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_left_ramp_first_hit
    - col_stuart_disable_all_shots
    - col_stuart_enable_left_ramp
    - col_stuart_flash_left_ramp
    - col_stuart_update_remaining|20ms

  col_stuart_right_ramp_hit{current_player.col_stuart_shot_mode == 0 and current_player.col_stuart_right_ramp_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_right_ramp_first_hit
    - col_stuart_disable_all_shots
    - col_stuart_enable_right_ramp
    - col_stuart_flash_right_ramp
    - col_stuart_update_remaining|20ms

  col_stuart_upper_loop_hit{current_player.col_stuart_shot_mode == 0 and current_player.col_stuart_upper_loop_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_upper_loop_first_hit
    - col_stuart_disable_all_shots
    - col_stuart_enable_upper_loop
    - col_stuart_flash_upper_loop
    - col_stuart_update_remaining|20ms

  col_stuart_right_orbit_hit{current_player.col_stuart_shot_mode == 0 and current_player.col_stuart_right_orbit_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_right_orbit_first_hit
    - col_stuart_disable_all_shots
    - col_stuart_enable_right_orbit
    - col_stuart_flash_right_orbit
    - col_stuart_update_remaining|20ms

  # ------------------------------------------------------------
  # REPEAT-LAST-SHOT PHASE
  # VPW odd progress:
  #   only the last shot is lit.
  #   hitting it confirms that shot and returns to all unhit shots.
  # ------------------------------------------------------------
  col_stuart_left_orbit_hit{current_player.col_stuart_shot_mode == 1 and current_player.col_stuart_last_shot == 1 and current_player.col_stuart_result_started == 0}:
    - col_stuart_left_orbit_confirmed
    - col_stuart_disable_all_shots
    - col_stuart_flash_left_orbit
    - col_stuart_after_confirmed|20ms

  col_stuart_left_ramp_hit{current_player.col_stuart_shot_mode == 1 and current_player.col_stuart_last_shot == 2 and current_player.col_stuart_result_started == 0}:
    - col_stuart_left_ramp_confirmed
    - col_stuart_disable_all_shots
    - col_stuart_flash_left_ramp
    - col_stuart_after_confirmed|20ms

  col_stuart_right_ramp_hit{current_player.col_stuart_shot_mode == 1 and current_player.col_stuart_last_shot == 3 and current_player.col_stuart_result_started == 0}:
    - col_stuart_right_ramp_confirmed
    - col_stuart_disable_all_shots
    - col_stuart_flash_right_ramp
    - col_stuart_after_confirmed|20ms

  col_stuart_upper_loop_hit{current_player.col_stuart_shot_mode == 1 and current_player.col_stuart_last_shot == 4 and current_player.col_stuart_result_started == 0}:
    - col_stuart_upper_loop_confirmed
    - col_stuart_disable_all_shots
    - col_stuart_flash_upper_loop
    - col_stuart_after_confirmed|20ms

  col_stuart_right_orbit_hit{current_player.col_stuart_shot_mode == 1 and current_player.col_stuart_last_shot == 5 and current_player.col_stuart_result_started == 0}:
    - col_stuart_right_orbit_confirmed
    - col_stuart_disable_all_shots
    - col_stuart_flash_right_orbit
    - col_stuart_after_confirmed|20ms

  col_stuart_after_confirmed{current_player.col_stuart_progress >= 6}:
    - col_stuart_check_complete

  col_stuart_after_confirmed{current_player.col_stuart_progress < 6}:
    - col_stuart_enable_all_remaining

  # ------------------------------------------------------------
  # ENABLE ALL UNHIT SHOTS
  # ------------------------------------------------------------
  col_stuart_enable_all_remaining{current_player.col_stuart_left_orbit_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_enable_left_orbit

  col_stuart_enable_all_remaining{current_player.col_stuart_left_ramp_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_enable_left_ramp

  col_stuart_enable_all_remaining{current_player.col_stuart_right_ramp_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_enable_right_ramp

  col_stuart_enable_all_remaining{current_player.col_stuart_upper_loop_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_enable_upper_loop

  col_stuart_enable_all_remaining{current_player.col_stuart_right_orbit_done == 0 and current_player.col_stuart_result_started == 0}:
    - col_stuart_enable_right_orbit

  # ------------------------------------------------------------
  # BALL SAVE FEEDBACK
  # ------------------------------------------------------------
  ball_save_col_stuart_start_save_saving_ball:
    - ball_save_saving_ball

  ball_save_col_stuart_complete_save_saving_ball:
    - ball_save_saving_ball

# ------------------------------------------------------------
# VARIABLE PLAYER
# Stores Stuart progress, last-shot state, result state,
# completion lockout, and Godot/result display values.
#
# col_stuart_shot_mode:
#   0 = all unhit shots lit
#   1 = repeat last shot only
#
# col_stuart_last_shot:
#   0 = none
#   1 = left orbit
#   2 = left ramp
#   3 = right ramp / air duct
#   4 = upper loop
#   5 = right orbit
# ------------------------------------------------------------
variable_player:

  # ------------------------------------------------------------
  # RESET / START STATE
  # ------------------------------------------------------------
  col_stuart_reset:
    villain_mode_running:
      action: set
      int: 1
    col_stuart_progress:
      action: set
      int: 0
    col_stuart_remaining:
      action: set
      int: 6
    col_stuart_shot_mode:
      action: set
      int: 0
    col_stuart_last_shot:
      action: set
      int: 0
    col_stuart_result_started:
      action: set
      int: 0
    col_stuart_result_display:
      action: set
      int: 0
    col_stuart_left_orbit_done:
      action: set
      int: 0
    col_stuart_left_ramp_done:
      action: set
      int: 0
    col_stuart_right_ramp_done:
      action: set
      int: 0
    col_stuart_upper_loop_done:
      action: set
      int: 0
    col_stuart_right_orbit_done:
      action: set
      int: 0
    col_stuart_villain_score:
      action: set
      int: 500000

  mode_col_stuart_diehard_started{current_player.playfield_multiplier == None}:
    playfield_multiplier:
      action: set
      int: 1

  timer_col_stuart_diehard_timer_tick:
    col_stuart_time:
      action: set
      int: ticks

  col_stuart_update_remaining:
    col_stuart_remaining:
      action: set
      int: "6 - current_player.col_stuart_progress"

  # ------------------------------------------------------------
  # ALL-SHOTS PHASE HIT VARIABLES
  # These do NOT mark the shot done yet.
  # They only set the last shot and move into repeat-last-shot mode.
  # ------------------------------------------------------------
  col_stuart_left_orbit_first_hit:
    score:
      action: add
      int: "1000000 * current_player.playfield_multiplier"
    col_stuart_villain_score:
      action: add
      int: 1000000
    col_stuart_progress:
      action: add
      int: 1
    col_stuart_last_shot:
      action: set
      int: 1
    col_stuart_shot_mode:
      action: set
      int: 1

  col_stuart_left_ramp_first_hit:
    score:
      action: add
      int: "1000000 * current_player.playfield_multiplier"
    col_stuart_villain_score:
      action: add
      int: 1000000
    col_stuart_progress:
      action: add
      int: 1
    col_stuart_last_shot:
      action: set
      int: 2
    col_stuart_shot_mode:
      action: set
      int: 1

  col_stuart_right_ramp_first_hit:
    score:
      action: add
      int: "1000000 * current_player.playfield_multiplier"
    col_stuart_villain_score:
      action: add
      int: 1000000
    col_stuart_progress:
      action: add
      int: 1
    col_stuart_last_shot:
      action: set
      int: 3
    col_stuart_shot_mode:
      action: set
      int: 1

  col_stuart_upper_loop_first_hit:
    score:
      action: add
      int: "1000000 * current_player.playfield_multiplier"
    col_stuart_villain_score:
      action: add
      int: 1000000
    col_stuart_progress:
      action: add
      int: 1
    col_stuart_last_shot:
      action: set
      int: 4
    col_stuart_shot_mode:
      action: set
      int: 1

  col_stuart_right_orbit_first_hit:
    score:
      action: add
      int: "1000000 * current_player.playfield_multiplier"
    col_stuart_villain_score:
      action: add
      int: 1000000
    col_stuart_progress:
      action: add
      int: 1
    col_stuart_last_shot:
      action: set
      int: 5
    col_stuart_shot_mode:
      action: set
      int: 1

  # ------------------------------------------------------------
  # REPEAT-LAST-SHOT CONFIRM VARIABLES
  # These mark the shot done and return to all-unhit mode.
  # ------------------------------------------------------------
  col_stuart_left_orbit_confirmed:
    score:
      action: add
      int: "1000000 * current_player.playfield_multiplier"
    col_stuart_villain_score:
      action: add
      int: 1000000
    col_stuart_progress:
      action: add
      int: 1
    col_stuart_left_orbit_done:
      action: set
      int: 1
    col_stuart_shot_mode:
      action: set
      int: 0

  col_stuart_left_ramp_confirmed:
    score:
      action: add
      int: "1000000 * current_player.playfield_multiplier"
    col_stuart_villain_score:
      action: add
      int: 1000000
    col_stuart_progress:
      action: add
      int: 1
    col_stuart_left_ramp_done:
      action: set
      int: 1
    col_stuart_shot_mode:
      action: set
      int: 0

  col_stuart_right_ramp_confirmed:
    score:
      action: add
      int: "1000000 * current_player.playfield_multiplier"
    col_stuart_villain_score:
      action: add
      int: 1000000
    col_stuart_progress:
      action: add
      int: 1
    col_stuart_right_ramp_done:
      action: set
      int: 1
    col_stuart_shot_mode:
      action: set
      int: 0

  col_stuart_upper_loop_confirmed:
    score:
      action: add
      int: "1000000 * current_player.playfield_multiplier"
    col_stuart_villain_score:
      action: add
      int: 1000000
    col_stuart_progress:
      action: add
      int: 1
    col_stuart_upper_loop_done:
      action: set
      int: 1
    col_stuart_shot_mode:
      action: set
      int: 0

  col_stuart_right_orbit_confirmed:
    score:
      action: add
      int: "1000000 * current_player.playfield_multiplier"
    col_stuart_villain_score:
      action: add
      int: 1000000
    col_stuart_progress:
      action: add
      int: 1
    col_stuart_right_orbit_done:
      action: set
      int: 1
    col_stuart_shot_mode:
      action: set
      int: 0

  # ------------------------------------------------------------
  # RESULT START VARIABLES
  # Godot can use col_stuart_result_display later.
  #   1 = defeated
  #   2 = escaped/lost
  # ------------------------------------------------------------
  col_stuart_defeated_slide:
    col_stuart_result_started:
      action: set
      int: 1
    col_stuart_result_display:
      action: set
      int: 1

  col_stuart_escaped_slide:
    col_stuart_result_started:
      action: set
      int: 1
    col_stuart_result_display:
      action: set
      int: 2

  # ------------------------------------------------------------
  # FINAL COMPLETE / FAIL VARIABLES
  # Complete locks him out.
  # Fail does NOT lock him out.
  # ------------------------------------------------------------
  col_stuart_score_complete:
    score:
      action: add
      int: "3000000 * current_player.playfield_multiplier"
    col_stuart_villain_score:
      action: add
      int: 3000000

  col_stuart_diehard_completed:
    col_stuart_complete:
      action: set
      int: 1
    col_stuart_diehard_complete:
      action: set
      int: 1
    modes_complete:
      action: add
      int: 1
    villains_completed:
      action: add
      int: 1
    col_stuart_result_started:
      action: set
      int: 0

  col_stuart_diehard_failed:
    col_stuart_result_started:
      action: set
      int: 0

  mode_col_stuart_diehard_stopping:
    villain_mode_running:
      action: set
      int: 0
    col_stuart_result_started:
      action: set
      int: 0
    col_stuart_shot_mode:
      action: set
      int: 0

# ------------------------------------------------------------
# LIGHT PLAYER
# Main mode lighting and final insert state.
# ------------------------------------------------------------
light_player:

  mode_col_stuart_diehard_started:
    GI:
      color: 0044ff
    SPOTS:
      color: 202050
    SPOTS_BUMPER:
      color: 101040
    l1000:
      color: 0044ff
    l1001:
      color: 0044ff
    l44:
      color: 0044ff

  col_stuart_diehard_completed:
    l1000: off
    l1001: off
    l20: off
    l21: off
    l22: off
    l23: off
    l24: off
    l44:
      color: 0044ff
    l14:
      color: 0044ff
    l15:
      color: 0044ff

  col_stuart_diehard_failed:
    l1000: off
    l1001: off
    l20: off
    l21: off
    l22: off
    l23: off
    l24: off

# ------------------------------------------------------------
# SHOWS
# Simple local flashes only.
# No l80, l81, l82, or l83.
# ------------------------------------------------------------
shows:

  col_stuart_flash_insert:
    - duration: 150ms
      lights:
        (led): (color)
    - duration: 150ms
      lights:
        (led): off

  col_stuart_hit_flashers:
    - duration: 80ms
      lights:
        f140: 0044ff
        f141: 0044ff
        f142: 0044ff
        f143: 0044ff
        f144: 0044ff
        f145: 0044ff
        f146: 0044ff
        f147: 0044ff
    - duration: 80ms
      lights:
        f140: off
        f141: off
        f142: off
        f143: off
        f144: off
        f145: off
        f146: off
        f147: off

# ------------------------------------------------------------
# SHOW PLAYER
# Handles lit shot flashing and hit feedback.
# ------------------------------------------------------------
show_player:

  # ------------------------------------------------------------
  # LIT SHOT FLASHES
  # ------------------------------------------------------------
  col_stuart_enable_left_orbit:
    col_stuart_left_orbit_flash:
      show: col_stuart_flash_insert
      loops: -1
      speed: 3
      priority: 700
      show_tokens:
        led: l20
        color: yellow

  col_stuart_disable_left_orbit:
    col_stuart_left_orbit_flash:
      action: stop

  col_stuart_enable_left_ramp:
    col_stuart_left_ramp_flash:
      show: col_stuart_flash_insert
      loops: -1
      speed: 3
      priority: 700
      show_tokens:
        led: l21
        color: yellow

  col_stuart_disable_left_ramp:
    col_stuart_left_ramp_flash:
      action: stop

  col_stuart_enable_right_ramp:
    col_stuart_right_ramp_flash:
      show: col_stuart_flash_insert
      loops: -1
      speed: 3
      priority: 700
      show_tokens:
        led: l24
        color: yellow

  col_stuart_disable_right_ramp:
    col_stuart_right_ramp_flash:
      action: stop

  col_stuart_enable_upper_loop:
    col_stuart_upper_loop_flash:
      show: col_stuart_flash_insert
      loops: -1
      speed: 3
      priority: 700
      show_tokens:
        led: l23
        color: yellow

  col_stuart_disable_upper_loop:
    col_stuart_upper_loop_flash:
      action: stop

  col_stuart_enable_right_orbit:
    col_stuart_right_orbit_flash:
      show: col_stuart_flash_insert
      loops: -1
      speed: 3
      priority: 700
      show_tokens:
        led: l22
        color: yellow

  col_stuart_disable_right_orbit:
    col_stuart_right_orbit_flash:
      action: stop

  col_stuart_disable_all_shots:
    col_stuart_left_orbit_flash:
      action: stop
    col_stuart_left_ramp_flash:
      action: stop
    col_stuart_right_ramp_flash:
      action: stop
    col_stuart_upper_loop_flash:
      action: stop
    col_stuart_right_orbit_flash:
      action: stop

  # ------------------------------------------------------------
  # HIT FEEDBACK
  # ------------------------------------------------------------
  col_stuart_flash_left_orbit:
    col_stuart_hit_flashers:
      loops: 1
      priority: 800

  col_stuart_flash_left_ramp:
    col_stuart_hit_flashers:
      loops: 1
      priority: 800

  col_stuart_flash_right_ramp:
    col_stuart_hit_flashers:
      loops: 1
      priority: 800

  col_stuart_flash_upper_loop:
    col_stuart_hit_flashers:
      loops: 1
      priority: 800

  col_stuart_flash_right_orbit:
    col_stuart_hit_flashers:
      loops: 1
      priority: 800

  # ------------------------------------------------------------
  # BALL SAVE LIGHTS
  # ------------------------------------------------------------
  ball_save_col_stuart_start_save_enabled:
    flash_color:
      key: col_stuart_start_save_flash
      loops: -1
      speed: 8
      show_tokens:
        lights: BALL_SAVE
        color: 0044ff

  ball_save_col_stuart_start_save_disabled:
    col_stuart_start_save_flash:
      action: stop

  ball_save_col_stuart_complete_save_enabled:
    flash_color:
      key: col_stuart_complete_save_flash
      loops: -1
      speed: 8
      show_tokens:
        lights: BALL_SAVE
        color: yellow

  ball_save_col_stuart_complete_save_disabled:
    col_stuart_complete_save_flash:
      action: stop

# ------------------------------------------------------------
# SOUND PLAYER
# Godot/background can be added later.
# This just posts your music event now.
# ------------------------------------------------------------
sound_player:

  col_stuart_music_start:
    col_stuart_music:
      key: main_music
      action: play
      loops: -1
      volume: 0.8

  col_stuart_diehard_completed:
    col_stuart_music:
      key: main_music
      action: stop

  col_stuart_diehard_failed:
    col_stuart_music:
      key: main_music
      action: stop

  ball_ended:
    col_stuart_music:
      key: main_music
      action: stop