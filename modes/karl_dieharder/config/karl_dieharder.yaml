#config_version=6

# =====================================================================
# KARL DIE HARDER
# =====================================================================
#
# VPW-style Karl:
#   Spinner = +1 damage
#   Pop bumper = +5 damage
#   Complete at 100 damage
#   Normal timer = 90 seconds
#   Hans Bonus timer = 120 seconds
#
# Project rules:
#   Karl is only blocked after completion, not fail.
#   Shared cap/gate is karl_complete.
#   Ball lost / timer fail disables flippers and plays KarlPlayerDied.
#   Defeated uses the same Karl defeated slide/video as Karl Die Hard.
#   Completion posts count_karl_for_extra_ball.
#   Completion sets karl_bonus and bonus_multiplier = 6.
#   Completion ball save = 5 seconds.
#   No l80/l81/l82/l83.
# =====================================================================


# =====================================================================
# MODE
# =====================================================================

mode:
  start_events:
    - start_karl_dieharder{current_player.karl_complete==0}
  stop_events:
    - karl_dieharder_won_complete
    - karl_dieharder_failed_complete
  priority: 170


# =====================================================================
# TIMERS
# =====================================================================

timers:
  karl_dieharder_timer:
    start_value: 90
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: karl_dieharder_start_normal_timer
        action: restart
        value: 90
      - event: karl_dieharder_start_hans_bonus_timer
        action: restart
        value: 120
      - event: karl_dieharder_won_complete
        action: stop
      - event: karl_dieharder_failed_complete
        action: stop
      - event: add_villain_time_from_mystery
        action: add
        value: 20


# =====================================================================
# BALL SAVES
# =====================================================================

ball_saves:
  karl_dieharder_start_save:
    active_time: 2s
    hurry_up_time: 0s
    grace_period: 0s
    auto_launch: true
    balls_to_save: 1
    enable_events:
      - mode_karl_dieharder_started
    disable_events:
      - karl_dieharder_fail_mode
      - karl_dieharder_complete
      - mode_karl_dieharder_stopping

  karl_dieharder_complete_save:
    active_time: 5s
    hurry_up_time: 1s
    grace_period: 1s
    auto_launch: true
    balls_to_save: 1
    enable_events:
      - karl_dieharder_complete
    disable_events:
      - mode_karl_dieharder_stopping


# =====================================================================
# EVENT PLAYER
# =====================================================================

event_player:
  mode_karl_dieharder_started:
    - villain_mode_started
    - karl_dieharder_music_start
    - karl_dieharder_show_timer
    - karl_dieharder_message_start
    - nakatomi_entrance_lock_close
    - release_villain_select_vuk
    - wire_ramp_exit_open
    - reset_bullet_total
    - reset_bullets
    - karl_dieharder_reset_mode
    - karl_dieharder_start_normal_timer{current_player.hans_bonus != 1}
    - karl_dieharder_start_hans_bonus_timer{current_player.hans_bonus == 1}

  mode_karl_dieharder_stopping:
    - villain_mode_stopped
    - enable_karl_dieharder_flippers
    - wire_ramp_exit_closed
    - karl_dieharder_cleanup

  SpinnerLeft_active{current_player.villain_mode_running==1 and current_player.karl_dieharder_failed_active==0 and current_player.karl_dieharder_completion_active==0 and current_player.karl_damage<100}:
    - karl_dieharder_spinner_hit
    - karl_dieharder_check_complete|20ms

  SpinnerRight_active{current_player.villain_mode_running==1 and current_player.karl_dieharder_failed_active==0 and current_player.karl_dieharder_completion_active==0 and current_player.karl_damage<100}:
    - karl_dieharder_spinner_hit
    - karl_dieharder_check_complete|20ms

  s_popbumper_left_active{current_player.villain_mode_running==1 and current_player.karl_dieharder_failed_active==0 and current_player.karl_dieharder_completion_active==0 and current_player.karl_damage<100}:
    - karl_dieharder_pop_hit
    - karl_dieharder_check_complete|20ms

  s_popbumper_right_active{current_player.villain_mode_running==1 and current_player.karl_dieharder_failed_active==0 and current_player.karl_dieharder_completion_active==0 and current_player.karl_damage<100}:
    - karl_dieharder_pop_hit
    - karl_dieharder_check_complete|20ms

  karl_dieharder_check_complete{current_player.karl_damage>=100 and current_player.karl_dieharder_failed_active==0 and current_player.karl_dieharder_completion_active==0}:
    - karl_dieharder_complete

  karl_dieharder_complete:
    - karl_dieharder_completed_slide|4s
    - karl_dieharder_won_complete|8s
    - reset_bullet_total
    - reset_bullets

  timer_karl_dieharder_timer_complete{current_player.karl_dieharder_failed_active==0 and current_player.karl_dieharder_completion_active==0}:
    - karl_dieharder_fail_mode
    - karl_dieharder_failed_complete|4s
    - reset_bullet_total
    - reset_bullets

  ball_drain{current_player.villain_mode_running==1 and current_player.karl_dieharder_failed_active==0 and current_player.karl_dieharder_completion_active==0}:
    - karl_dieharder_fail_mode
    - karl_dieharder_failed_complete|4s
    - reset_bullet_total
    - reset_bullets

  ball_drain{current_player.karl_dieharder_completion_active==1}:
    - reset_bullet_total
    - reset_bullets

  ball_drain{current_player.karl_dieharder_failed_active==1}:
    - karl_dieharder_failed_complete|4s

  karl_dieharder_won_complete:
    - reset_bullet_total
    - reset_bullets
    - count_karl_for_extra_ball

  karl_dieharder_failed_complete:
    - reset_bullet_total
    - reset_bullets


# =====================================================================
# VARIABLE PLAYER
# =====================================================================

variable_player:
  mode_karl_dieharder_started:
    villain_mode_running:
      action: set
      int: 1
    karl_dieharder_completion_active:
      action: set
      int: 0
    karl_dieharder_failed_active:
      action: set
      int: 0
    karl_damage:
      action: set
      int: 0
    karl_health_display:
      action: set
      int: 0
    karl_result_display:
      action: set
      int: 0
    karl_result_started:
      action: set
      int: 0
    karl_dieharder_time:
      action: set
      int: 90
    karl_hans_bonus_active:
      action: set
      int: 0
    karl_villain_score:
      action: set
      int: 500000

  mode_karl_dieharder_started{current_player.hans_bonus==1}:
    karl_hans_bonus_active:
      action: set
      int: 1
    karl_dieharder_time:
      action: set
      int: 120

  mode_karl_dieharder_started{current_player.hans_bonus!=1}:
    karl_hans_bonus_active:
      action: set
      int: 0
    karl_dieharder_time:
      action: set
      int: 90

  mode_karl_dieharder_started{current_player.playfield_multiplier == None}:
    playfield_multiplier:
      action: set
      int: 1

  karl_dieharder_reset_mode:
    karl_dieharder_completion_active:
      action: set
      int: 0
    karl_dieharder_failed_active:
      action: set
      int: 0
    karl_damage:
      action: set
      int: 0
    karl_health_display:
      action: set
      int: 0
    karl_result_display:
      action: set
      int: 0
    karl_result_started:
      action: set
      int: 0

  timer_karl_dieharder_timer_tick:
    karl_dieharder_time:
      action: set
      int: ticks

  karl_dieharder_spinner_hit:
    karl_damage:
      action: add
      int: 1
    karl_health_display:
      action: set
      int: "(current_player.karl_damage + 1)"
    score:
      action: add
      int: "(90000 * current_player.playfield_multiplier)"
    karl_villain_score:
      action: add
      int: "(90000 * current_player.playfield_multiplier)"

  karl_dieharder_pop_hit:
    karl_damage:
      action: add
      int: 5
    karl_health_display:
      action: set
      int: "(current_player.karl_damage + 5)"
    score:
      action: add
      int: "(450000 * current_player.playfield_multiplier)"
    karl_villain_score:
      action: add
      int: "(450000 * current_player.playfield_multiplier)"

  karl_dieharder_complete:
    karl_dieharder_completion_active:
      action: set
      int: 1
    karl_result_started:
      action: set
      int: 1
    karl_result_display:
      action: set
      int: 1
    karl_health_display:
      action: set
      int: 100

  karl_dieharder_won_complete{current_player.karl_complete==0}:
    score:
      action: add
      int: "(3000000 * current_player.playfield_multiplier)"
    karl_villain_score:
      action: add
      int: "(3000000 * current_player.playfield_multiplier)"
    karl_complete:
      action: set
      int: 1
    karl_dieharder_complete:
      action: set
      int: 1
    karl_bonus:
      action: set
      int: 1
    bonus_multiplier:
      action: set
      int: 6
    eob_bonus_villains:
      action: add
      int: 1000000

  karl_dieharder_fail_mode:
    karl_dieharder_failed_active:
      action: set
      int: 1
    karl_result_started:
      action: set
      int: 1
    karl_result_display:
      action: set
      int: 3

  karl_dieharder_failed_complete:
    karl_dieharder_failed:
      action: set
      int: 1

  mode_karl_dieharder_stopping:
    villain_mode_running:
      action: set
      int: 0
    karl_dieharder_completion_active:
      action: set
      int: 0
    karl_dieharder_failed_active:
      action: set
      int: 0
    karl_hans_bonus_active:
      action: set
      int: 0



# =====================================================================
# SHOW PLAYER
# =====================================================================

show_player:
  ball_save_karl_dieharder_start_save_enabled:
    flash_color:
      key: karl_dieharder_start_save_flash
      loops: -1
      speed: 8
      show_tokens:
        lights: BALL_SAVE
        color: ff8800

  ball_save_karl_dieharder_start_save_disabled:
    karl_dieharder_start_save_flash:
      action: stop

  ball_save_karl_dieharder_complete_save_enabled:
    flash_color_with_fade:
      key: karl_dieharder_ball_save_flash
      loops: -1
      speed: 2
      show_tokens:
        lights: BALL_SAVE
        color: ffff00
        fade: 500

  ball_save_karl_dieharder_complete_save_hurry_up:
    flash_color:
      key: karl_dieharder_ball_save_flash
      loops: -1
      speed: 7
      show_tokens:
        lights: BALL_SAVE
        color: ffff00

  ball_save_karl_dieharder_complete_save_disabled:
    flash_color_with_fade:
      action: stop
      key: karl_dieharder_ball_save_flash
    flash_color:
      action: stop
      key: karl_dieharder_ball_save_flash

  # ------------------------------------------------------------
  # KARL DIE HARDER HIT FEEDBACK
  # Matches Karl Die Hard VPW-style damage pulse.
  # Pop hits also flash bumper spots in their normal colour and
  # give GI a quick white flash/fade.
  # ------------------------------------------------------------
  karl_dieharder_spinner_hit:
    karl_vpw_damage_pulse:
      key: key_karl_dieharder_spinner_damage_pulse
      loops: 1
      speed: 1
      priority: 900

  karl_dieharder_pop_hit:
    karl_vpw_damage_pulse:
      key: key_karl_dieharder_pop_damage_pulse
      loops: 2
      speed: 1
      priority: 920

    flash_color:
      key: key_karl_dieharder_pop_bumper_flash
      loops: 3
      speed: 10
      priority: 950
      show_tokens:
        lights: SPOTS_BUMPER
        color: 969650

    flash_color_with_fade:
      key: key_karl_dieharder_pop_gi_flash
      loops: 1
      speed: 8
      priority: 940
      show_tokens:
        lights: GI
        color: ffffff
        fade: 150

  mode_karl_dieharder_started:
    flash_color:
      key: karl_dieharder_gruber_flash
      priority: 160
      loops: -1
      speed: 6
      show_tokens:
        lights: l40
        color: ff8800

  karl_dieharder_fail_mode:
    karl_dieharder_start_save_flash:
      action: stop
    flash_color_with_fade:
      action: stop
      key: karl_dieharder_ball_save_flash
    flash_color:
      action: stop
      key: karl_dieharder_ball_save_flash
    key_karl_dieharder_spinner_damage_pulse:
      action: stop
    key_karl_dieharder_pop_damage_pulse:
      action: stop
    key_karl_dieharder_pop_bumper_flash:
      action: stop
    key_karl_dieharder_pop_gi_flash:
      action: stop
    karl_dieharder_gruber_flash:
      action: stop

  karl_dieharder_complete:
    karl_dieharder_start_save_flash:
      action: stop
    key_karl_dieharder_spinner_damage_pulse:
      action: stop
    key_karl_dieharder_pop_damage_pulse:
      action: stop
    key_karl_dieharder_pop_bumper_flash:
      action: stop
    key_karl_dieharder_pop_gi_flash:
      action: stop
    karl_dieharder_gruber_flash:
      action: stop

  mode_karl_dieharder_stopping:
    karl_dieharder_start_save_flash:
      action: stop
    flash_color_with_fade:
      action: stop
      key: karl_dieharder_ball_save_flash
    flash_color:
      action: stop
      key: karl_dieharder_ball_save_flash
    key_karl_dieharder_spinner_damage_pulse:
      action: stop
    key_karl_dieharder_pop_damage_pulse:
      action: stop
    key_karl_dieharder_pop_bumper_flash:
      action: stop
    key_karl_dieharder_pop_gi_flash:
      action: stop
    karl_dieharder_gruber_flash:
      action: stop

# =====================================================================
# LIGHT PLAYER
# =====================================================================

light_player:
  mode_karl_dieharder_started:
    GI:
      color: ff8800
    SPOTS:
      color: 505050
    l40:
      color: ff8800
    l1000:
      color: ff8800
    l1001:
      color: ff8800

  karl_dieharder_fail_mode:
    GI: off
    SPOTS: off
    l40: off
    l1000: off
    l1001: off

  karl_dieharder_won_complete:
    l1000: off
    l1001: off
    l40:
      color: ff8800

  karl_dieharder_failed_complete:
    l1000: off
    l1001: off

  mode_karl_dieharder_stopping:
    l40: off
    l1000: off
    l1001: off


# =====================================================================
# COIL PLAYER
# =====================================================================

coil_player:
  karl_dieharder_fail_mode:
    c_right_flipper_main: disable
    c_left_flipper_main: disable

  enable_karl_dieharder_flippers:
    c_left_flipper_main: enable
    c_right_flipper_main: enable


# =====================================================================
# SLIDE PLAYER
# =====================================================================

slide_player:
  mode_karl_dieharder_started:
    karl_dieharder_background:
      action: play
      expire: 0s
      priority: 500

  mode_karl_dieharder_stopping:
    karl_dieharder_background:
      action: remove

  karl_dieharder_completed_slide:
    karl_dieharder_background:
      action: remove
    karl_defeated:
      action: play
      expire: 7s
      priority: 10000

  karl_dieharder_fail_mode:
    karl_dieharder_background:
      action: remove
    karl_player_died:
      action: play
      expire: 5s
      priority: 10000


# =====================================================================
# WIDGET PLAYER
# =====================================================================

widget_player:
  mode_karl_dieharder_started:
    karl_progress_widget:
      slide: karl_dieharder_background
      action: play

  mode_karl_dieharder_stopping:
    karl_progress_widget:
      action: remove

  karl_dieharder_won_complete:
    karl_progress_widget:
      action: remove

  karl_dieharder_failed_complete:
    karl_progress_widget:
      action: remove


# =====================================================================
# SOUND PLAYER
# =====================================================================

sound_player:
  karl_dieharder_music_start:
    karltheme:
      key: main_music
      action: play
      loops: -1
      volume: 0.8

  mode_karl_dieharder_stopping:
    karltheme:
      key: main_music
      action: stop