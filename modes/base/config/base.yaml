#config_version=6

mode:
  start_events: ball_started
  stop_events: ball_ended
  priority: 100


ball_holds:
  villain_hold:
    enable_events: villain_start_lit
    disable_events:
      - ball_ended
      - villain_mode_started
    hold_devices: rightvuk
    balls_to_hold: 1
    release_all_events:
      - tilt
      - ball_ended
      - villain_mode_started
      - start_hans_diehard
      - start_hans_dieharder
      - start_katya_diehard
      - start_katya_dieharder
      - start_karl_diehard
      - start_karl_dieharder
      - start_simon_diehard
      - start_simon_dieharder
      - start_col_diehard
      - start_col_dieharder



ball_saves: 
  one:
    active_time: 5000ms
    grace_period: 2000ms
    hurry_up_time: 3000ms
    enable_events: ball_save_one
    auto_launch: true
    balls_to_save: -1
  two:
    active_time: 7000ms
    grace_period: 2000ms
    hurry_up_time: 3000ms
    enable_events: ball_save_two
    auto_launch: true
    balls_to_save: -1
  three:
    active_time: 10000ms
    grace_period: 2000ms
    hurry_up_time: 3000ms
    enable_events: ball_save_three
    auto_launch: true
    balls_to_save: -1

event_player: 
  s_popbumper_left_active:
    - flash_bumper_left
    - flash_bumper_explosion
  s_popbumper_right_active:
    - flash_bumper_right
    - flash_bumper_explosion
  ball_save_one_saving_ball:
