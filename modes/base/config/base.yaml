  ball_save_three_saving_ball:
    - ball_save_saving_ball
  ball_save_holly_saving_ball:
    - ball_save_saving_ball
  s_air_duct_active:
    - show_airduct
    - show_airduct2
  villain_mode_started:
    - stop_base_music
  start_airplane_multiball:
    - stop_base_music


