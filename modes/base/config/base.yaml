#config_version=6
# ------------------------------------------------------------
# BASE
# ------------------------------------------------------------
# What this mode does:
#   - Runs during normal gameplay.
#   - Holds the ball at the right VUK when villain start is lit.
#   - Runs base ball saves, base music, base slide, and playfield effects.
#   - Stops base music and slide when villain/multiball/Ambush modes take over.
#   - Restores completed villain and multiball inserts.
#   - Plays VPW-style Player 2/3/4 added sound and posts Godot turn screen events.
# ------------------------------------------------------------
mode:
  start_events: ball_started
  stop_events: ball_ended
  priority: 100
# ------------------------------------------------------------
# BALL HOLDS
# ------------------------------------------------------------
# Holds the ball at the right VUK when villain start is lit
# or when Yippee Ki Yay Wizard is ready.
# The ball is NOT released when the villain/wizard start event posts.
# It only releases after the intro/Godot flow posts
# release_villain_select_vuk.
# ------------------------------------------------------------
ball_holds:
  villain_hold:
    enable_events:
      - villain_start_lit
      - yippee_ki_yay_wizard_ready
    disable_events:
      - ball_ended
      - tilt
      - release_villain_select_vuk
    hold_devices: rightvuk
    balls_to_hold: 1
    release_all_events:
      - tilt
      - ball_ended
      - release_villain_select_vuk
# ------------------------------------------------------------
# BALL SAVES
# ------------------------------------------------------------
# Base ball save awards:
#   one   = 5 seconds
#   two   = 7 seconds
#   three = 10 seconds
# ------------------------------------------------------------
ball_saves:
  one:
    active_time: 5000ms
    grace_period: 2000ms
    hurry_up_time: 3000ms
    enable_events: ball_save_one
    auto_launch: true
    balls_to_save: -1
  two:
    active_time: 7000ms
    grace_period: 2000ms
    hurry_up_time: 3000ms
    enable_events: ball_save_two
    auto_launch: true
    balls_to_save: -1
  three:
    active_time: 10000ms
    grace_period: 2000ms
    hurry_up_time: 3000ms
    enable_events: ball_save_three
    auto_launch: true
    balls_to_save: -1
# ------------------------------------------------------------
# EVENT PLAYER
# ------------------------------------------------------------
# Handles base playfield events, ball save feedback, air duct
# feedback, player added / turn screen events, stopping base music,
# and resuming base music.
# ------------------------------------------------------------
