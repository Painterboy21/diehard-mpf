# ------------------------------------------------------------
# TIMERS
# ------------------------------------------------------------
# Five seconds to make another full loop and keep the streak alive.
# ------------------------------------------------------------
timers:
  loop_combo_timer:
    start_value: 0
    end_value: 5
    direction: up
    tick_interval: 1s
    control_events:
      - event: full_loop_hit
        action: restart
      - event: loop_streak_reset
        action: stop
# ------------------------------------------------------------
# SEQUENCE SHOTS
# ------------------------------------------------------------
# Left and right orbit switch sequences.
# ------------------------------------------------------------
sequence_shots:
  left_orbit:
    switch_sequence:
      - s_left_orbit
      - s_left_orbit2
    sequence_timeout: 1000ms
  right_orbit:
    switch_sequence:
      - s_right_orbit
      - s_right_orbit2
    sequence_timeout: 1000ms
  right_full_loop:
    switch_sequence:
      - s_right_orbit
      - s_right_orbit2
      - s_left_orbit2
      - s_left_orbit
    sequence_timeout: 3000ms
  left_full_loop:
    switch_sequence:
      - s_left_orbit
      - s_left_orbit2
      - s_right_orbit2
      - s_right_orbit
    sequence_timeout: 3000ms
# ------------------------------------------------------------
# SHOTS
# ------------------------------------------------------------
# Shoot again insert for base ball saves.
# ------------------------------------------------------------
shots:
  shoot_again:
    profile: shoot_again
    show_tokens:
      color: ff0000
    enable_events: ball_save_one_enabled, ball_save_two_enabled, ball_save_three_enabled, ball_save_holly_enabled
    disable_events: ball_save_one_grace_period, ball_save_two_grace_period, ball_save_three_grace_period, ball_save_holly_grace_period
    control_events:
      - events: ball_save_one_hurry_up, ball_save_two_hurry_up, ball_save_three_hurry_up, ball_save_holly_hurry_up
        state: 1
