#config_version=6

# ------------------------------------------------------------
# HIGH SCORE MODE
# ------------------------------------------------------------
# VPW-style high score entry.
#
# This mode gives us the normal MPF initials-entry screen.
# Normal score top 3 stays separate from the machine-record initials trigger.
# ------------------------------------------------------------
mode:
  code: mpf.modes.high_score.code.high_score.HighScore
  start_events:
    - game_ending
    - start_high_score
  stop_events:
    - high_score_complete
  priority: 1500
  game_mode: false
  use_wait_queue: true

# ------------------------------------------------------------
# TEXT INPUT CONTROLS
# ------------------------------------------------------------
# Flippers move through the initials keyboard.
# Start/fire/action/plunger select the current letter, END, or DEL.
# ------------------------------------------------------------
event_player:
  s_left_flipper_active:
    text_input:
      action: left
  s_right_flipper_active:
    text_input:
      action: right
  s_start_active:
    text_input:
      action: select
  s_fire_active:
    text_input:
      action: select
  s_actionbtn_active:
    text_input:
      action: select
  s_plunger_key_active:
    text_input:
      action: select

# ------------------------------------------------------------
# HIGH SCORE SETTINGS
# ------------------------------------------------------------
# score:
#   Your normal local top 3.
#
# machine_record_initials_score:
#   Hidden/local trigger category.
#   This still lets Loop Champion, Multiball Hero, Villain MVP,
#   or iScored force the normal initials screen.
# ------------------------------------------------------------
high_score:
  _overwrite: true
  reset_high_scores_events:
    - reset_local_high_scores
  categories:
    score:
      - YIPPIE KI YAY CHAMPION
      - DETECTIVE LIEUTENANT
      - BEAT COP
    machine_record_initials_score:
      - MACHINE RECORD
  defaults:
    score:
      - VPX: 50
      - VPX: 30
      - VPX: 10
    machine_record_initials_score:
      - VPX: 0
  enter_initials_timeout: 90000ms
  award_slide_display_time: 3000ms

# ------------------------------------------------------------
# SLIDE PLAYER
# ------------------------------------------------------------
# Initials screen always still shows.
#
# Award screen ONLY shows for the real score category:
#   - YIPPIE KI YAY CHAMPION
#   - DETECTIVE LIEUTENANT
#   - BEAT COP
#
# The hidden machine_record_initials_score category still saves initials,
# iScored, and machine records, but it does not play the award slide.
# ------------------------------------------------------------
slide_player:
  high_score_enter_initials:
    high_score:
      action: play
      expire: 0s

  high_score_award_display{category_name=="score"}:
    high_score_award:
      action: play
      expire: 0s