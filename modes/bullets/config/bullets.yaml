#config_version=6
mode:
  start_events:
    - ball_started
    - multiball_nakatomi_ended
    - multiball_central_park_ended
    - multiball_airplane_ended
    - mode_ambush_stopped

    # Hans finished
    - hans_diehard_won_complete
    - hans_diehard_failed_complete
    - hans_dieharder_won_complete
    - hans_dieharder_failed_complete

    # Katya finished
    - katya_completed
    - katya_failed
    - katya_dieharder_completed
    - katya_dieharder_failed

    # Karl finished
    - karl_diehard_completed
    - karl_diehard_failed
    - karl_dieharder_completed
    - karl_dieharder_failed

    # Simon finished
    - simon_completed
    - simon_failed
    - simon_dieharder_completed
    - simon_dieharder_failed

    # Stuart / Col finished
    - stuart_completed
    - stuart_failed
    - stuart_dieharder_completed
    - stuart_dieharder_failed
    - col_completed
    - col_failed
    - col_dieharder_completed
    - col_dieharder_failed

  stop_events:
    - ball_ended
    - multiball_nakatomi_started
    - multiball_central_park_started
    - multiball_airplane_started
    - start_ambush

    # Hans started
    - start_hans_diehard
    - start_hans_dieharder

    # Katya started
    - start_katya_diehard
    - start_katya_dieharder

    # Karl started
    - start_karl_diehard
    - start_karl_dieharder

    # Simon started
    - start_simon_diehard
    - start_simon_dieharder

    # Stuart / Col started
    - start_stuart_diehard
    - start_stuart_dieharder
    - start_col_diehard
    - start_col_dieharder

  priority: 110

event_player:
  mode_bullets_started:
    - bullets_check_vpw_minimum

  bullets_check_vpw_minimum{current_player.bullet_hits < 9 and current_player.modes_complete==0}:
    - bullets_set_minimum_9

  bullets_check_vpw_minimum{current_player.bullet_hits < 7 and current_player.modes_complete==1}:
    - bullets_set_minimum_7

  bullets_check_vpw_minimum{current_player.bullet_hits < 5 and current_player.modes_complete==2}:
    - bullets_set_minimum_5

  bullets_check_vpw_minimum{current_player.bullet_hits < 3 and current_player.modes_complete==3}:
    - bullets_set_minimum_3

  bullets_check_vpw_minimum{current_player.bullet_hits < 1 and current_player.modes_complete>=4}:
    - bullets_set_minimum_1

  left_orbit_hit{current_player.shot_bullet_left_orbit == 0}:
    - bullet_new_unique_shot
    - bullet_lock_left_orbit

  right_orbit_hit{current_player.shot_bullet_right_orbit == 0}:
    - bullet_new_unique_shot
    - bullet_lock_right_orbit

  bullet_mid_orbit_hit{current_player.shot_bullet_mid_orbit == 0}:
    - bullet_new_unique_shot
    - bullet_lock_mid_orbit

  bullet_air_duct_hit{current_player.shot_bullet_air_duct == 0}:
    - bullet_new_unique_shot
    - bullet_lock_air_duct

  bullet_upper_pf_hit{current_player.shot_bullet_upper_pf == 0}:
    - bullet_new_unique_shot
    - bullet_lock_upper_pf

  timer_bullets_combo_complete:
    - reset_bullets

  mode_bullets_stopping:
    - reset_bullets

  player_bullet_combo_hits{value==5}:
    - bullets_combo_max
    - villain_start_lit
    - reset_bullets|100ms

  player_bullet_hits{value>=15}:
    - villain_start_lit

  ball_hold_villain_hold_full:
    - start_villain_select
    - reset_bullet_total
    - reset_bullets

shots:
  bullet_left_orbit:
    profile: profile_bullets
    start_enabled: true
    show_tokens:
      lights: l50
    control_events:
      - events: reset_bullets
        state: 0
      - events: bullet_lock_left_orbit
        state: 1

  bullet_upper_pf:
    switch: s_upper_pf_entrance
    profile: profile_bullets
    start_enabled: true
    show_tokens:
      lights: l51
    control_events:
      - events: reset_bullets
        state: 0
      - events: bullet_lock_upper_pf
        state: 1

  bullet_right_orbit:
    profile: profile_bullets
    start_enabled: true
    show_tokens:
      lights: l53
    control_events:
      - events: reset_bullets
        state: 0
      - events: bullet_lock_right_orbit
        state: 1

  bullet_mid_orbit:
    switch: s_mid_orbit
    profile: profile_bullets
    start_enabled: true
    show_tokens:
      lights: l54
    control_events:
      - events: reset_bullets
        state: 0
      - events: bullet_lock_mid_orbit
        state: 1

  bullet_air_duct:
    switch: s_air_duct
    profile: profile_bullets
    start_enabled: true
    show_tokens:
      lights: l55
    control_events:
      - events: reset_bullets
        state: 0
      - events: bullet_lock_air_duct
        state: 1

show_player:
  bullets_combo_max:
    flicker_color:
      key: key_bullets_combo_max
      priority: 1
      loops: 2
      speed: 4
      show_tokens:
        lights: bullets
        color: 00ff00

  bullet_lock_left_orbit:
    flicker_color:
      key: key_bullet_lock_left_orbit
      priority: 1
      loops: 2
      speed: 4
      show_tokens:
        lights: BLO
        color: ff0000

  bullet_lock_right_orbit:
    flicker_color:
      key: key_bullet_lock_right_orbit
      priority: 1
      loops: 2
      speed: 4
      show_tokens:
        lights: BRO
        color: ff0000

  bullet_lock_mid_orbit:
    flicker_color:
      key: key_bullet_lock_mid_orbit
      priority: 1
      loops: 2
      speed: 4
      show_tokens:
        lights: BMO
        color: ff0000

  bullet_lock_air_duct:
    flicker_color:
      key: key_bullet_lock_air_duct
      priority: 1
      loops: 2
      speed: 4
      show_tokens:
        lights: BAD
        color: ff0000

  bullet_lock_upper_pf:
    flicker_color:
      key: key_bullet_lock_upper_pf
      priority: 1
      loops: 2
      speed: 4
      show_tokens:
        lights: BUP
        color: ff0000

  villain_start_lit:
    flash_color:
      key: key_villain_start_lit
      priority: 10
      loops: -1
      speed: 4
      show_tokens:
        lights: l10
        color: ffffff

  start_villain_select:
    key_villain_start_lit:
      action: stop

light_player:
  start_villain_select:
    l10:
      color: ffff00

  reset_bullet_total:
    l10:
      color: off

timers:
  bullets_combo:
    start_value: 65
    end_value: 0
    direction: down
    control_events:
      - event: bullet_new_unique_shot
        action: restart
      - event: villain_start_lit
        action: stop
    restart_on_complete: false
    start_running: false
    tick_interval: 100ms

variable_player:
  bullet_new_unique_shot:
    bullet_hits:
      action: add
      int: "1 + current_player.bullet_combo_hits"

    eob_bonus_bullets:
      action: add
      int: "35000 * (1 + current_player.bullet_combo_hits)"

    bullet_combo_hits:
      action: add
      int: 1

  reset_bullets:
    bullet_combo_hits:
      action: set
      int: 0

  reset_bullet_total:
    bullet_hits:
      action: set
      int: 0

    bullet_combo_hits:
      action: set
      int: 0

  bullets_set_minimum_9:
    bullet_hits:
      action: set
      int: 9

  bullets_set_minimum_7:
    bullet_hits:
      action: set
      int: 7

  bullets_set_minimum_5:
    bullet_hits:
      action: set
      int: 5

  bullets_set_minimum_3:
    bullet_hits:
      action: set
      int: 3

  bullets_set_minimum_1:
    bullet_hits:
      action: set
      int: 1