#config_version=6
# ------------------------------------------------------------
# EOB BONUS
# ------------------------------------------------------------
# What this mode does:
#   - Starts from MPF ball_ending.
#   - Waits in the ball-ending queue until bonus_finished.
#   - Plays the EOB bonus show/video on normal drains.
#   - Shows the bonus summary when the EOB timer completes.
#   - Allows both flipper buttons held for 1s to skip normal EOB bonus
#     to the bonus calculation/summary.
#   - Does NOT skip straight to bonus_finished, so high score input is safe.
#   - During wizard ending, starts silently only to hold the queue.
#   - Wizard ending releases the queue with wizard_mode_force_game_over.
# ------------------------------------------------------------
mode:
  start_events:
    - ball_ending{game.tilted == False}
  stop_events:
    - bonus_finished
    - wizard_mode_force_game_over
    - wizard_mode_complete
    - game_ended
  priority: 9999
  use_wait_queue: true
# ------------------------------------------------------------
# EVENT PLAYER
# ------------------------------------------------------------
event_player:
  mode_eob_bonus_started{current_player.suppress_eob_bonus != 1}:
    - stop_main_music1
    - stop_main_music2
    - stop_main_music3
    - stop_main_music4
  mode_eob_bonus_started{current_player.suppress_eob_bonus == 1}:
    - stop_eob_bonus_now
  s_left_flipper_active{current_player.suppress_eob_bonus != 1 and current_player.eob_right_flipper_held == 1}:
    - eob_flipper_skip_start
  s_right_flipper_active{current_player.suppress_eob_bonus != 1 and current_player.eob_left_flipper_held == 1}:
    - eob_flipper_skip_start
  s_left_flipper_inactive:
    - eob_flipper_skip_stop
  s_right_flipper_inactive:
    - eob_flipper_skip_stop
  timer_eob_flipper_skip_complete{current_player.suppress_eob_bonus != 1}:
    - calculate_eob_bonus_x
  timer_eob_bonus_complete{current_player.suppress_eob_bonus != 1}:
    - calculate_eob_bonus_x
  calculate_eob_bonus_x{current_player.eob_bonus_awarded != 1 and current_player.suppress_eob_bonus != 1}:
    - award_eob_bonus|50ms
  calculate_eob_bonus_x{current_player.eob_bonus_awarded == 1 and current_player.suppress_eob_bonus != 1}:
    - show_bonus_summary
  award_eob_bonus{current_player.suppress_eob_bonus != 1}:
    - show_bonus_summary|250ms
  timer_eob_bonus_summary_complete{current_player.suppress_eob_bonus != 1}:
    - bonus_finished
  wizard_mode_force_game_over{current_player.suppress_eob_bonus == 1}:
    - bonus_finished
  wizard_mode_complete{current_player.suppress_eob_bonus == 1}:
    - bonus_finished
  game_ended:
    - bonus_finished
# ------------------------------------------------------------
# SHOW PLAYER
# ------------------------------------------------------------
show_player:
  mode_eob_bonus_started{current_player.suppress_eob_bonus != 1 and current_player.karl_result_started != 1 and current_player.karl_dieharder_result_started != 1 and current_player.hans_result_started != 1 and current_player.hans_dieharder_result_started != 1 and current_player.hans_dieharder_failed_active != 1 and current_player.katya_diehard_result_started != 1 and current_player.katya_dieharder_result_started != 1 and current_player.simon_result_started != 1 and current_player.simon_dieharder_result_started != 1 and current_player.col_stuart_result_started != 1 and current_player.col_stuart_dieharder_result_started != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  karl_diehard_failed{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  karl_diehard_failed_complete{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  karl_dieharder_failed{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  karl_dieharder_failed_complete{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  hans_diehard_failed{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  hans_diehard_failed_complete{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  hans_dieharder_failed_complete{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  katya_failed{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  katya_diehard_failed_complete{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  katya_dieharder_failed{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  katya_dieharder_failed_complete{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  simon_failed{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  simon_diehard_failed{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  simon_diehard_failed_complete{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  simon_dieharder_failed{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  simon_dieharder_failed_complete{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  col_stuart_diehard_failed{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  col_stuart_diehard_failed_complete{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  col_stuart_dieharder_failed{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  col_stuart_dieharder_failed_complete{current_player.suppress_eob_bonus != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0
  show_bonus_summary:
    eob_bonus:
      action: stop
      key: key_eob_bonus
  stop_eob_bonus_now:
    eob_bonus:
      action: stop
      key: key_eob_bonus
  wizard_mode_force_game_over:
    eob_bonus:
      action: stop
      key: key_eob_bonus
  wizard_mode_complete:
    eob_bonus:
      action: stop
      key: key_eob_bonus
  game_ended:
    eob_bonus:
      action: stop
      key: key_eob_bonus
# ------------------------------------------------------------
# SLIDE PLAYER
# ------------------------------------------------------------
slide_player:
  show_bonus_summary{current_player.suppress_eob_bonus != 1}:
    eob_bonus_summary:
      action: play
      expire: 0s
  stop_eob_bonus_now:
    eob_bonus_summary:
      action: remove
  wizard_mode_force_game_over:
    eob_bonus_summary:
      action: remove
  wizard_mode_complete:
    eob_bonus_summary:
      action: remove
  game_ended:
    eob_bonus_summary:
      action: remove
# ------------------------------------------------------------
# SOUND PLAYER
# ------------------------------------------------------------
sound_player:
  stop_main_music1:
    gameplay_music_beethoven:
      key: main_snd_music
      action: stop
  stop_main_music2:
    gameplay_music_assault:
      key: main_snd_music
      action: stop
  stop_main_music3:
    gameplay_music_finlandia:
      key: main_snd_music
      action: stop
  stop_main_music4:
    gameplay_music_battle:
      key: main_snd_music
      action: stop
# ------------------------------------------------------------
# TIMERS
# ------------------------------------------------------------
timers:
  eob_bonus:
    start_value: 0
    end_value: 12
    direction: up
    tick_interval: 1000ms
    start_running: false
    restart_on_complete: false
    control_events:
      - event: mode_eob_bonus_started{current_player.suppress_eob_bonus != 1 and current_player.karl_result_started != 1 and current_player.karl_dieharder_result_started != 1 and current_player.hans_result_started != 1 and current_player.hans_dieharder_result_started != 1 and current_player.hans_dieharder_failed_active != 1 and current_player.katya_diehard_result_started != 1 and current_player.katya_dieharder_result_started != 1 and current_player.simon_result_started != 1 and current_player.simon_dieharder_result_started != 1 and current_player.col_stuart_result_started != 1 and current_player.col_stuart_dieharder_result_started != 1}
        action: restart
      - event: karl_diehard_failed{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: karl_diehard_failed_complete{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: karl_dieharder_failed{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: karl_dieharder_failed_complete{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: hans_diehard_failed{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: hans_diehard_failed_complete{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: hans_dieharder_failed_complete{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: katya_failed{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: katya_diehard_failed_complete{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: katya_dieharder_failed{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: katya_dieharder_failed_complete{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: simon_failed{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: simon_diehard_failed{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: simon_diehard_failed_complete{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: simon_dieharder_failed{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: simon_dieharder_failed_complete{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: col_stuart_diehard_failed{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: col_stuart_diehard_failed_complete{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: col_stuart_dieharder_failed{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: col_stuart_dieharder_failed_complete{current_player.suppress_eob_bonus != 1}
        action: restart
      - event: show_bonus_summary
        action: stop
      - event: stop_eob_bonus_now
        action: stop
      - event: wizard_mode_force_game_over
        action: stop
      - event: wizard_mode_complete
        action: stop
      - event: game_ended
        action: stop
  eob_bonus_summary:
    start_value: 0
    end_value: 3
    direction: up
    tick_interval: 1000ms
    start_running: false
    restart_on_complete: false
    control_events:
      - event: show_bonus_summary{current_player.suppress_eob_bonus != 1}
        action: start
      - event: stop_eob_bonus_now
        action: stop
      - event: wizard_mode_force_game_over
        action: stop
      - event: wizard_mode_complete
        action: stop
      - event: game_ended
        action: stop
  eob_flipper_skip:
    start_value: 0
    end_value: 1
    direction: up
    tick_interval: 1s
    start_running: false
    restart_on_complete: false
    control_events:
      - event: eob_flipper_skip_start
        action: restart
      - event: eob_flipper_skip_stop
        action: stop
      - event: calculate_eob_bonus_x
        action: stop
      - event: show_bonus_summary
        action: stop
      - event: bonus_finished
        action: stop
      - event: wizard_mode_force_game_over
        action: stop
      - event: wizard_mode_complete
        action: stop
      - event: game_ended
        action: stop
# ------------------------------------------------------------
# VARIABLE PLAYER
# ------------------------------------------------------------
variable_player:
  mode_eob_bonus_started:
    eob_left_flipper_held:
      action: set
      int: 0
    eob_right_flipper_held:
      action: set
      int: 0
  s_left_flipper_active{current_player.suppress_eob_bonus != 1}:
    eob_left_flipper_held:
      action: set
      int: 1
  s_right_flipper_active{current_player.suppress_eob_bonus != 1}:
    eob_right_flipper_held:
      action: set
      int: 1
  s_left_flipper_inactive:
    eob_left_flipper_held:
      action: set
      int: 0
  s_right_flipper_inactive:
    eob_right_flipper_held:
      action: set
      int: 0
  mode_eob_bonus_started{current_player.suppress_eob_bonus != 1}:
    eob_bonus_awarded:
      int: 0
      action: set
    eob_bonus_total:
      int: "current_player.eob_bonus_bullets + current_player.eob_bonus_multiball + current_player.eob_bonus_ambush + current_player.eob_bonus_holly + current_player.eob_bonus_villains"
      action: set
    eob_bonus_x:
      int: "(current_player.eob_bonus_bullets + current_player.eob_bonus_multiball + current_player.eob_bonus_ambush + current_player.eob_bonus_holly + current_player.eob_bonus_villains) * current_player.bonus_multiplier"
      action: set
  calculate_eob_bonus_x{current_player.suppress_eob_bonus != 1}:
    eob_bonus_total:
      int: "current_player.eob_bonus_bullets + current_player.eob_bonus_multiball + current_player.eob_bonus_ambush + current_player.eob_bonus_holly + current_player.eob_bonus_villains"
      action: set
    eob_bonus_x:
      int: "(current_player.eob_bonus_bullets + current_player.eob_bonus_multiball + current_player.eob_bonus_ambush + current_player.eob_bonus_holly + current_player.eob_bonus_villains) * current_player.bonus_multiplier"
      action: set
  award_eob_bonus{current_player.eob_bonus_awarded != 1 and current_player.suppress_eob_bonus != 1}:
    score:
      int: current_player.eob_bonus_x
      action: add
    eob_bonus_awarded:
      int: 1
      action: set