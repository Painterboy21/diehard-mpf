#config_version=6

# ------------------------------------------------------------
# MODE
# EOB bonus starts from MPF's ball_ending queue.
#
# Keep this original start event.
# Villain result delays are handled by show/timer gates below,
# not by changing the mode start event.
# ------------------------------------------------------------
mode:
  start_events: ball_ending{game.tilted == False}
  stop_events: bonus_finished
  priority: 9999
  use_wait_queue: true

# ------------------------------------------------------------
# COMBO SWITCHES
# Press both flippers to skip straight to the bonus summary.
# ------------------------------------------------------------
combo_switches:
  flipper_cancel_bonus:
    switches_1: s_left_flipper
    switches_2: s_right_flipper
    events_when_both:
      - show_bonus_summary

# ------------------------------------------------------------
# EVENT PLAYER
# Handles EOB bonus completion, summary start, final finish,
# and stopping normal gameplay music.
# ------------------------------------------------------------
event_player:
  timer_eob_bonus_complete:
    - show_bonus_summary
    - calculate_eob_bonus_x

  calculate_eob_bonus_x:
    - show_bonus_summary|250ms

  timer_eob_bonus_summary_complete:
    - bonus_finished

  mode_eob_bonus_started:
    - stop_main_music1
    - stop_main_music2
    - stop_main_music3
    - stop_main_music4

# ------------------------------------------------------------
# SHOW PLAYER
# Runs the EOB bonus video/show.
#
# Normal ball drain:
#   Start EOB show on mode_eob_bonus_started only if no villain
#   result slide/video is currently active.
#
# Villain escaped / failed drain:
#   If a villain result variable is active, do not start EOB yet.
#   Start it after that villain's fail/result event fires.
# ------------------------------------------------------------
show_player:
  mode_eob_bonus_started{current_player.karl_result_started != 1 and current_player.karl_dieharder_result_started != 1 and current_player.hans_result_started != 1 and current_player.hans_dieharder_result_started != 1 and current_player.katya_diehard_result_started != 1 and current_player.katya_dieharder_result_started != 1 and current_player.simon_result_started != 1 and current_player.simon_dieharder_result_started != 1 and current_player.col_stuart_result_started != 1 and current_player.col_stuart_dieharder_result_started != 1}:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  # ------------------------------------------------------------
  # KARL RESULT FINISHED
  # ------------------------------------------------------------
  karl_diehard_failed:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  karl_diehard_failed_complete:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  karl_dieharder_failed:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  karl_dieharder_failed_complete:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  # ------------------------------------------------------------
  # HANS RESULT FINISHED
  # ------------------------------------------------------------
  hans_diehard_failed:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  hans_diehard_failed_complete:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  hans_dieharder_failed:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  hans_dieharder_failed_complete:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  # ------------------------------------------------------------
  # KATYA RESULT FINISHED
  # ------------------------------------------------------------
  katya_failed:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  katya_diehard_failed_complete:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  katya_dieharder_failed:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  katya_dieharder_failed_complete:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  # ------------------------------------------------------------
  # SIMON RESULT FINISHED
  # ------------------------------------------------------------
  simon_failed:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  simon_diehard_failed:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  simon_diehard_failed_complete:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  simon_dieharder_failed:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  simon_dieharder_failed_complete:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  # ------------------------------------------------------------
  # COL / STUART RESULT FINISHED
  # ------------------------------------------------------------
  col_stuart_failed:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  col_stuart_diehard_failed:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  col_stuart_diehard_failed_complete:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  col_stuart_dieharder_failed:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  col_stuart_dieharder_failed_complete:
    eob_bonus:
      key: key_eob_bonus
      loops: 0

  # ------------------------------------------------------------
  # STOP EOB SHOW WHEN SUMMARY STARTS
  # ------------------------------------------------------------
  show_bonus_summary:
    eob_bonus:
      action: stop
      key: key_eob_bonus

# ------------------------------------------------------------
# SLIDE PLAYER
# Shows the final EOB bonus summary slide.
# ------------------------------------------------------------
slide_player:
  show_bonus_summary:
    eob_bonus_summary:
      action: play
      expire: 0s

# ------------------------------------------------------------
# SOUND PLAYER
# Stops normal gameplay music when EOB starts.
# ------------------------------------------------------------
sound_player:
  stop_main_music1:
    gameplay_music_beethoven:
      key: main_snd_music
      action: stop

  stop_main_music2:
    gameplay_music_assault:
      key: main_snd_music
      action: stop

  stop_main_music3:
    gameplay_music_finlandia:
      key: main_snd_music
      action: stop

  stop_main_music4:
    gameplay_music_battle:
      key: main_snd_music
      action: stop

# ------------------------------------------------------------
# TIMERS
# eob_bonus:
#   Runs the main EOB count/video timing.
#
# Important delayed villain result fix:
#   start_running is false.
#   Normal drain starts it on mode_eob_bonus_started only if no
#   villain result is active.
#   Villain escaped drain starts it after that villain's
#   fail/result event fires.
#
# eob_bonus_summary:
#   Runs the final summary slide timing.
# ------------------------------------------------------------
timers:
  eob_bonus:
    start_value: 0
    end_value: 12
    direction: up
    tick_interval: 1000ms
    start_running: false
    restart_on_complete: false
    control_events:
      - event: mode_eob_bonus_started{current_player.karl_result_started != 1 and current_player.karl_dieharder_result_started != 1 and current_player.hans_result_started != 1 and current_player.hans_dieharder_result_started != 1 and current_player.katya_diehard_result_started != 1 and current_player.katya_dieharder_result_started != 1 and current_player.simon_result_started != 1 and current_player.simon_dieharder_result_started != 1 and current_player.col_stuart_result_started != 1 and current_player.col_stuart_dieharder_result_started != 1}
        action: restart

      # Karl
      - event: karl_diehard_failed
        action: restart
      - event: karl_diehard_failed_complete
        action: restart
      - event: karl_dieharder_failed
        action: restart
      - event: karl_dieharder_failed_complete
        action: restart

      # Hans
      - event: hans_diehard_failed
        action: restart
      - event: hans_diehard_failed_complete
        action: restart
      - event: hans_dieharder_failed
        action: restart
      - event: hans_dieharder_failed_complete
        action: restart

      # Katya
      - event: katya_failed
        action: restart
      - event: katya_diehard_failed_complete
        action: restart
      - event: katya_dieharder_failed
        action: restart
      - event: katya_dieharder_failed_complete
        action: restart

      # Simon
      - event: simon_failed
        action: restart
      - event: simon_diehard_failed
        action: restart
      - event: simon_diehard_failed_complete
        action: restart
      - event: simon_dieharder_failed
        action: restart
      - event: simon_dieharder_failed_complete
        action: restart

      # Col / Stuart
      - event: col_stuart_failed
        action: restart
      - event: col_stuart_diehard_failed
        action: restart
      - event: col_stuart_diehard_failed_complete
        action: restart
      - event: col_stuart_dieharder_failed
        action: restart
      - event: col_stuart_dieharder_failed_complete
        action: restart

      # Skip / summary
      - event: show_bonus_summary
        action: stop

  eob_bonus_summary:
    start_value: 0
    end_value: 3
    direction: up
    tick_interval: 1000ms
    start_running: false
    restart_on_complete: false
    control_events:
      - event: show_bonus_summary
        action: start

# ------------------------------------------------------------
# VARIABLE PLAYER
# Calculates EOB bonus total and multiplier-adjusted total
# when EOB mode starts.
#
# Score is added when the main EOB timer completes.
# ------------------------------------------------------------
variable_player:
  mode_eob_bonus_started:
    eob_bonus_total:
      int: current_player.eob_bonus_bullets + current_player.eob_bonus_multiball + current_player.eob_bonus_ambush + current_player.eob_bonus_holly + current_player.eob_bonus_villains
      action: set

    eob_bonus_x:
      int: (current_player.eob_bonus_bullets + current_player.eob_bonus_multiball + current_player.eob_bonus_ambush + current_player.eob_bonus_holly + current_player.eob_bonus_villains) * current_player.bonus_multiplier
      action: set

  timer_eob_bonus_complete:
    score:
      int: current_player.eob_bonus_x
      action: add