#config_version=6

# ------------------------------------------------------------
# MODE
# Karl Die Hard starts from Karl difficulty select.
#
# karl_played:
#   Shared gate for Karl Die Hard and Karl Die Harder.
#   Once either version starts, Karl cannot be selected again
#   during that game.
#
# karl_complete:
#   Only set when Karl is defeated.
# ------------------------------------------------------------
mode:
  start_events:
    - start_karl_diehard{current_player.karl_played==0}
  stop_events:
    - karl_diehard_completed
    - karl_diehard_failed
  priority: 170

# ------------------------------------------------------------
# TIMER
# VPW Karl = 90 seconds normally.
# If Hans Bonus is active, VPW gives Karl 120 seconds.
#
# MPF-safe approach:
#   - restart timer at 90
#   - if hans_bonus == 1, add +30 seconds immediately
#
# Mystery "Add More Time" still adds +20 seconds.
# Result events stop the timer while the result slide plays.
# ------------------------------------------------------------
timers:
  karl_diehard_timer:
    start_value: 90
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: mode_karl_diehard_started
        action: restart
      - event: karl_apply_hans_bonus_time
        action: add
        value: 30
      - event: karl_defeated_slide
        action: stop
      - event: karl_escaped_slide
        action: stop
      - event: karl_diehard_completed
        action: stop
      - event: karl_diehard_failed
        action: stop
      - event: add_villain_time_from_mystery
        action: add
        value: 20

# ------------------------------------------------------------
# BALL SAVES
# Karl gets a 2 second ball save at mode start.
# The ball save insert flash is handled by the normal global
# ball save event, not by a custom Karl show.
# ------------------------------------------------------------
ball_saves:
  karl_ball_save:
    active_time: 2s
    hurry_up_time: 1s
    grace_period: 1s
    enable_events:
      - karl_enable_ball_save
    disable_events:
      - karl_defeated_slide
      - karl_escaped_slide
      - karl_diehard_completed
      - karl_diehard_failed
      - tilt
    auto_launch: true
    balls_to_save: -1

# ------------------------------------------------------------
# EVENT PLAYER
# Handles Karl mode start, Hans Bonus timer add, damage shots,
# heartbeat changes, result slide events, and final cleanup.
#
# Result flow:
#   win  -> karl_defeated_slide -> 4s -> karl_diehard_completed
#   lose -> karl_escaped_slide  -> 5s -> karl_diehard_failed
#
# ball_drain is used like Hans so KarlEscaped can play before
# the ball end / EOB screen takes over.
# ------------------------------------------------------------
event_player:
  mode_karl_diehard_started:
    - villain_mode_started
    - stop_base_music
    - karl_music_start
    - reset_bullets
    - reset_bullet_total
    - karl_reset_damage
    - karl_enable_ball_save
    - karl_heartbeat_slow
    - karl_apply_hans_bonus_time{current_player.hans_bonus == 1}|10ms

  # ------------------------------------------------------------
  # RESULT STARTS
  # ------------------------------------------------------------
  timer_karl_diehard_timer_complete{current_player.karl_result_started==0}:
    - karl_escaped_slide
    - karl_diehard_failed|5s

  ball_drain{current_player.karl_result_started==0}:
    - karl_escaped_slide
    - karl_diehard_failed|5s

  karl_check_complete{current_player.karl_damage >= 100 and current_player.karl_result_started==0}:
    - karl_defeated_slide
    - karl_diehard_completed|4s

  # ------------------------------------------------------------
  # MODE STOP CLEANUP
  # ------------------------------------------------------------
  mode_karl_diehard_stopping:
    - villain_mode_stopped

  # ------------------------------------------------------------
  # KARL DAMAGE SHOTS
  # VPW:
  # Spinner = +1 KarlHits
  # Bumper = +5 KarlHits
  #
  # Real machine: only TWO pop bumpers.
  # ------------------------------------------------------------
  SpinnerLeft_active{current_player.karl_damage < 100 and current_player.karl_result_started==0}:
    - karl_spinner_hit
    - karl_score_spinner
    - karl_check_complete|20ms

  SpinnerRight_active{current_player.karl_damage < 100 and current_player.karl_result_started==0}:
    - karl_spinner_hit
    - karl_score_spinner
    - karl_check_complete|20ms

  s_popbumper_left_active{current_player.karl_damage < 100 and current_player.karl_result_started==0}:
    - karl_pop_hit
    - karl_score_pop
    - karl_check_complete|20ms

  s_popbumper_right_active{current_player.karl_damage < 100 and current_player.karl_result_started==0}:
    - karl_pop_hit
    - karl_score_pop
    - karl_check_complete|20ms

  # ------------------------------------------------------------
  # HEARTBEAT SPEED
  # VPW-style heartbeat gets faster as Karl damage rises.
  # ------------------------------------------------------------
  karl_spinner_hit:
    - karl_update_heartbeat|50ms

  karl_pop_hit:
    - karl_update_heartbeat|50ms

  karl_update_heartbeat{current_player.karl_damage < 35 and current_player.karl_result_started==0}:
    - karl_heartbeat_slow

  karl_update_heartbeat{current_player.karl_damage >= 35 and current_player.karl_damage < 70 and current_player.karl_result_started==0}:
    - karl_heartbeat_medium

  karl_update_heartbeat{current_player.karl_damage >= 70 and current_player.karl_result_started==0}:
    - karl_heartbeat_fast

  # ------------------------------------------------------------
  # FINAL COMPLETE / FAIL EVENTS
  # These happen after the result slide delay.
  # ------------------------------------------------------------
  karl_diehard_completed:
    - karl_score_complete
    - count_karl_for_extra_ball
    - reset_bullets
    - reset_bullet_total

  karl_diehard_failed:
    - reset_bullets
    - reset_bullet_total

  # ------------------------------------------------------------
  # KARL BALL SAVE FEEDBACK
  # Use the normal global ball save event.
  # ------------------------------------------------------------
  ball_save_karl_ball_save_saving_ball:
    - ball_save_saving_ball

# ------------------------------------------------------------
# VARIABLE PLAYER
# Stores Karl progress and result state.
#
# karl_played:
#   Shared gate for Karl Die Hard and Karl Die Harder.
#   Set as soon as either Karl mode starts.
#
# karl_complete:
#   Only set when Karl is defeated.
#
# karl_health_display:
#   Sends Karl damage value to Godot for the Karl health bar.
#
# karl_hans_bonus_active:
#   Sends Hans Bonus state to Godot.
#   0 = normal Karl / 90 second John health scale
#   1 = Hans Bonus Karl / 120 second John health scale
#
# karl_result_started:
#   Prevents double-starting win/lose result events and lets EOB
#   wait until the result video finishes.
# ------------------------------------------------------------
variable_player:
  mode_karl_diehard_started:
    karl_played:
      action: set
      int: 1
    karl_damage:
      action: set
      int: 0
    karl_health_display:
      action: set
      int: 0
    karl_result_display:
      action: set
      int: 0
    karl_result_started:
      action: set
      int: 0
    karl_diehard_won:
      action: set
      int: 0
    karl_diehard_lost:
      action: set
      int: 0
    karl_villain_score:
      action: set
      int: 500000

  mode_karl_diehard_started{current_player.hans_bonus == 1}:
    karl_hans_bonus_active:
      action: set
      int: 1

  mode_karl_diehard_started{current_player.hans_bonus != 1}:
    karl_hans_bonus_active:
      action: set
      int: 0

  mode_karl_diehard_started{current_player.playfield_multiplier == None}:
    playfield_multiplier:
      action: set
      int: 1

  # ------------------------------------------------------------
  # RESET DAMAGE
  # ------------------------------------------------------------
  karl_reset_damage:
    karl_damage:
      action: set
      int: 0
    karl_health_display:
      action: set
      int: 0

  # ------------------------------------------------------------
  # RESULT SLIDE VARIABLES
  # These trigger Godot/result state and tell EOB to wait.
  # ------------------------------------------------------------
  karl_defeated_slide:
    karl_result_started:
      action: set
      int: 1
    karl_result_display:
      action: set
      int: 1
    karl_health_display:
      action: set
      int: 100

  karl_escaped_slide:
    karl_result_started:
      action: set
      int: 1
    karl_result_display:
      action: set
      int: 2

  # ------------------------------------------------------------
  # DAMAGE
  # VPW:
  # Spinner = +1
  # Pop bumper = +5
  #
  # karl_health_display mirrors the updated Karl damage for Godot.
  # We add the hit value here because MPF evaluates the display
  # value before the add has visually propagated.
  # ------------------------------------------------------------
  karl_spinner_hit:
    karl_damage:
      action: add
      int: 1
    karl_health_display:
      action: set
      int: "(current_player.karl_damage + 1)"

  karl_pop_hit:
    karl_damage:
      action: add
      int: 5
    karl_health_display:
      action: set
      int: "(current_player.karl_damage + 5)"

  # ------------------------------------------------------------
  # VPW KARL SCORING
  # Spinner = 90,000
  # Bumper = 450,000
  # Complete = 3,000,000
  #
  # All Karl scoring respects playfield_multiplier.
  # ------------------------------------------------------------
  karl_score_spinner:
    score:
      action: add
      int: "(90000 * current_player.playfield_multiplier)"
    karl_villain_score:
      action: add
      int: "(90000 * current_player.playfield_multiplier)"

  karl_score_pop:
    score:
      action: add
      int: "(450000 * current_player.playfield_multiplier)"
    karl_villain_score:
      action: add
      int: "(450000 * current_player.playfield_multiplier)"

  karl_score_complete:
    score:
      action: add
      int: "(3000000 * current_player.playfield_multiplier)"
    karl_villain_score:
      action: add
      int: "(3000000 * current_player.playfield_multiplier)"

  # ------------------------------------------------------------
  # RESULT FLAGS
  # Completed = Karl defeated:
  #   - sets karl_complete
  #   - posts Extra Ball bridge via event_player
  #
  # Failed/Escaped:
  #   - only sets karl_diehard_lost
  #   - does not set karl_complete
  #
  # Karl still cannot be selected again because karl_played is
  # set when the mode starts.
  # ------------------------------------------------------------
  karl_diehard_completed:
    karl_diehard_won:
      action: set
      int: 1
    karl_complete:
      action: set
      int: 1
    karl_health_display:
      action: set
      int: 100
    karl_result_started:
      action: set
      int: 0

  karl_diehard_failed:
    karl_diehard_lost:
      action: set
      int: 1
    karl_result_started:
      action: set
      int: 0

  mode_karl_diehard_stopping:
    karl_result_started:
      action: set
      int: 0

# ------------------------------------------------------------
# SOUND PLAYER
# Starts Karl mode music and stops it when the result slide
# begins or when the mode stops.
#
# Karl mode music asset:
#   karltheme
# ------------------------------------------------------------
sound_player:
  karl_music_start:
    karltheme:
      key: main_music
      action: play
      loops: -1
      volume: 0.8

  karl_defeated_slide:
    karltheme:
      key: main_music
      action: stop

  karl_escaped_slide:
    karltheme:
      key: main_music
      action: stop

  mode_karl_diehard_stopping:
    karltheme:
      key: main_music
      action: stop

# ------------------------------------------------------------
# SHOW PLAYER
# Runs VPW-style Karl lighting shows:
#   - running pulse
#   - heartbeat slow/medium/fast
#   - damage flashes
#   - complete/fail shows
#   - cleanup
# ------------------------------------------------------------
show_player:
  mode_karl_diehard_started:
    karl_vpw_running_pulse:
      key: key_karl_vpw_running_pulse
      loops: 0
      speed: 1
      priority: 760
    karl_vpw_heartbeat_slow:
      key: key_karl_vpw_heartbeat
      loops: 0
      speed: 1
      priority: 650

  # ------------------------------------------------------------
  # HEARTBEAT SPEED CHANGES
  # ------------------------------------------------------------
  karl_heartbeat_slow:
    karl_vpw_heartbeat_medium:
      action: stop
      key: key_karl_vpw_heartbeat
    karl_vpw_heartbeat_fast:
      action: stop
      key: key_karl_vpw_heartbeat
    karl_vpw_heartbeat_slow:
      key: key_karl_vpw_heartbeat
      loops: 0
      speed: 1
      priority: 650

  karl_heartbeat_medium:
    karl_vpw_heartbeat_slow:
      action: stop
      key: key_karl_vpw_heartbeat
    karl_vpw_heartbeat_fast:
      action: stop
      key: key_karl_vpw_heartbeat
    karl_vpw_heartbeat_medium:
      key: key_karl_vpw_heartbeat
      loops: 0
      speed: 1
      priority: 650

  karl_heartbeat_fast:
    karl_vpw_heartbeat_slow:
      action: stop
      key: key_karl_vpw_heartbeat
    karl_vpw_heartbeat_medium:
      action: stop
      key: key_karl_vpw_heartbeat
    karl_vpw_heartbeat_fast:
      key: key_karl_vpw_heartbeat
      loops: 0
      speed: 1
      priority: 650

  # ------------------------------------------------------------
  # DAMAGE SHOWS
  # ------------------------------------------------------------
  karl_spinner_hit:
    karl_vpw_damage_pulse:
      key: key_karl_spinner_damage_pulse
      loops: 1
      speed: 1
      priority: 900

  karl_pop_hit:
    karl_vpw_damage_pulse:
      key: key_karl_pop_damage_pulse
      loops: 2
      speed: 1
      priority: 920

  # ------------------------------------------------------------
  # RESULT SLIDES
  # Stop running/heartbeat while result slide plays.
  # ------------------------------------------------------------
  karl_defeated_slide:
    karl_vpw_running_pulse:
      action: stop
      key: key_karl_vpw_running_pulse
    karl_vpw_heartbeat_slow:
      action: stop
      key: key_karl_vpw_heartbeat
    karl_vpw_heartbeat_medium:
      action: stop
      key: key_karl_vpw_heartbeat
    karl_vpw_heartbeat_fast:
      action: stop
      key: key_karl_vpw_heartbeat

  karl_escaped_slide:
    karl_vpw_running_pulse:
      action: stop
      key: key_karl_vpw_running_pulse
    karl_vpw_heartbeat_slow:
      action: stop
      key: key_karl_vpw_heartbeat
    karl_vpw_heartbeat_medium:
      action: stop
      key: key_karl_vpw_heartbeat
    karl_vpw_heartbeat_fast:
      action: stop
      key: key_karl_vpw_heartbeat

  # ------------------------------------------------------------
  # COMPLETE / FAIL SHOWS
  # Final events happen after result slide delay.
  # ------------------------------------------------------------
  karl_diehard_completed:
    karl_vpw_complete_show:
      key: key_karl_vpw_complete_show
      loops: 1
      speed: 1
      priority: 1000

  karl_diehard_failed:
    karl_vpw_failed_show:
      key: key_karl_vpw_failed_show
      loops: 1
      speed: 1
      priority: 1000

  # ------------------------------------------------------------
  # CLEANUP
  # ------------------------------------------------------------
  mode_karl_diehard_stopping:
    karl_vpw_running_pulse:
      action: stop
      key: key_karl_vpw_running_pulse
    karl_vpw_heartbeat_slow:
      action: stop
      key: key_karl_vpw_heartbeat
    karl_vpw_heartbeat_medium:
      action: stop
      key: key_karl_vpw_heartbeat
    karl_vpw_heartbeat_fast:
      action: stop
      key: key_karl_vpw_heartbeat

# ------------------------------------------------------------
# LIGHT PLAYER
# Keeps Karl insert and action button orange during the mode.
#
# Completed:
#   Karl insert stays Karl orange.
#
# Failed/Escaped:
#   Karl insert turns off.
#
# Do not use l80, l81, l82, or l83.
# ------------------------------------------------------------
light_player:
  mode_karl_diehard_started:
    GI:
      color: ffb700
      priority: 500
    SPOTS:
      color: 505050
      priority: 500
    l40:
      color: ff8800
      priority: 1000
    l1000:
      color: ff8800
      priority: 1000
    l1001:
      color: ff8800
      priority: 1000

  # ------------------------------------------------------------
  # KARL BALL SAVE COLOUR
  # Keep Karl/action button orange during the 2s ball save.
  # Normal ball save insert still flashes via ball_save_saving_ball.
  # ------------------------------------------------------------
  ball_save_karl_ball_save_enabled:
    l40:
      color: ff8800
      priority: 1000
    l1000:
      color: ff8800
      priority: 1000
    l1001:
      color: ff8800
      priority: 1000

  ball_save_karl_ball_save_hurry_up:
    l40:
      color: ff8800
      priority: 1000
    l1000:
      color: ff8800
      priority: 1000
    l1001:
      color: ff8800
      priority: 1000

  ball_save_karl_ball_save_saving_ball:
    l40:
      color: ff8800
      priority: 1000
    l1000:
      color: ff8800
      priority: 1000
    l1001:
      color: ff8800
      priority: 1000

  # ------------------------------------------------------------
  # RESULT STATE
  # Completed = Karl insert stays orange.
  # Failed/Escaped = Karl insert turns off.
  # ------------------------------------------------------------
  karl_diehard_completed:
    l40:
      color: ff8800
      priority: 1100
    l1000:
      color: off
      priority: 1100
    l1001:
      color: off
      priority: 1100

  karl_diehard_failed:
    l40:
      color: off
      priority: 1100
    l1000:
      color: off
      priority: 1100
    l1001:
      color: off
      priority: 1100

  mode_karl_diehard_stopped:
    l1000:
      color: off
      priority: 1100
    l1001:
      color: off
      priority: 1100

# ------------------------------------------------------------
# SLIDE PLAYER
# Same style as Hans:
#   result event removes the mode background
#   result slide plays high priority
#   final completed/failed event stops the mode after delay
# ------------------------------------------------------------
slide_player:
  mode_karl_diehard_started:
    karl_diehard_background:
      action: play
      priority: 500

  mode_karl_diehard_stopping:
    karl_diehard_background:
      action: remove

  karl_defeated_slide:
    karl_diehard_background:
      action: remove
    karl_defeated:
      action: play
      expire: 4s
      priority: 10000

  karl_escaped_slide:
    karl_diehard_background:
      action: remove
    karl_escaped:
      action: play
      expire: 5s
      priority: 10000

  karl_diehard_completed:
    karl_defeated:
      action: remove

  karl_diehard_failed:
    karl_escaped:
      action: remove