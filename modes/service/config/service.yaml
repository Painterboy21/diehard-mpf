#config_version=6
# ------------------------------------------------------------
# SERVICE MODE
# ------------------------------------------------------------
# Die Hard custom service front end.
# Door open shows the custom service screen.
# Door close hides it and resumes the current game.
# Service mode does not force lamp dimming or restore.
# Native MPF service exit is not used because MPF 0.80 resets the
# machine when service exits.
# ------------------------------------------------------------
mode:
  code: diehard_service.DieHardService
  priority: 100000
  game_mode: false
  start_events:
    - reset_complete
  stop_events:
    - shutdown
  stop_on_ball_end: false
event_player:
  sw_s_door_open_active:
    - service_door_opened
    - service_mode_entered
  sw_s_door_open_inactive:
    - service_door_closed
    - service_mode_exited
  sw_service_door_open_active:
    - service_door_opened
    - service_mode_entered
  sw_service_door_open_inactive:
    - service_door_closed
    - service_mode_exited
  sw_service_door_closed_active:
    - service_door_closed
    - service_mode_exited
  sw_service_door_closed_inactive:
    - service_door_opened
    - service_mode_entered
  sw_service_up_active:
    service_button:
      button: UP
  sw_service_down_active:
    service_button:
      button: DOWN
  sw_service_enter_active:
    service_button:
      button: ENTER
  sw_service_esc_active:
    service_button:
      button: ESC
  sw_start_active:
    service_button:
      button: START
  sw_power_off_inactive:
    - service_power_on
  sw_power_off_active:
    - service_power_off
  sw_power_on_inactive:
    - service_power_off
  sw_power_on_active:
    - service_power_on
  service_test_full_mech_check:
    - service_test_trough_eject
    - service_test_vault_kicker
    - service_test_right_kicker
    - service_test_upper_ramp_vuk
    - service_test_right_vuk
    - service_test_tower_vuk
    - service_test_airplane_captive
    - service_test_shaker_light
slide_player:
  service_mode_entered:
    service:
      priority: 100000
  service_mode_exited:
    service:
      action: remove
coil_player:
  service_test_trough_eject:
    c_trough_eject:
      action: pulse
  service_test_plunger:
    c_plunger:
      action: pulse
  service_test_vault_kicker:
    c_kickervault1_eject:
      action: pulse
  service_test_right_kicker:
    c_rightkicker_eject:
      action: pulse
  service_test_upper_ramp_vuk:
    c_UrampUp001_eject:
      action: pulse
  service_test_right_vuk:
    c_rightvuk_eject:
      action: pulse
  service_test_tower_vuk:
    c_towervuk_eject:
      action: pulse
  service_test_airplane_captive:
    c_captivetarget:
      action: pulse
  service_test_left_magnet:
    c_trmagl:
      action: pulse
  service_test_right_magnet:
    c_trmagr:
      action: pulse
light_player:
