#config_version=6
# ------------------------------------------------------------
# SERVICE MODE
# ------------------------------------------------------------
# MPF built-in service backend.
# Die Hard Godot scene provides the front end.
#
# Coin door behaviour:
#   - Open coin door: enter service mode automatically.
#   - Close coin door: exit service mode automatically.
#
# Device Test:
#   - Single pulse only.
#   - No flippers.
#   - No hold coils.
# ------------------------------------------------------------

mode:
  code: mpf.modes.service.code.service.Service
  priority: 100000
  game_mode: false
  start_events:
    - reset_complete
  stop_events:
    - shutdown
  stop_on_ball_end: false

mode_settings:
  sort_devices_by_number: true

  door_opened_events:
    - service_door_opened

  door_closed_events:
    - service_door_closed

  high_power_on_events:
    - service_power_on

  high_power_off_events:
    - service_power_off

  enter_events:
    - sw_service_enter_active

  esc_events:
    - sw_service_esc_active

  up_events:
    - sw_service_up_active

  down_events:
    - sw_service_down_active

  software_update: false
  software_update_script: None

event_player:
  sw_service_door_open_active:
    - service_door_opened
    - sw_service_enter_active

  sw_service_door_open_inactive:
    - service_door_closed
    - service_exit_from_door_closed

  sw_service_door_closed_active:
    - service_door_closed
    - service_exit_from_door_closed

  sw_service_door_closed_inactive:
    - service_door_opened
    - sw_service_enter_active

  sw_power_off_inactive:
    - service_power_on

  sw_power_off_active:
    - service_power_off

  sw_power_on_inactive:
    - service_power_off

  sw_power_on_active:
    - service_power_on

  service_mode_entered:
    - disable_flippers
    - flipper_off

  service_exit_from_door_closed:
    service_trigger:
      action: service_exit

slide_player:
  service_mode_entered:
    service:
      priority: 100000

  service_mode_exited:
    service:
      action: remove

# ------------------------------------------------------------
# DEVICE TEST COIL PLAYER
# ------------------------------------------------------------
# These are fired from the Godot service Device Test page.
# Keep these single pulse only.
# ------------------------------------------------------------
coil_player:
  service_test_trough_eject:
    c_trough_eject:
      action: pulse

  service_test_plunger:
    c_plunger:
      action: pulse

  service_test_vault_kicker:
    c_kickervault1_eject:
      action: pulse

  service_test_right_kicker:
    c_rightkicker_eject:
      action: pulse

  service_test_upper_ramp_vuk:
    c_UrampUp001_eject:
      action: pulse

  service_test_right_vuk:
    c_rightvuk_eject:
      action: pulse

  service_test_tower_vuk:
    c_towervuk_eject:
      action: pulse

  service_test_airplane_captive:
    c_captivetarget:
      action: pulse