#config_version=6
# ------------------------------------------------------------
# MODE
# Karl difficulty select carousel.
# Starts from villain select and stops when the villain selection
# is complete or the ball ends.
# ------------------------------------------------------------
mode:
  start_events: start_karl_difficulty_select
  stop_events:
    - villain_selection_complete
    - ball_ended
  priority: 310
  code: mpf.modes.carousel.code.carousel.Carousel
# ------------------------------------------------------------
# LIGHT PLAYER
# Turns off GI and spots while Karl difficulty select is active.
# ------------------------------------------------------------
light_player:
  mode_karl_difficulty_select_started:
    GI:
      color: 000000
    SPOTS:
      color: 000000
# ------------------------------------------------------------
# MODE SETTINGS
# Karl difficulty choices and carousel controls.
# ------------------------------------------------------------
mode_settings:
  selectable_items:
    - karl_die_hard
    - karl_die_harder
  next_item_events:
    - s_right_flipper_active
  previous_item_events:
    - s_left_flipper_active
  select_item_events:
    - s_fire_active
    - s_actionbtn_active
# ------------------------------------------------------------
# SHOW PLAYER
# Flashes Karl insert/action button orange while choosing
# difficulty, then stops the shows once a difficulty is chosen.
# ------------------------------------------------------------
show_player:
  mode_karl_difficulty_select_started:
    flash_color:
      key: selected_villain_flash
      priority: 120
      loops: -1
      speed: 6
      show_tokens:
        lights: l40, l1000, l1001
        color: ff8800
    InsertsVillainSpinOrange:
      key: key_karl_difficulty_spin
      loops: -1
      speed: 50
  set_difficulty_die_hard:
    flash_color:
      action: stop
      key: selected_villain_flash
    InsertsVillainSpinOrange:
      action: stop
      key: key_karl_difficulty_spin
  set_difficulty_die_harder:
    flash_color:
      action: stop
      key: selected_villain_flash
    InsertsVillainSpinOrange:
      action: stop
      key: key_karl_difficulty_spin
  mode_karl_difficulty_select_stopped:
    flash_color:
      action: stop
      key: selected_villain_flash
    InsertsVillainSpinOrange:
      action: stop
      key: key_karl_difficulty_spin
# ------------------------------------------------------------
# SLIDE PLAYER
# Shows Karl difficulty select and Karl intro.
# Removes the select slide when the intro starts so it cannot
# flash back onscreen before the Karl mode slide appears.
# ------------------------------------------------------------
slide_player:
  mode_karl_difficulty_select_started:
    karl_difficulty_select:
      action: play
      expire: 0s
  play_karl_intro:
    karl_difficulty_select:
      action: remove
    karl_intro:
      action: play
      expire: 4.15s
# ------------------------------------------------------------
# EVENT PLAYER
# Starts Karl just before the intro finishes.
# The selected mode starts first, VUK releases next, then the
# difficulty select mode stops just after.
# ------------------------------------------------------------
event_player:
  carousel_item_selected{carousel=="karl_difficulty_select" and item=="karl_die_hard"}:
    - set_difficulty_die_hard
    - play_karl_intro
    - reset_karl_result_state|3.75s
    - start_karl_diehard|3.9s
    - release_villain_select_vuk|4s
    - villain_selection_complete|4.05s
  carousel_item_selected{carousel=="karl_difficulty_select" and item=="karl_die_harder"}:
    - set_difficulty_die_harder
    - play_karl_intro
    - reset_karl_result_state|3.75s
    - start_karl_dieharder|3.9s
    - release_villain_select_vuk|4s
    - villain_selection_complete|4.05s
# ------------------------------------------------------------
# VARIABLE PLAYER
# Stores selected difficulty and clears Karl result variables
# before starting Karl again.
# ------------------------------------------------------------
variable_player:
  set_difficulty_die_hard:
    selected_diehard_mode:
      string: die_hard
      action: set
  set_difficulty_die_harder:
    selected_diehard_mode:
      string: die_harder
      action: set
  mode_karl_difficulty_select_started:
    villain_difficulty_select_running:
      action: set
      int: 1
  mode_karl_difficulty_select_stopping:
    villain_difficulty_select_running:
      action: set
      int: 0
  reset_karl_result_state:
    karl_result_started:
      action: set
      int: 0
    karl_result_display:
      action: set
      int: 0
    karl_diehard_lost:
      action: set
      int: 0
    karl_diehard_won:
      action: set
      int: 0