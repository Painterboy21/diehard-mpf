#config_version=6

mode:
  start_events: ball_started
  stop_events: ball_ended, end_skillshot
  priority: 1100

# ---------------------------------------------------------------------
# SOUND PLAYER
# Fire event plays gunfire.
# Action and plunger-key buttons both post s_fire_active.
# ---------------------------------------------------------------------
sound_player:
  s_fire_active:
    gunfire:
      action: play
      volume: 1.0

# ---------------------------------------------------------------------
# EVENT PLAYER
# bd_plunger listens directly for s_fire_active.
#
# Fire button:
#   - directly launches the ball
#   - checks the skillshot
#
# Action button and plunger key:
#   - post s_fire_active
#   - therefore launch the ball and check the skillshot
# ---------------------------------------------------------------------
event_player:
  mode_skillshot_started:
    - reset_super_skillshot

  s_plunger_key_active:
    - s_fire_active

  s_actionbtn_active:
    - s_fire_active

  s_fire_active:
    - skillshot_check

  skillshot_hit_fast:
    - light_super_skillshot

  skillshot_hit:
    - clear_skillshot_player_ball

  skillshot_hit.1{current_player.ball==1}:
    - ball_save_one

  skillshot_hit.1{current_player.ball==2}:
    - ball_save_two

  skillshot_hit.1{current_player.ball==3}:
    - ball_save_three

  skillshot_miss:
    - clear_skillshot_player_ball
    - end_skillshot

  end_skillshot:
    - clear_skillshot_player_ball

  mode_skillshot_stopping:
    - clear_skillshot_player_ball

  ball_will_end:
    - clear_skillshot_player_ball

  ball_ended:
    - clear_skillshot_player_ball

  s_captiveball_active{current_player.super_skillshot_available==1 and current_player.super_skillshot_awarded==0}:
    - super_skillshot_award

  super_skillshot_award:
    - clear_skillshot_player_ball
    - villain_start_lit
    - super_skillshot_full_bullets
    - end_skillshot|6s

  timer_super_skillshot_timer_complete{current_player.super_skillshot_awarded==0}:
    - clear_skillshot_player_ball
    - end_skillshot

# ---------------------------------------------------------------------
# TIMERS
# ---------------------------------------------------------------------
timers:
  super_skillshot_timer:
    start_value: 4
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: skillshot_hit_fast
        action: restart
      - event: super_skillshot_award
        action: stop
      - event: mode_skillshot_stopping
        action: stop

# ---------------------------------------------------------------------
# COIL PLAYER
# ---------------------------------------------------------------------
coil_player:
  super_skillshot_plane_pulse:
    c_captivetarget:
      action: pulse

# ---------------------------------------------------------------------
# SHOW PLAYER
# ---------------------------------------------------------------------
show_player:
  mode_skillshot_started:
    flash_action_button_red:
      key: skillshot_action_button_flash
      loops: -1

  skillshot_hit_fast:
    super_skillshot_captive_ready:
      key: super_skillshot_captive_ready
      speed: 8
      show_tokens:
        captive: l52

  super_skillshot_award:
    super_skillshot_captive_ready:
      key: super_skillshot_captive_ready
      action: stop
    super_skillshot_plane_bounce:
      key: super_skillshot_plane_bounce
      speed: 1
      loops: 0
    super_skillshot_collected_crazy:
      key: super_skillshot_collected_crazy
      speed: 1
      loops: 2

  mode_skillshot_stopping:
    flash_action_button_red:
      action: stop
      key: skillshot_action_button_flash
    super_skillshot_captive_ready:
      key: super_skillshot_captive_ready
      action: stop
    super_skillshot_plane_bounce:
      key: super_skillshot_plane_bounce
      action: stop
    super_skillshot_collected_crazy:
      key: super_skillshot_collected_crazy
      action: stop

# ---------------------------------------------------------------------
# SLIDE PLAYER
# ---------------------------------------------------------------------
slide_player:
  mode_skillshot_started:
    skillshot:
      action: play
      expire: 0s

  skillshot_hit:
    skillshot:
      action: remove
      expire: 0s

  skillshot_miss:
    skillshot:
      action: remove
      expire: 0s

  mode_skillshot_stopping:
    skillshot:
      action: remove
      expire: 0s

# ---------------------------------------------------------------------
# WIDGET PLAYER
# ---------------------------------------------------------------------
widget_player:
  super_skillshot_award:
    super_skill_shot:
      action: play
      expire: 6s

  mode_skillshot_stopping:
    super_skill_shot:
      action: remove

# ---------------------------------------------------------------------
# VARIABLE PLAYER
# ---------------------------------------------------------------------
variable_player:
  reset_super_skillshot:
    super_skillshot_available:
      action: set
      int: 0
    super_skillshot_awarded:
      action: set
      int: 0

  skillshot_hit_fast:
    super_skillshot_available:
      action: set
      int: 1

  super_skillshot_award:
    score:
      action: add
      int: 1000000
    super_skillshot_awarded:
      action: set
      int: 1
    super_skillshot_available:
      action: set
      int: 0
    bullet_hits:
      action: set
      int: 15

  ball_save_one:
    score:
      action: add
      int: 1000000

  ball_save_two:
    score:
      action: add
      int: 2000000

  ball_save_three:
    score:
      action: add
      int: 4000000
