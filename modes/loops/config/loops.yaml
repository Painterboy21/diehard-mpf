#config_version=6

# ------------------------------------------------------------
# LOOP STREAK MODE
# ------------------------------------------------------------
# Tracks full loops in a row.
#
# Right full loop:
#   s_right_orbit -> s_right_orbit2 -> s_left_orbit2 -> s_left_orbit
#
# Left full loop:
#   s_left_orbit -> s_left_orbit2 -> s_right_orbit2 -> s_right_orbit
#
# Rewards:
#   5 loops in a row  = 250,000
#   10 loops in a row = 500,000
#   15 loops in a row = 1,000,000 + red jackpot show
#
# Loop Champion:
#   Best loop streak in one game.
#   Posted to the pending machine-record system at game end.
# ------------------------------------------------------------

mode:
  start_events:
    - game_started
  stop_events:
    - game_ended
  priority: 150

# ------------------------------------------------------------
# TIMERS
# ------------------------------------------------------------
# loop_sequence_timer:
#   Short timer for the four-switch full-loop sequence.
#
# loop_combo_timer:
#   Five seconds to complete the next full loop and keep
#   the streak alive.
# ------------------------------------------------------------
timers:
  loop_sequence_timer:
    start_value: 0
    end_value: 2
    direction: up
    tick_interval: 1s
    control_events:
      - event: loop_sequence_started
        action: restart
      - event: loop_sequence_advanced
        action: restart
      - event: loop_full_loop_completed
        action: stop
      - event: loop_sequence_reset
        action: stop

  loop_combo_timer:
    start_value: 0
    end_value: 5
    direction: up
    tick_interval: 1s
    control_events:
      - event: loop_full_loop_completed
        action: restart
      - event: loop_streak_reset
        action: stop

# ------------------------------------------------------------
# EVENT PLAYER
# ------------------------------------------------------------
# Direction values:
#   0 = none
#   1 = right full loop
#   2 = left full loop
#
# The first left/right orbit starts are now unconditional so
# we can confirm the mode is posting events from the real switches.
# ------------------------------------------------------------
event_player:
  # Right loop sequence start.
  s_right_orbit_active:
    loop_start_right:
    loop_sequence_started:

  # Right loop sequence progression.
  s_right_orbit2_active{current_player.loop_sequence_direction==1 and current_player.loop_sequence_step==1}:
    loop_right_step_2:
    loop_sequence_advanced:

  s_left_orbit2_active{current_player.loop_sequence_direction==1 and current_player.loop_sequence_step==2}:
    loop_right_step_3:
    loop_sequence_advanced:

  s_left_orbit_active{current_player.loop_sequence_direction==1 and current_player.loop_sequence_step==3}:
    loop_right_full_loop_completed:

  # Left loop sequence start.
  s_left_orbit_active:
    loop_start_left:
    loop_sequence_started:

  # Left loop sequence progression.
  s_left_orbit2_active{current_player.loop_sequence_direction==2 and current_player.loop_sequence_step==1}:
    loop_left_step_2:
    loop_sequence_advanced:

  s_right_orbit2_active{current_player.loop_sequence_direction==2 and current_player.loop_sequence_step==2}:
    loop_left_step_3:
    loop_sequence_advanced:

  s_right_orbit_active{current_player.loop_sequence_direction==2 and current_player.loop_sequence_step==3}:
    loop_left_full_loop_completed:

  # Both directions become one shared full-loop event.
  loop_right_full_loop_completed:
    loop_full_loop_completed:

  loop_left_full_loop_completed:
    loop_full_loop_completed:

  # Give variable_player 1ms to add the streak before checking awards.
  loop_full_loop_completed:
    loop_check_streak_awards|1ms:

  # Combo timer expired, so the loop streak is over.
  timer_loop_combo_timer_complete:
    loop_streak_reset:

  # Sequence timer expired, so the current four-switch sequence resets.
  timer_loop_sequence_timer_complete:
    loop_sequence_reset:

  # Ball ending clears the current streak/sequence, but keeps best streak.
  ball_ending:
    loop_streak_reset:
    loop_sequence_reset:

  # Awards at exact streak values.
  loop_check_streak_awards{current_player.current_loop_streak==5}:
    loop_streak_award_5:

  loop_check_streak_awards{current_player.current_loop_streak==10}:
    loop_streak_award_10:

  loop_check_streak_awards{current_player.current_loop_streak==15}:
    loop_streak_award_15:

  # Post best loop streak to the pending machine-record system.
  game_ending{current_player.best_loop_streak_this_game > 0}:
    record_candidate_loop_champion:
      value: current_player.best_loop_streak_this_game

# ------------------------------------------------------------
# VARIABLE PLAYER
# ------------------------------------------------------------
# Tracks:
#   current_loop_streak
#   best_loop_streak_this_game
#   loop_sequence_step
#   loop_sequence_direction
#   loop_jackpot_collected_this_ball
# ------------------------------------------------------------
variable_player:
  mode_loops_started:
    current_loop_streak:
      action: set
      int: 0
    best_loop_streak_this_game:
      action: set
      int: 0
    loop_sequence_step:
      action: set
      int: 0
    loop_sequence_direction:
      action: set
      int: 0
    loop_jackpot_collected_this_ball:
      action: set
      int: 0

  # Right loop sequence.
  loop_start_right:
    loop_sequence_direction:
      action: set
      int: 1
    loop_sequence_step:
      action: set
      int: 1

  loop_right_step_2:
    loop_sequence_step:
      action: set
      int: 2

  loop_right_step_3:
    loop_sequence_step:
      action: set
      int: 3

  # Left loop sequence.
  loop_start_left:
    loop_sequence_direction:
      action: set
      int: 2
    loop_sequence_step:
      action: set
      int: 1

  loop_left_step_2:
    loop_sequence_step:
      action: set
      int: 2

  loop_left_step_3:
    loop_sequence_step:
      action: set
      int: 3

  # Any completed full loop increments the streak and clears the sequence.
  loop_full_loop_completed:
    current_loop_streak:
      action: add
      int: 1
    loop_sequence_step:
      action: set
      int: 0
    loop_sequence_direction:
      action: set
      int: 0

  # Update best loop streak when current streak beats it.
  loop_check_streak_awards{current_player.current_loop_streak > current_player.best_loop_streak_this_game}:
    best_loop_streak_this_game:
      action: set
      int: current_player.current_loop_streak

  # Reset current streak only when combo timer expires or ball ends.
  loop_streak_reset:
    current_loop_streak:
      action: set
      int: 0

  # Reset the in-progress four-switch sequence.
  loop_sequence_reset:
    loop_sequence_step:
      action: set
      int: 0
    loop_sequence_direction:
      action: set
      int: 0

  # Scoring awards.
  loop_streak_award_5:
    score: 250000

  loop_streak_award_10:
    score: 500000

  loop_streak_award_15:
    score: 1000000
    loop_jackpot_collected_this_ball:
      action: set
      int: 1

# ------------------------------------------------------------
# SHOW PLAYER
# ------------------------------------------------------------
# 15-loop streak gets the red jackpot flash.
# ------------------------------------------------------------
show_player:
  loop_streak_award_15:
    loop_jackpot_red_flash:
      priority: 500