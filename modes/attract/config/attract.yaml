#config_version=6

# ------------------------------------------------------------
# ATTRACT
# ------------------------------------------------------------
# What this mode does:
#   - Starts when the game ends or reset completes.
#   - Stops when a game starts or service mode opens.
#   - Plays the main attract slide.
#   - Runs the attract light show and start button flash.
#   - Refreshes iScored scores when attract begins and on idle.
#   - Flippers rotate the attract display and reset the idle timer.
#   - Action button shows the instructions slide while held.
# ------------------------------------------------------------
mode:
  start_events:
    - game_ended
    - reset_complete
  stop_events:
    - game_start
    - service_mode_entered
  priority: 10

# ------------------------------------------------------------
# EVENT PLAYER
# ------------------------------------------------------------
# Starts attract shows and iScored refresh.
# Flippers rotate the Godot attract display using the original
# rotate_attract_left / rotate_attract_right events.
# Idle completion restarts the attract show and refreshes scores.
# ------------------------------------------------------------
event_player:
  mode_attract_started:
    - play_show_xmas
    - play_show_start_button_flash
    - iscored_refresh_scores
    - reset_idle_timer

  s_left_flipper_active:
    - rotate_attract_left
    - reset_idle_timer

  s_right_flipper_active:
    - rotate_attract_right
    - reset_idle_timer

  timer_attract_idle_complete:
    - rotate_attract_right
    - play_show_xmas
    - iscored_refresh_scores
    - reset_idle_timer

# ------------------------------------------------------------
# LIGHT PLAYER
# ------------------------------------------------------------
# Turns GI off during attract and clears it when attract stops.
# ------------------------------------------------------------
light_player:
  mode_attract_started:
    GI:
      color: 000000

  mode_attract_stopping:
    GI:
      color: off

# ------------------------------------------------------------
# SHOW PLAYER
# ------------------------------------------------------------
# Runs the main attract light show and flashing start button show.
# ------------------------------------------------------------
show_player:
  play_show_xmas:
    attract_show_runner:
      key: key_attract_christmas
      loops: 0

  play_show_start_button_flash:
    flash_start_button:
      key: key_attract_start_button_flash

# ------------------------------------------------------------
# SLIDE PLAYER
# ------------------------------------------------------------
# Shows the main attract slide.
# Action button shows instructions while held, then removes them.
# Record pages are handled inside Godot, not here.
# ------------------------------------------------------------
slide_player:
  mode_attract_started:
    attract:
      action: play
      expire: 0s

  s_actionbtn_active:
    attract_instructions:
      action: play
      expire: 0s
      priority: 100

  s_actionbtn_inactive:
    attract_instructions:
      action: remove

# ------------------------------------------------------------
# TIMERS
# ------------------------------------------------------------
# Idle timer advances the attract display and refreshes iScored
# after a period with no flipper activity.
# ------------------------------------------------------------
timers:
  attract_idle:
    start_value: 0
    end_value: 18
    direction: up
    control_events:
      - event: reset_idle_timer
        action: restart
    restart_on_complete: true
    start_running: true
    tick_interval: 10000ms