#config_version=6

mode:
  start_events: start_hans_dieharder
  stop_events:
    - ball_ended
    - hans_dieharder_won
    - hans_dieharder_failed
  priority: 165

timers:
  hans_dieharder_timer:
    start_value: 93
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: mode_hans_dieharder_started
        action: restart
      - event: hans_dieharder_won
        action: stop
      - event: hans_dieharder_failed
        action: stop

counters:
  hans_dieharder_detonators:
    count_events:
      - hans_dieharder_valid_h
      - hans_dieharder_valid_o
      - hans_dieharder_valid_l1
      - hans_dieharder_valid_l2
      - hans_dieharder_valid_y
    starting_count: 0
    count_complete_value: 8
    direction: up
    persist_state: false
    reset_on_complete: false
    events_when_complete:
      - hans_dieharder_complete

shots:
  hans_dieharder_h:
    switch: s_holly_h
    enable_events:
      - mode_hans_dieharder_started
      - hans_dieharder_h_ready
    disable_events:
      - hans_dieharder_valid_h

  hans_dieharder_o:
    switch: s_holly_o
    enable_events:
      - mode_hans_dieharder_started
      - hans_dieharder_o_ready
    disable_events:
      - hans_dieharder_valid_o

  hans_dieharder_l1:
    switch: s_holly_l
    enable_events:
      - mode_hans_dieharder_started
      - hans_dieharder_l1_ready
    disable_events:
      - hans_dieharder_valid_l1

  hans_dieharder_l2:
    switch: s_holly_l1
    enable_events:
      - mode_hans_dieharder_started
      - hans_dieharder_l2_ready
    disable_events:
      - hans_dieharder_valid_l2

  hans_dieharder_y:
    switch: s_holly_y
    enable_events:
      - mode_hans_dieharder_started
      - hans_dieharder_y_ready
    disable_events:
      - hans_dieharder_valid_y

event_player:
  mode_hans_dieharder_started:
    - villain_mode_started
    - hans_dieharder_h_ready
    - hans_dieharder_o_ready
    - hans_dieharder_l1_ready
    - hans_dieharder_l2_ready
    - hans_dieharder_y_ready
    - hans_dieharder_music_start
    - hans_dieharder_show_timer
    - hans_dieharder_message_start
    - nakatomi_entrance_lock_close
    - release_villain_select_vuk

  mode_hans_dieharder_stopping:
    - villain_mode_stopped

  hans_dieharder_h_hit:
    - hans_dieharder_valid_h

  hans_dieharder_o_hit:
    - hans_dieharder_valid_o

  hans_dieharder_l1_hit:
    - hans_dieharder_valid_l1

  hans_dieharder_l2_hit:
    - hans_dieharder_valid_l2

  hans_dieharder_y_hit:
    - hans_dieharder_valid_y

  hans_dieharder_valid_h:
    - hans_dieharder_h_ready|3s
    - hans_dieharder_update_display
    - hans_dieharder_target_hit

  hans_dieharder_valid_o:
    - hans_dieharder_o_ready|3s
    - hans_dieharder_update_display
    - hans_dieharder_target_hit

  hans_dieharder_valid_l1:
    - hans_dieharder_l1_ready|3s
    - hans_dieharder_update_display
    - hans_dieharder_target_hit

  hans_dieharder_valid_l2:
    - hans_dieharder_l2_ready|3s
    - hans_dieharder_update_display
    - hans_dieharder_target_hit

  hans_dieharder_valid_y:
    - hans_dieharder_y_ready|3s
    - hans_dieharder_update_display
    - hans_dieharder_target_hit

  hans_dieharder_complete:
    - hans_dieharder_won

  timer_hans_dieharder_timer_complete:
    - hans_dieharder_failed
    - hans_dieharder_blackout|2s
    - end_ball|3s

variable_player:
  mode_hans_dieharder_started:
    villain_mode_running:
      int: 1
      action: set

    hans_dieharder_progress:
      int: 0
      action: set

  hans_dieharder_target_hit{device.counters.hans_dieharder_detonators.value<8}:
    score: 1000000
    hans_dieharder_progress: 1

  hans_dieharder_won:
    score: 3000000

    hans_complete:
      int: 1
      action: set

    hans_dieharder_complete:
      int: 1
      action: set

  hans_dieharder_failed:
    hans_dieharder_failed:
      int: 1
      action: set

  mode_hans_dieharder_stopping:
    villain_mode_running:
      int: 0
      action: set

show_player:
  mode_hans_dieharder_started:
    flash_color:
      key: hans_dieharder_gruber_flash
      priority: 165
      loops: -1
      speed: 6
      show_tokens:
        lights: l43
        color: red

  hans_dieharder_h_ready:
    hans_bullet_flash:
      key: hans_dieharder_h_flash
      priority: 175
      loops: -1
      show_tokens:
        light: l30

  hans_dieharder_o_ready:
    hans_bullet_flash:
      key: hans_dieharder_o_flash
      priority: 175
      loops: -1
      show_tokens:
        light: l31

  hans_dieharder_l1_ready:
    hans_bullet_flash:
      key: hans_dieharder_l1_flash
      priority: 175
      loops: -1
      show_tokens:
        light: l32

  hans_dieharder_l2_ready:
    hans_bullet_flash:
      key: hans_dieharder_l2_flash
      priority: 175
      loops: -1
      show_tokens:
        light: l33

  hans_dieharder_y_ready:
    hans_bullet_flash:
      key: hans_dieharder_y_flash
      priority: 175
      loops: -1
      show_tokens:
        light: l34

  hans_dieharder_valid_h:
    hans_dieharder_h_flash:
      action: stop

  hans_dieharder_valid_o:
    hans_dieharder_o_flash:
      action: stop

  hans_dieharder_valid_l1:
    hans_dieharder_l1_flash:
      action: stop

  hans_dieharder_valid_l2:
    hans_dieharder_l2_flash:
      action: stop

  hans_dieharder_valid_y:
    hans_dieharder_y_flash:
      action: stop

  mode_hans_dieharder_stopping:
    hans_dieharder_gruber_flash:
      action: stop
    hans_dieharder_h_flash:
      action: stop
    hans_dieharder_o_flash:
      action: stop
    hans_dieharder_l1_flash:
      action: stop
    hans_dieharder_l2_flash:
      action: stop
    hans_dieharder_y_flash:
      action: stop

light_player:
  mode_hans_dieharder_started:
    GI:
      color: 0bc80b

  hans_dieharder_valid_h:
    l30: off

  hans_dieharder_valid_o:
    l31: off

  hans_dieharder_valid_l1:
    l32: off

  hans_dieharder_valid_l2:
    l33: off

  hans_dieharder_valid_y:
    l34: off

  hans_dieharder_failed:
    GI:
      color: ff0000

    l30:
      color: 220000

    l31:
      color: 220000

    l32:
      color: 220000

    l33:
      color: 220000

    l34:
      color: 220000

    l43:
      color: 220000

  hans_dieharder_blackout:
    GI: off
    l30: off
    l31: off
    l32: off
    l33: off
    l34: off
    l43: off

  hans_dieharder_won:
    l43: green

  mode_hans_dieharder_stopping:
    l30: off
    l31: off
    l32: off
    l33: off
    l34: off